run:
  name: bench_residual_medium_lc0bt4
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: lc0_bt4_112
  cache_features: false
model:
  name: residual_cnn
  input_channels: 112
  num_classes: 1
  channels: 64
  num_blocks: 6
  dropout: 0.1
  use_batchnorm: true
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  class_weighting: balanced
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  monitor: pr_auc
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: 'Medium residual CNN on lc0_bt4_112, puzzle_binary mode. Gated experiment:
  only train if bench_residual_small_lc0bt4 (puzzle_binary) hits the ceiling. Per
  docs/research_audit_2026-05-09.md.'
