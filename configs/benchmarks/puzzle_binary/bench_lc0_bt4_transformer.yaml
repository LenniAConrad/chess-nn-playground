run:
  name: bench_lc0_bt4_transformer
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: lc0_bt4_transformer
  input_channels: 18
  num_classes: 1
  channels: 256
  num_blocks: 6
  num_heads: 8
  ffn_mult: 4
  value_hidden: 128
  dropout: 0.1
training:
  epochs: 30
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 8
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 15
  min_active_epochs: 15
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  Authentic encoder-only transformer baseline (multi-head self-attention + FFN
  pre-norm blocks over the 64 board squares as tokens), in the spirit of LC0's
  BT4 trunk but scaled well below the ~50M-parameter original and terminated in
  a single puzzle_binary logit head. base ~4.8M params, scale_up ~16M,
  scale_xl ~38M. This is the genuine transformer baseline -- the existing
  bench_lc0_bt4_classifier is a residual conv tower that only borrows the BT4
  name. CRTK metadata is reporting-only.
