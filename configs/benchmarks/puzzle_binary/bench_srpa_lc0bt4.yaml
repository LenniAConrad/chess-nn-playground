idea_id: i013
run:
  name: bench_srpa_lc0bt4
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: lc0_bt4_112
  cache_features: false
model:
  name: sparse_relation_pursuit_asymmetry
  architecture_version: 1
  input_channels: 112
  num_classes: 1
  square_dim: 64
  stem_depth: 3
  relation_dim: 64
  geom_dim: 16
  path_dim: 16
  num_atom_groups: 12
  atoms_per_group: 4
  pursuit_steps: 4
  classifier_hidden: 128
  dropout: 0.1
  max_ray_distance: 7
  edge_chunk_size: 256
  active_threshold: 0.001
  use_batchnorm: true
training:
  epochs: 20
  batch_size: 64
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0003
  weight_decay: 0.01
  class_weighting: balanced
  loss: srpa
  srpa:
    lambda_aux: 0.15
    lambda_residual: 0.02
    lambda_l1: 0.001
    lambda_group: 0.001
    lambda_dictionary_coherence: 0.0005
    lambda_branch_separation: 0.0005
    lambda_dead_group: 0.0001
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: "Benchmark config for SRPA v1 on canonical puzzle_binary CRTK split."
