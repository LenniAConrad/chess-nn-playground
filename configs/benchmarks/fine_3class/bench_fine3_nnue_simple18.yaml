run:
  name: bench_fine3_stockfish_style_nnue_simple18
  output_dir: results
seed: 42
deterministic: true
mode: fine_3class
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: stockfish_nnue
  input_channels: 18
  num_classes: 3
  accumulator_size: 256
  hidden_dims:
  - 128
  - 64
  dropout: 0.05
  include_state_planes: true
training:
  epochs: 20
  batch_size: 512
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  class_weighting: balanced
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: '3-class Stockfish-style NNUE benchmark: random/non-puzzle vs near-puzzle hard
  negative vs puzzle. Paper-grade default: convergence budget with validation plateau,
  minimum active epochs, LR reduction, and full artifact validation.'
