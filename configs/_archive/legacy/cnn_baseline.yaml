run:
  name: cnn_baseline_smoke
  output_dir: results
seed: 42
deterministic: true
mode: coarse_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  cache_features: false
model:
  name: simple_cnn
  input_channels: 18
  num_classes: 2
  channels: 16
  num_blocks: 2
  dropout: 0.05
  use_batchnorm: true
training:
  epochs: 1
  batch_size: 4
  num_workers: 0
  learning_rate: 0.001
  weight_decay: 0.0001
  class_weighting: none
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
notes: "Baseline CNN sanity run on the current CRTK tagged benchmark splits. CRTK metadata is retained for reporting only, never as model input."
