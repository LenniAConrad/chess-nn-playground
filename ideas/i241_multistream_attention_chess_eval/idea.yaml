idea_id: i241
name: Multi-Stream Chess-Decomposed Transformer Evaluator
slug: multistream_attention_chess_eval
status: proposed
created_at: '2026-05-10T23:30:00+00:00'
author: Claude (post-scout analysis)
short_thesis: |
  The strongest scout discovery is i193's exchange+king dual-stream
  decomposition (test PR AUC 0.8755, +0.014 above #2 at the same parameter
  budget). The dual-stream prior is composable with attention. Replacing each
  stream's conv encoder with a small transformer, adding a third
  positional/structural stream, and replacing the puzzle binary head with
  value+policy heads yields a candidate trunk for an engine-strength network
  that is structurally distinct from LC0 BT4.
novelty_claim: |
  BT4 is a single-stream piece/square transformer that must learn the
  exchange/king-safety/positional decomposition implicitly. This architecture
  hands the decomposition to the network as a hard structural prior: three
  parallel transformer towers specialized to (a) tactical exchanges,
  (b) king-zone threats, (c) positional/structural features, fused at the
  head. The dual-stream form is demonstrated working at small scale by i193;
  this proposal generalizes it to attention-based streams and adds the
  structural third stream.
expected_advantage: |
  At matched training scale, the structural prior should give:
  - Faster convergence (the model does not need to discover the
    chess-natural decomposition from data — it has it from initialization)
  - Better long-range modeling per stream (each stream is an attention
    transformer over its task's relevant tokens/squares, so it gets BT4's
    long-range expressiveness)
  - Improved interpretability (per-stream logits expose what each chess
    concept is contributing to the final eval)
  - Composability with auxiliary supervision: each stream can be supervised
    by stream-specific aux losses (exchange outcome prediction, king-safety
    classification, positional eval) that BT4 has no clean place to put.
target_task: |
  Position evaluation for chess play (value + policy heads), not
  puzzle_binary classification. The trunk would also serve a puzzle_binary
  head for sanity checks against the scout pool, but the primary objective
  is engine-strength position evaluation.
input_representation: |
  lc0_bt4_112 input planes (matches BT4 and the strongest scout-pool
  encodings). Optional history if available; the architecture is agnostic.
output_heads: |
  - value: (win, draw, loss) categorical, or centipawn regression.
  - policy: per-move logits over the LC0 1858-move action space, masked to
    legal moves at inference.
  - per-stream auxiliary heads (training-time only): exchange-outcome,
    king-attack-or-defend, positional-evaluation. Loss weights small (~0.05
    each); they exist to give each stream a chess-aware gradient signal.
compute_notes: |
  - Stream 1 (Exchange): transformer over the 64 squares with attention bias
    derived from attacker/defender precomputed tables (so the attention
    module has a free chess-aware inductive prior on which square pairs
    interact tactically).
  - Stream 2 (King): transformer over the 64 squares with attention bias
    derived from king-zone, escape-square, and check-ray masks.
  - Stream 3 (Positional): transformer over the 64 squares with no
    attention bias (vanilla attention) — the model captures pawn structure,
    piece coordination, prophylactic considerations here.
  - Stream fusion: phase-router MLP produces a soft mixture
    (alpha_E, alpha_K, alpha_P) over the three stream embeddings, plus a
    small residual head reading the concatenated stream embeddings to allow
    cross-stream signal.
  - Value/policy heads on top of the fused embedding.
  - Total parameters target: 50M at scale_xl (matched to BT4-medium).
  - Compute target: similar GPU FLOPs as BT4-medium per forward; three
    parallel streams cost ~3x a single stream of equal width but each can
    be ~sqrt(3)x narrower for matched total compute.
