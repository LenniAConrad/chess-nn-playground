author: Claude
short_thesis: "Applies the 64x64 Walsh-Hadamard transform (Sylvester construction) to per-channel pooled square signals; classifies puzzle-likeness from top-k Walsh coefficient energies. Uses the boolean Fourier basis on Z_2^6 -- distinct from DCT, wavelets, and spectral-Laplacian features."
novelty_claim: Bespoke `nn.Module` implementation in `src/chess_nn_playground/models/hadamard_spectrum.py`; routed via the standard
  registry (not the generic ResearchPacketProbe).
expected_advantage: Hand-coded mechanism implements the algebra exactly per the
  source packet -- no profile-routing approximation.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (squeezed) for binary BCE.
compute_notes: Fixed orthogonal Walsh basis (no parameters) + tiny channel-mix conv + MLP. Cost dominated by the einsum WHT.
