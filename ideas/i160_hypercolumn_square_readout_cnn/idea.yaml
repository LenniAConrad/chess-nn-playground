idea_id: i160
name: Hypercolumn Square Readout CNN
slug: hypercolumn_square_readout_cnn
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Intermediate CNN layers may detect different chess cues: early local
  piece contacts, middle motifs, and later global context. A hypercolumn readout gathers
  per-square features from every depth and classifies from square-level evidence maps
  plus global pooling.'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2213_friday_shanghai_architecture_batch_10.md`;
  uses a per-square hypercolumn readout over multiple CNN depths instead of generic
  CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus square evidence maps, square logits, layer projection
  energy, early/late projection dominance, and top evidence square diagnostics.
compute_notes: Residual 8x8 CNN trunk with four saved depths, per-depth 1x1 projections,
  concatenated square hypercolumns, square evidence readout, and mean/max/top-k global
  aggregation.
