idea_id: i155
name: Capsule Motif BoardNet
slug: capsule_motif_boardnet
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Local chess motifs are not only scalar activations; they have type,
  pose, orientation, and part-whole relationships. A capsule-style model can encode
  local patterns as small vectors and route them into higher-level tactical motif
  capsules by agreement.
novelty_claim: Bespoke capsule-routing architecture for the puzzle_binary contract.
  Primary capsule vectors at every square are routed by iterative agreement into a
  small set of learned motif capsules; motif capsule lengths and the pooled trunk
  feed the readout. Routing entropy and motif-norm summaries are exposed as
  diagnostics rather than loss terms.
expected_advantage: Test the packet's capsule-style motif-binding thesis under the
  same puzzle_binary benchmark contract as the other ideas. Routing entropy and
  motif norms expose whether agreement actually concentrates and whether that
  concentration tracks puzzle signal.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus motif capsule norms, routing coupling/logits,
  and routing entropy / motif-norm summaries saved to prediction artifacts.
compute_notes: Compact convolutional trunk plus a primary-capsule projection and
  `routing_iterations` rounds of softmax routing-by-agreement over `num_motif_caps`
  motif capsules.
