idea_id: i199
name: Tactical Hessian Spectrum Network
slug: tactical_hessian_spectrum_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: A real puzzle may be a sharp local maximum of tactical evidence under
  legal perturbations. Near-puzzles may have high raw evidence but flatter or less
  stable local geometry.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-25_0109_saturday_shanghai_high_upside_puzzle_batch_4.md`;
  bespoke architecture builds a scalar tactical-evidence field, probes its second-order
  behaviour along chess-meaningful perturbation directions via finite differences,
  and reads the resulting reduced-Hessian spectrum (eigenvalues, spectral gap, concavity,
  spectral radius) into the puzzle classifier.
expected_advantage: A reduced-Hessian spectral head should separate real puzzles (sharp
  local maxima of tactical evidence with strongly negative eigenvalues) from near-puzzles
  (high raw evidence but flat or indefinite curvature) on the puzzle_binary benchmark.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus reduced-Hessian diagnostics (evidence field, evidence
  total, perturbation directions, directional gradient, reduced Hessian, eigenvalues,
  spectral gap, trace, concavity, positive curvature, spectral radius, gradient norm,
  trunk energy).
compute_notes: Compact convolutional trunk plus a per-square evidence projection.
  One batched forward over `(1 + 2K + K(K-1)/2)` board variants computes the reduced
  Hessian by finite differences; spectrum is read with `torch.linalg.eigvalsh`.
