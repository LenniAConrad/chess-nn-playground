short_thesis: '- Idea name: Ordinal Evidence Ladder Network - One-sentence thesis:
  Treat `known non-puzzle -> verified near-puzzle -> verified puzzle` as an ordered
  ladder and force...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-21_0711_tuesday_los_angeles_ordinal_evidence_ladder.md`;
  uses a scalar puzzle-potential bottleneck with two learned ordered cumulative
  thresholds and a Dirichlet evidence concentration over the rank-consistent fine-label
  distribution, rather than a generic CNN-only binary head.
expected_advantage: Test the packet's proposed scalar ordinal ladder under the same
  puzzle_binary benchmark contract as the other ideas, with matched-FPR class-`1`
  diagnostics from the cumulative `q_ge1` head.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
