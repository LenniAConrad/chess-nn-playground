output_heads: One puzzle logit (cumulative `q_ge2`) plus rank-consistent fine-label
  probabilities, ordinal cumulative logits, Dirichlet evidence parameters, and
  selective diagnostics saved to prediction artifacts.
compute_notes: Compact convolutional trunk (about 0.23-0.27M parameters on
  simple_18) plus a scalar ordinal ladder head with two learned ordered thresholds
  and an evidence concentration; no candidate-set memory.
