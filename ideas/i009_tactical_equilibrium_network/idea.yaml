notes: "Paper-grade single-seed benchmark completed on the canonical CRTK tagged split using CUDA mixed precision. Test metrics: accuracy 0.8456, F1 0.7854, PR AUC 0.8469, ROC AUC 0.9233, recall 0.8479, precision 0.7315. Strong on clearly winning/crushing eval buckets; weakest on equal-eval, hard/very-hard, endgame, mate-in-1, and promotion/underpromotion slices. Artifacts validate and slice reports were generated for val/test. Needs multi-seed repeat and comparison against LC0 BT4, VetoSelect, and Dykstra before publication claims."
