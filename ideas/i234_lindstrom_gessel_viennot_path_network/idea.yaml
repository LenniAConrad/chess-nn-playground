idea_id: i234
name: Lindstrom-Gessel-Viennot Path Determinant Network
slug: lindstrom_gessel_viennot_path_network
status: implemented
created_at: '2026-05-05T15:50:00+00:00'
author: Claude
short_thesis: Builds a path-generating-function matrix M[i,j] = sum_paths(s_i -> t_j)
  prod edge_weights via Neumann series on a learned chess DAG; LGV lemma makes det(M)
  the signed enumerator of non-intersecting attacker-to-target k-tuples. Distinguishes
  overload/double-attack motifs algebraically.
novelty_claim: Bespoke LGV path-determinant readout over a learned DAG-restricted
  Neumann resolvent; uses non-intersecting multi-path enumeration (det of soft
  source/target path matrix) rather than eigenvalues or trace of a single Hermitian
  operator.
expected_advantage: Test the packet's proposed multi-path-determinant mechanism under
  the same puzzle_binary benchmark contract as the other linear-algebra ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus LGV diagnostics (log|det M|, sign(det M), trace,
  Frobenius norm, per-pair diagonal and off-diagonal L1, Neumann alpha, source /
  target selection entropies).
compute_notes: Compact convolutional trunk; learned 64x64 DAG-masked edge weight
  matrix W with row-stochastic normalisation; truncated Neumann series of depth
  `neumann_steps`; soft source/target selection of size `num_paths` and slogdet
  readout of the resulting path matrix.
