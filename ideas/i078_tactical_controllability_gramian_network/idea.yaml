notes: Bespoke implementation of the Tactical Controllability Gramian thesis. The
  operator combines five fixed chess-geometry masks with a learned low-rank
  board-conditioned update and is spectrally normalised before the unrolled
  attacker/defender controllability and target observability Gramians; CRTK
  metadata is reporting-only.
