idea_id: i078
name: Tactical Controllability Gramian Network
slug: tactical_controllability_gramian_network
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: Tactical Controllability Gramian Network tests whether controllability/observability
  Gramians on a learned chess linear system improve puzzle-binary classification by
  separating attacker control, defender control, and target observability.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-25_2004_saturday_shanghai_tactical_controllability_gramian.md`;
  builds attacker/defender controllability and target observability Gramians on a
  learned 64x64 chess-structured operator and reads Hankel-like attacker/defender
  modes, principal-angle subspace mismatch, and per-target Gramian diagonals rather
  than generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus controllability/observability Gramian diagnostics
  (T_a, T_d, T_net, attacker/defender Hankel modes, mode ratio, subspace principal
  angles, per-target Gramian diagonals, observability trace, operator gate weights
  and norm, low-rank energy) saved to prediction artifacts.
compute_notes: Compact convolutional trunk, 64x64 chess-geometry operator with five
  fixed masks plus a learned low-rank update, spectrally normalised via power
  iteration, and finite K-step unrolled controllability and observability Gramians
  followed by a symmetric eigendecomposition of W_o for the Hankel-like modal
  readout.
