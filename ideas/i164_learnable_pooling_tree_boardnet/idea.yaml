short_thesis: 'Instead of pooling the whole board at once or using an FPN, build a
  fixed hierarchy over the `8 x 8` board: squares become `2 x 2` cells, cells become
  quadrants, quadrants become a board root. Each tree node has a small learned aggregator
  and passes feature...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2216_friday_shanghai_architecture_batch_11.md`;
  uses a fixed pooling tree over the board with learnable per-node aggregators and
  FiLM-style top-down broadcasts rather than generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-level pooled features, learned pooling gate
  weights, gate entropy diagnostics, and feature-energy diagnostics.
compute_notes: Coordinate-aware CNN square encoder with three learnable 2x2 pooling
  nodes (squares -> cells -> quadrants -> root), FiLM-style top-down broadcasts back
  to finer levels, and pooled multi-level binary classification.
