idea_id: i154
name: Adapter-Sandwich Residual CNN
slug: adapter_sandwich_residual_cnn
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Instead of building a much larger new backbone, insert small bottleneck
  adapters before and after ordinary residual blocks. This tests whether parameter-efficient
  adapters can improve the existing CNN family while leaving most of the architecture
  conventional.
novelty_claim: Bespoke residual CNN where each block is sandwiched between two
  Houlsby-style 1x1-conv bottleneck adapters with zero-initialised `W_up`. The
  adapters add a small parameter-efficient capacity knob without changing the
  surrounding block topology, and the per-stage adapter L2 energy is exposed as
  a diagnostic rather than a loss term.
expected_advantage: Test the packet's parameter-efficient-adapter thesis under the
  same puzzle_binary benchmark contract as the other ideas. `adapter_energy` and
  the per-stage breakdown expose whether the adapters actually move away from
  identity and whether that activity tracks puzzle signal.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus pre-, post-, and total adapter energies and
  their per-stage decompositions saved to prediction artifacts.
compute_notes: Compact convolutional trunk of `depth` residual blocks at `channels`
  width, sandwiched between 1x1 bottleneck adapters of width `adapter_dim`
  (defaults to `max(4, channels // 4)`).
