idea_id: i014
run:
  name: idea_i014_contamination_dro_huber_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: contamination_dro_huber_tail_rejection
  input_channels: 18
  num_classes: 1
  channels: 96
  depth: 3
  hidden_dim: 128
  dropout: 0.1
  use_batchnorm: true
training:
  epochs: 20
  batch_size: 192
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: contamination_dro_huber
  contamination_dro:
    lambda_tail: 0.35
    margin: 0.25
    kappa: 1.0
    beta: 0.25
    min_near_count: 4
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: "Board-only robust near-puzzle tail objective; no inference-time metadata."
