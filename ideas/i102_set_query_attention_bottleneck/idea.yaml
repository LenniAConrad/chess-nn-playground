author: Codex
short_thesis: Puzzle-like positions may be recognized by a small number of latent
  tactical questions, each expressed as an attention distribution over board tokens.
  The model should classify not from unconstrained token mixing, but from query attention
  statistics, attend...
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2056_friday_shanghai_attention_inspired_batch.md`;
  uses a graph mechanism profile over board-only features rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus attention maps, attended values, per-query
  entropy, margin, mass, coordinate, and query-diversity diagnostics.
compute_notes: Square-token MLP plus a fixed learned query bank that reads board
  tokens through multihead query-to-token attention without token self-attention.
