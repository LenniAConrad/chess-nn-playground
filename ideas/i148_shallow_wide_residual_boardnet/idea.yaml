idea_id: i148
name: Shallow Wide Residual BoardNet
slug: shallow_wide_residual_boardnet
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: On an `8 x 8` board, depth may be less useful than width and a good
  head. A shallow wide residual CNN can test whether the benchmark wants broad feature
  extraction rather than long convolutional stacks.
novelty_claim: Bespoke shallow-wide residual board network that combines optional
  coordinate planes, squeeze-excite residual blocks at constant width, a strong
  mean / max / std pooled head, and an optional material count side-input so the
  width-vs-depth question can be answered against the deeper residual_cnn baseline
  with ablate-able components.
expected_advantage: Test whether a wide but shallow residual trunk plus a strong
  pooled head matches or beats the deeper residual_cnn baseline on the puzzle_binary
  benchmark.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus pooled-head and SE-gate diagnostics
  (swrb_pool_mean_norm, swrb_pool_max_max, swrb_pool_std_norm,
  swrb_se_gate_mean, swrb_residual_energy, swrb_count_head_logit).
compute_notes: Wide stem Conv3x3 (input + 2 coord planes -> width); 2-3 residual
  blocks of Conv3x3 + BN + ReLU + Conv3x3 + BN + SE-gate at constant width;
  pooled head concatenates mean / max / std pooling; optional material count
  side-MLP added to the trunk logit.
