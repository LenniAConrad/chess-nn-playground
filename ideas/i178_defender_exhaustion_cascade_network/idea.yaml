idea_id: i178
name: Defender-Exhaustion Cascade Network
slug: defender_exhaustion_cascade_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Many puzzles exist because one side cannot satisfy all defensive obligations
  at once:'
novelty_claim: Bespoke recurrent obligation/resource allocation cascade where typed
  defender resources are progressively exhausted across cascade steps; the puzzle
  head reads the residual demand curve rather than a one-shot Hall / matching deficit.
expected_advantage: Test the packet's proposed sequential exhaustion mechanism under
  the same puzzle_binary benchmark contract as the other ideas; cascade depth and
  resource capacity are the natural ablation knobs.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus exhaustion-cascade diagnostics (per-step sum-positive
  residual, allocation entropy, max deficit; final per-obligation residual; final
  per-resource allocation marginal; final demand / allocated / residual totals; per-resource
  capacity).
compute_notes: Compact convolutional trunk; typed obligation/resource tokens via per-type
  spatial soft-pooling; shared GRUCell over per-obligation demand_state for `cascade_steps`
  iterations; allocation softmax over resources damped by a running exhaustion pressure
  accumulator.
