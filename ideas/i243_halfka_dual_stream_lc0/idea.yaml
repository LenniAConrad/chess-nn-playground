notes: |
  Derived from post-scout, post-i242 architectural analysis (2026-05-11).
  Compared to i241 (multi-stream attention) this proposal trades the
  global-attention stream for HalfKA learnable king-conditioning. The
  i242 scout result (full multi-stream attention loses to conv-only
  i193 at small scale) suggests that at our training scale, learnable
  king-conditioning is a better use of the parameter budget than global
  square-token attention. Whether that finding extrapolates to engine
  training scale is the central hypothesis i243 is designed to test.
