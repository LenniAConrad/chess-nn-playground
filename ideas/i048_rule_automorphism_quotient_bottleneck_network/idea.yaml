author: Codex
short_thesis: '- Idea name: Rule-Automorphism Quotient Bottleneck Network, abbreviated
  `RAQ-Net`. - One-sentence thesis: A chess puzzle-like position should remain puzzle-like
  under...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-21_0751_tuesday_pdt_automorphism_quotient.md`;
  bespoke masked Reynolds quotient over the safe chess automorphism groupoid `G_x \subseteq
  {I, C, H, HC}` (file mirror gated on castling absence) with VICReg-style orbit
  consistency, REx-style transform-risk variance diagnostics, and the central
  same-count pseudo-orbit falsifier wired into the same model class for
  parameter-matched ablations. Materially distinct from the shared ResearchPacketProbe
  mechanism profile.
expected_advantage: Test the packet's proposed safe-automorphism quotient under the
  same puzzle_binary benchmark contract as the other ideas, with a built-in
  semantics-destroying falsifier (`pseudo_orbit`) that keeps view count, parameter
  count, and loss shape matched.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; the deterministic
  automorphism adapter fails closed on unknown channel schemas. CRTK/source
  metadata is reporting-only and never used as model input.
output_heads: One puzzle logit (masked Reynolds-quotient projection) plus orbit
  diagnostics (two_class_logits, valid_view_count, file_mirror_valid,
  orbit_variance, masked_orbit_variance, view_logit_variance, symmetry_residual,
  orbit_consistency, reynolds_norm, projection_norm, mechanism_energy,
  risk_variance_proxy) saved to prediction artifacts.
compute_notes: Compact convolutional encoder shared across orbit views (default
  hidden_channels=64, latent_dim=96, num_res_blocks=2). The orbit at most
  quadruples the per-batch forward pass; it adds no trainable parameters. File
  mirror is only applied on samples without castling rights, so most batches
  use only 2 of 4 views.
