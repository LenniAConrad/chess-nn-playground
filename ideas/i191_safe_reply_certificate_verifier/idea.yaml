short_thesis: Instead of proving that a position is a puzzle, try to prove that it
  is not a puzzle. If the model can find a cheap safe-reply certificate, the puzzle
  logit should go down.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  uses a generic mechanism profile over board-only features rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus positive-puzzle, best-disproof, certificate validity,
  certificate strength, certificate count, and per-certificate-family diagnostics saved
  to prediction artifacts.
compute_notes: Compact convolutional trunk plus deterministic safe-reply certificate
  proposal program; validity and strength heads score candidate disproof witnesses.
