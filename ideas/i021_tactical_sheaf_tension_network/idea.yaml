short_thesis: '- Idea name: Tactical Sheaf Tension Network, abbreviated `TSTN`. -
  One-sentence thesis: classify chess puzzle-likeness by learning a side-aware cellular
  sheaf over pse...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-21_0255_tuesday_local_tactical_sheaf.md`;
  uses a side-aware cellular sheaf with diagonal-plus-low-rank relation-tied restrictions
  over typed pseudo-legal attack/defense/control/x-ray edges rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's side-aware sheaf-tension signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus sheaf-tension, weighted-tension, top-edge-tension,
  per-relation-group energy, and side-aware piece-count diagnostics saved to prediction
  artifacts.
compute_notes: Square stalk encoder with per-square coordinates, a fixed typed directed
  tactical complex with control/attack/defend/x-ray/king-ring relation groups, learned
  diagonal-plus-low-rank sheaf restrictions, bounded sheaf-Laplacian heat steps with
  edge dropout, and an MLP classifier head consuming side-aware node pools plus
  per-block tension statistics.
