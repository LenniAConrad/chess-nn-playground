idea_id: i152
name: Iterative Logit Refinement CNN
slug: iterative_logit_refinement_cnn
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Instead of producing a single logit vector at the end, let a model make
  an initial prediction and then apply several learned correction steps from shared
  board features. The model tests whether puzzle evidence is better accumulated as
  staged corrections.
novelty_claim: Bespoke iterative logit-refinement classifier — CNN trunk plus pooled
  latent feed an initial logit head, then `T` weight-tied (or optionally untied)
  correction MLPs each emit a clamped `0.25 * tanh` logit delta conditioned on
  `[latent, previous logit, confidence features]`, refining evidence in logit space
  rather than in feature maps. Distinct from residual CNNs, fixed-point residual
  defects, and the proposal-conditioned ResearchPacketProbe scaffold.
expected_advantage: Test the packet's proposed staged-evidence-accumulation signal
  under the same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (final refined logit `l_T`) plus refinement
  diagnostics — initial_logit, final_logit, step_logits, correction_norms,
  correction_norm_mean, correction_total, final_minus_initial, flip_after_step1,
  confidence_growth, trunk_feature_energy, latent_norm — saved to prediction
  artifacts.
compute_notes: Compact convolutional trunk plus a fixed-step weight-tied (default)
  correction MLP loop in logit space, with bounded `0.25 * tanh` correction
  magnitudes.
