idea_id: i181
name: Disproof-Ledger Puzzle Network
slug: disproof_ledger_puzzle_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'The model should not only collect evidence for "puzzle." It should
  collect explicit disproof evidence: typed reasons the position is sharp but not
  a puzzle (king escape, recapture, blocked line, slow threat, protected target,
  missing tempo).'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-25_0037_saturday_shanghai_puzzle_architecture_batch_2.md`
  (Idea 5, "Disproof-Ledger Puzzle Network"); replaces a single positive-evidence
  head with a positive head minus a typed, softplus-non-negative disproof ledger,
  so the readout is literally `evidence - sum_d softplus(disproof_d)` and the
  near-puzzle row gets an explicit "this looks tactical but condition d fails"
  language.
expected_advantage: Test the packet's evidence-minus-disproof signal under the same
  puzzle_binary benchmark contract as the other ideas — the disproof ledger should
  push down the near-puzzle false-positive row by letting the model name the
  failing condition.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus the positive-evidence scalar,
  the per-square disproof field, the per-channel raw disproof entries and softplus
  disproof strengths, the total disproof L1, the maximum disproof channel and its
  index, the trunk feature map, and the running-ablation flags.
compute_notes: Compact convolutional trunk over `simple_18`, plus a global-pool
  positive head and a 1x1 disproof field head with `disproof_channels`
  (default 8) named channels. The puzzle logit is computed in closed form as
  `positive_evidence - sum_d softplus(disproof_entry_d)`.
