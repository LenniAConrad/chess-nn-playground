author: Claude
short_thesis: Embeds squares as multivectors in Cl(3,0) geometric algebra; composes
  threats via the non-commutative geometric product ab = a.b + a^b; learned rotors
  R = exp(B/2) act via x -> R x R^{-1}; per-grade pooled features capture rotational
  threat structure no real-arithmetic packet can express.
novelty_claim: Rotor-equivariant message passing over a Cl(3,0) multivector field
  with per-grade pooling; bespoke implementation distinct from any matrix-algebra
  baseline in the registry.
expected_advantage: Test the packet's proposed rotor / bivector mechanism under the
  same puzzle_binary benchmark contract as the other linear-algebra ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-grade message statistics, bivector / rotor
  norms, sandwich residual, and chirality diagnostics saved to prediction artifacts.
compute_notes: Compact convolutional trunk feeding an 8-blade multivector field;
  per-square rotor sandwich, six fixed chess-relation adjacencies, geometric-product
  messages pooled per grade, MLP head.
