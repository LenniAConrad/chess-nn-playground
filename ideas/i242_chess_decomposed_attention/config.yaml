idea_id: i242
run:
  name: i242_chess_decomposed_attention_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: chess_decomposed_attention
  input_channels: 18
  num_classes: 1
  embed_dim: 64
  num_heads: 4
  exchange_blocks: 2
  king_blocks: 2
  global_blocks: 2
  mlp_ratio: 2.0
  dropout: 0.1
  mechanism_family: king_path
  packet_profile: chess_decomposed_attention
training:
  epochs: 12
  batch_size: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0008
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 3
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: scout
  min_epochs: 6
  min_active_epochs: 6
  gradient_clip_norm: 1.0
  monitor: pr_auc
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: 'i242 chess-decomposed attention: NNUE king-centric inputs + i193 dual-stream
  decomposition + BT4 global self-attention, composed in a single trunk with a
  3-way softmax phase router. Scout config: 12 epochs, base scale, single seed
  for direct comparison to i193 (the parent idea).'
