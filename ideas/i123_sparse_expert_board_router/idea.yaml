short_thesis: Chess positions are heterogeneous. Endgames, king attacks, pawn races,
  blocked centers, and material imbalances may need different feature extractors.
  A sparse mixture of small board experts can route positions to specialized encoders
  without requiring a gi...
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2124_friday_shanghai_architecture_batch_5.md`;
  selects among heterogeneous expert computations through a sparse top-k router that
  uses both a deterministic board summary and a small CNN stem pool, rather than
  generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure routing under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus router diagnostics (router_probs, router_gate,
  expert_logits, expert_usage, load_balance_loss, switch_aux_loss, router_entropy,
  pairwise_expert_disagreement) saved to prediction artifacts.
compute_notes: Cheap routing summary plus small CNN stem; six small experts (local
  CNN, dilated CNN, token mixer, rank/file mixer, morphology-lite, compact MLP mixer)
  combined by sparse top-k gating.
