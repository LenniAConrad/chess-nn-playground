notes: Bespoke implementation of the Non-Puzzle Score-Field Bottleneck Network packet.
  The architecture instantiates the Tweedie/Vincent denoising-score identity at three
  noise scales over the simple_18 board, funnels the resulting score stack through
  a depthwise-convolutional bottleneck, and fuses with a compact board stem. The
  denoiser exposes a score-matching loss helper for the markdown's two-stage
  pretrain/freeze recipe, defaulting to the class-0-only filter.
