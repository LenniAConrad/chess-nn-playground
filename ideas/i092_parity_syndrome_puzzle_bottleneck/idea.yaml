short_thesis: 'Puzzle-like positions may produce distinctive parity or syndrome patterns
  over current-board facts: not just which local facts are present, but whether learned
  sparse XOR-like constraints are satisfied or violated. This tests a mod-2 algebraic
  bottleneck ra...'
novelty_claim: Bespoke parity-syndrome bottleneck. A compact CNN literal encoder feeds
  a low-rank sparse top-k bank of learned XOR-like checks; only pooled syndrome statistics
  (raw + top-k + soft-histogram + global scalars) reach the classifier head, enforcing
  a mod-2 algebraic bottleneck rather than generic CNN aggregation. Includes count,
  random-check, and no-sparsity ablation modes.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus syndrome diagnostics (`syndromes`, `syndrome_features`,
  syndrome mean/std/max/margin/entropy scalars, top-k syndromes/margins, soft histograms,
  literal mean/entropy, gate density, mechanism energy, proposal profile strength)
  saved to prediction artifacts.
compute_notes: Compact convolutional literal encoder plus learned low-rank sparse
  parity-check bank (top-k mask on `(left @ right^T)/sqrt(rank)`), differentiable
  mod-2 syndrome surrogate, soft-histogram and top-k pooling, MLP classifier head.
