idea_id: i237
name: Cayley Orthogonal Map Network
slug: cayley_orthogonal_network
status: implemented
created_at: '2026-05-05T17:00:00+00:00'
author: Claude
short_thesis: "Builds skew-symmetric A in R^{r x r} from board features and forms the Cayley map Q = (I-A)(I+A)^{-1} in SO(r); rotates a learned reference basis and uses identity-deviation features. Distinct from polar-Procrustes (i063) and QR -- Cayley is an algebraic identity, not a decomposition."
novelty_claim: Bespoke `nn.Module` implementation in `src/chess_nn_playground/models/cayley_orthogonal.py`; routed via the standard
  registry (not the generic ResearchPacketProbe).
expected_advantage: Hand-coded mechanism implements the algebra exactly per the
  source packet -- no profile-routing approximation.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (squeezed) for binary BCE.
compute_notes: One torch.linalg.solve per board on r x r (r=12), spectral-clipped Frobenius keeps Q well-conditioned.
implementation_status: implemented
trainer_entrypoint: ideas/i237_cayley_orthogonal_network/train.py
config_path: ideas/i237_cayley_orthogonal_network/config.yaml
model_path: ideas/i237_cayley_orthogonal_network/model.py
latest_result_path: null
notes: Bespoke implementation -- the algebraic operator described in the source
