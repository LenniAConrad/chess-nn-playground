idea_id: i169
name: Rank-File Memory Grid Net
slug: rank_file_memory_grid_net
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Maintain learned memory vectors for each rank and each file. Squares
  write into their rank/file memories, then rank/file memories write back to squares.
  This gives global rank/file communication without axial convolutions, line solves,
  or attention.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2216_friday_shanghai_architecture_batch_11.md`;
  implements stacked rank-file memory blocks (per-square write -> 8 rank + 8 file
  memories with learned per-rank/per-file priors -> read-back) instead of generic
  CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-block rank/file memory diagnostics (memory
  stacks, write stacks, read stack, rank/file energies, rank-file imbalance) saved
  to prediction artifacts.
compute_notes: Compact convolutional stem followed by stacked rank-file memory blocks;
  every block writes squares into 8 rank and 8 file memory vectors and reads the
  concatenated memories back to each square.
