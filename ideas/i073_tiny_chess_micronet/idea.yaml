idea_id: i073
name: Tiny Chess MicroNet
slug: tiny_chess_micronet
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: Tiny Chess MicroNet tests whether a 25k-parameter chess-aware sketch
  network can retain puzzle-binary signal under extreme capacity constraints.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2200_friday_shanghai_tiny_chess_micronet.md`;
  uses a generic mechanism profile over board-only features rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus descriptor energies, learned group norm fractions,
  malformed-king diagnostics, parameter count, and INT8-size estimate.
compute_notes: Low-rank 1x1 squeeze, residual depthwise micro line blocks, fixed
  rank/file/diagonal sketch bank, fail-closed king-zone pooling, material/state
  summaries, and a tiny ReLU6 descriptor head.
