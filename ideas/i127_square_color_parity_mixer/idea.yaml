author: Codex
short_thesis: The chessboard is naturally bipartite by square color. Bishops stay
  on one color, knights alternate color, kings and queens mix colors locally, and
  pawn captures switch files and square color. A neural model can explicitly split
  dark/light square subspaces...
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2133_friday_shanghai_architecture_batch_6.md`;
  implements a bespoke dark/light parity block mixer with piece-conditioned same-color
  and cross-color gates over board square tokens.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus square-color parity diagnostics for same-color
  gates, cross-color gates, block energy, and dark/light token energy.
compute_notes: Compact convolutional square encoder, learned dark/light block mixers,
  trainable piece-conditioned parity gates, and an MLP readout.
