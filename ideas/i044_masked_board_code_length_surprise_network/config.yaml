idea_id: i044
run:
  name: i044_masked_board_code_length_surprise_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: masked_board_code_length_surprise_network
  input_channels: 18
  num_classes: 1
  encoding: simple_18
  codec_width: 32
  codec_blocks: 3
  classifier_width: 64
  classifier_blocks: 4
  mask_chunk_size: 2
  surprise_clip_nats: 8.0
  append_coord_planes: true
  freeze_codec: false
  detach_surprise: false
  strict_tokenizer: false
  dropout: 0.1
  use_batchnorm: true
  mechanism_family: information
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Promoted from a research packet as a board-only mechanism-profile implementation.
  CRTK metadata is reporting-only.
