idea_id: i174
name: King-Zone Evidence Ledger
slug: king_zone_evidence_ledger
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Many real puzzles are ultimately about king safety or forcing geometry.
  A model can maintain a small set of learned evidence ledger slots around each king:
  attacker pressure, defender resources, escape space, blocker/pin pressure, and
  tempo/initiative evidence.'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-25_0031_saturday_shanghai_puzzle_binary_challengers.md`
  (Idea 5, "King-Zone Evidence Ledger"); replaces generic CNN pooling with three
  banks of learned evidence ledger slots (own-king, opp-king, global) updated by
  slot-conditioned gated attention over king-relative board features, and reads
  the puzzle logit out of the own/opp/diff/product/global ledger comparison the
  packet specifies.
expected_advantage: Test the packet's king-anchored ledger signal under the same puzzle_binary
  benchmark contract as BT4 — a soft bottleneck of width num_slots * slot_dim that
  isolates king-zone evidence from generic spatial features so near-puzzle hard
  negatives without real king-attack motifs are easier to reject.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus per-king ledger slot tensors,
  ledger difference and product tensors fed to the head, ledger energies, ledger
  attention entropies, and king-ring attention pressure diagnostics.
compute_notes: Compact convolutional trunk plus three banks of learned evidence
  ledger slots (num_slots * slot_dim each). Each bank runs ledger_layers rounds of
  slot-conditioned soft attention with a sigmoid gate and LayerNorm over the 64
  squares of the trunk feature map. Own/opp banks see the trunk concatenated with
  five king-relative coordinate channels; the global bank sees zeros in the king-
  relative slots so the three banks share one feature width.
