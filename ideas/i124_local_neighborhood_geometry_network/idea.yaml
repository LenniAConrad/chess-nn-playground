short_thesis: 'A puzzle-like position may be locally sharp: small current-board perturbations
  such as removing one piece plane, masking one square neighborhood, or reflecting
  a safe orientation can move its representation more than a quiet non-puzzle position.
  The classif...'
novelty_claim: Bespoke multi-view local-geometry readout over a deterministic, board-only
  perturbation set; reads tactical content off the *geometry* (delta norms, pairwise
  cosines, local covariance spectrum, anisotropy) of the V-view embedding cloud, not
  off a single-view pooled CNN feature or a learned attention map.
expected_advantage: Test the packet's proposed local-sharpness signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus local-geometry diagnostics (delta norms, cosine
  matrix off-diagonal, local covariance spectrum, mean/max pairwise distances,
  anisotropy ratio) saved to prediction artifacts.
compute_notes: Compact convolutional shared encoder applied to V deterministic, board-only
  views; geometry statistics computed in closed form on the V-view embedding cloud.
