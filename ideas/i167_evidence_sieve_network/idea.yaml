idea_id: i167
name: Evidence Sieve Network
slug: evidence_sieve_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Instead of refining logits, the model can refine features by repeatedly
  filtering them through learned evidence sieves. Each sieve stage produces a soft
  mask over channels and squares, passes selected evidence onward, and leaves a diagnostic
  trail.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2216_friday_shanghai_architecture_batch_11.md`;
  implements an explicit cascade of learned channel/spatial mask gates that filter
  the feature map and propagate only the selected evidence between stages, instead
  of generic CNN pooling or logit refinement.
expected_advantage: Test the packet's proposed evidence-sieving signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-stage channel and spatial masks, selected-evidence
  energies, and Bernoulli entropies of the masks saved to prediction artifacts.
compute_notes: Compact CNN trunk plus a stack of `num_sieves` evidence sieve stages
  (channel-mask MLP and spatial-mask conv head, residual conv on the selected evidence)
  before a small MLP head over pooled selected-evidence and pooled final trunk features.
