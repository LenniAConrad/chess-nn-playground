notes: 'Bespoke PolarProcrustesAlignmentNet over the simple_18 board tensor with a
  Simple18OwnOpponentTokenExtractor (32 occupied tokens, 22 features each, with
  side-to-move-relative own/opp masks), a PieceSquareTokenEncoder MLP, a
  RoleMatrixPooler that builds own/opp role matrices via masked-softmax learned
  role queries, a PolarProcrustesLayer that solves the orthogonal Procrustes
  problem via torch.linalg.svd of the cross-covariance and recovers the polar
  strain H = V Sigma V^T, and a PolarProcrustesHead MLP. The
  separate_matrix_stats_only, identity_alignment_only, random_orthogonal_alignment,
  batch_shuffled_opponent, material_only_matrices, role_pool_mean_only, and
  singular_values_only falsifiers from section 9 are exposed via the
  model.ablation config flag. Engine, source, verification, and CRTK metadata are
  never used as input.'
mechanism_family: linear_algebra
implementation_kind: bespoke_model
