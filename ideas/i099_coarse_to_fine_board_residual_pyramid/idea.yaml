notes: Research-packet promotion from `ideas/research_packets/chess_nn_research_2026-04-24_2054_friday_shanghai_residual_inspired_batch.md`.
  Bespoke two-level coarse-to-fine residual pyramid registered as `coarse_to_fine_board_residual_pyramid`
  in `src/chess_nn_playground/models/coarse_to_fine_residual_pyramid.py`. The coarse
  stream uses a deterministic 18-D simple_18 board summary plus pooled features at
