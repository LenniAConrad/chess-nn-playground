idea_id: i117
name: Prototype Patch Dictionary Network
slug: prototype_patch_dictionary_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Puzzle-like positions may contain local motifs, but a standard CNN may
  hide them in distributed filters. A learned patch dictionary can expose motif assignments,
  reconstruction residuals, and prototype activation histograms.
novelty_claim: Bespoke patch-dictionary classifier that decomposes each board into
  per-square patch embeddings, decodes them against a small learned dictionary of
  motif prototypes via a cosine-softmax soft assignment, and reads the resulting motif
  assignment map, reconstruction residual, and prototype activation histogram from
  the puzzle head. The same prototype directions are used in both the assignment
  softmax and the reconstruction sum, which is what makes the diagnostics
  interpretable as motif use and reconstruction failure rather than an arbitrary
  channel map. Materially distinct from the shared ResearchPacketProbe scaffold and
  from a generic CNN that does not couple its channels to a reconstruction.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus the motif assignment map (`assignment_map`,
  `soft_assignment`, `top1_motif_map`), the reconstruction map and residual map, the
  prototype activation histogram, per-prototype residual mass, per-square residual
  energy, prototype-usage entropy, the learned temperature, and pooled patch /
  reconstruction / residual embeddings.
compute_notes: A small `_PatchEncoder` produces per-square patch embeddings; a
  learned dictionary of `num_prototypes` prototypes drives a cosine-softmax soft
  assignment, the resulting convex combination reconstructs each patch, and the
  puzzle head reads the histogram, the pooled residual, and the pooled patch /
  reconstruction embeddings.
