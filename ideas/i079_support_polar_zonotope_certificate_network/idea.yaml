idea_id: i079
name: Support-Polar Zonotope Certificate Network
slug: support_polar_zonotope_certificate_network
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: SPZC-Net builds a board-dependent latent zonotope from learned
  square-pair generators and tests containment against a learned symmetric polar
  body via the closed-form support-function residual; the puzzle logit is a
  calibrated monotone function of the largest violation.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-28_0718_tuesday_new_york_support_polar_zonotope.md`;
  central computation is a closed-form support-function evaluation of a learned
  zonotope against a learned polar body with an explicit certificate, rather than
  generic CNN pooling, attention pooling, or solver-backed convex layers.
expected_advantage: Test the packet's proposed sparse-extreme-interaction signal
  under the same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus support-function diagnostics (residual,
  violations, h_plus, h_minus, width, center_projection, per-pair projections,
  polar directions and thresholds, winning direction/sign, auxiliary logit, gate
  mass) saved to prediction artifacts.
compute_notes: Compact convolutional trunk, square-token projection, ordered-pair
  generator and gate MLPs over `(B, 64, 64, 2*d_token + rel_dim)`, learned polar
  directions and softplus thresholds, closed-form support-function evaluation,
  and a calibrated monotone residual head.
implementation_status: implemented
trainer_entrypoint: ideas/i079_support_polar_zonotope_certificate_network/train.py
config_path: ideas/i079_support_polar_zonotope_certificate_network/config.yaml
