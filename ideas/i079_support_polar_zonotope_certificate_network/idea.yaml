latest_result_path: null
notes: Bespoke implementation of the Support-Polar Zonotope Certificate Network
  thesis. Closed-form support function `h_{Z_x}(u) = <u, c_x> + sum_{i!=j}
  |<u, g_{ij}(x)>|` is evaluated against a learned symmetric polar body and the
  puzzle logit is a calibrated monotone function of the largest residual; CRTK
  metadata is reporting-only.
mechanism_family: convex
implementation_kind: bespoke_model
