author: Codex
short_thesis: '- Idea name: Matrix-Pencil Generalized Spectrum Bottleneck - High-level
  linear algebra concept: matrix pencils, generalized eigenvalue problems, and generalized
  Raylei...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2101_friday_shanghai_matrix_pencil.md`;
  central operator is batched Cholesky + symmetric eigendecomposition of the whitened
  matrix pencil L^{-1} A L^{-T} for a learned PSD pair (A(x), B(x)) built from
  current-board occupied tokens, plus generalized Rayleigh quotients along
  learned probe directions. Not a CNN/residual/attention/sheaf/transport/move-delta
  variant.
expected_advantage: Test the packet's proposed generalized relative-spectrum signal
  under the same puzzle_binary benchmark contract as the other ideas, with the
  separate_spectra_only, trace_ratio_only, batch_shuffled_b, random_factors,
  single_matrix_spectrum, mean_pool_head, and material_only_tokens falsifiers
  from section 9 exposed via `model.ablation`.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus matrix-pencil diagnostics (generalized_eigenvalues,
  log_generalized_eigenvalues, rayleigh_probes, matrix_a, matrix_b, eigenvalues_a,
  eigenvalues_b, trace_a, trace_b, trace_ratio, condition_b,
  proportionality_diagnostic, mechanism_energy, active_token_count,
  ablation_active).
compute_notes: Per-batch cost is dominated by a single batched Cholesky of B and
  one batched symmetric eigendecomposition of the M x M whitened pencil C_sym,
  plus separate eigendecompositions of A and B. With default M = 16, K = 16,
  D = 64 the whole pipeline is sub-millisecond per batch on GPU. matrix_eps * I
  keeps B positive definite by construction.
