notes: 'Bespoke MatrixPencilGeneralizedSpectrumNet over the simple_18 board tensor
  with a Simple18OccupiedTokenExtractor (32 occupied tokens, 22 features each), a
  PieceSquareTokenEncoder MLP, a LowRankBoardMatrixPair layer that builds the
  PSD matrix pair (A, B) via masked-softmax token summaries, a
  GeneralizedSpectrumLayer that computes generalized eigenvalues via Cholesky +
  triangular solves + eigvalsh on the whitened pencil L^{-1} A L^{-T} together
  with separate spectra and learned generalized Rayleigh probe quotients, and a
  MatrixPencilHead MLP. The separate_spectra_only, trace_ratio_only,
  batch_shuffled_b, random_factors, single_matrix_spectrum, mean_pool_head, and
  material_only_tokens falsifiers from section 9 are exposed via the
  model.ablation config flag. Engine, source, verification, and CRTK metadata
  are never used as input.'
mechanism_family: linear_algebra
