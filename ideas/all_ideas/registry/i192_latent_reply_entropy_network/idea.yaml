idea_id: i192
name: Latent Reply Entropy Network
slug: latent_reply_entropy_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: A forcing puzzle often reduces the opponent's viable reply distribution.
  A near-puzzle may have many replies that keep the position acceptable. The network
  can learn a reply entropy proxy without engine labels.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  uses a generic mechanism profile over board-only features rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus reply entropy, top-reply concentration, top-2
  gap, effective reply count, reply probabilities, and per-reply-family diagnostics
  saved to prediction artifacts.
compute_notes: Compact convolutional trunk plus deterministic reply/resource token
  proposal; learned safe-reply scorer and temperature softmax feed entropy features
  into the classifier.
