idea_id: i081
name: Forcing-Response Front-Door Bottleneck
slug: forcing_response_front_door_bottleneck
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: 'Build a model whose binary head can only read a sparse causal witness
  bottleneck `Z_c` over deterministic legal-move response envelopes. The board is
  converted into a set of move-response mediator nodes, encoded with a permutation-invariant
  move graph, and the binary head consumes only `Z_c`, structurally enforcing the
  front-door surrogate `X -> M -> Y`.'
novelty_claim: Bespoke front-door surrogate that routes the puzzle logit only through
  a sparse witness bottleneck over legal-move response envelopes built by a deterministic
  rule-intervention feature builder; the board stem cannot bypass the bottleneck.
expected_advantage: Near-puzzle false positives should fall because positions whose
  tactical-looking surface is not backed by a few clean forcing witnesses cannot reach
  the binary head with high probability.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus front-door diagnostics (`z_c`, `witness_gates`,
  `defense_gap`, `reply_pressure`, `fine_logits`, `masked_pred`, ...) saved to prediction
  artefacts.
compute_notes: Compact 4-block `BoardRuleStem` over 18 + 12 channels, 64-dim move
  and response MLPs, 2 `MoveRelationGraphBlock` layers over up to 256 legal candidates,
  hard-concrete sparse witness gate with `K = 4`, and a `LayerNorm`-bounded `Z_c`
  in `R^{64}` consumed by a small binary MLP head.
