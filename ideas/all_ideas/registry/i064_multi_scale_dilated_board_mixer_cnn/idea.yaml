notes: 'Bespoke MultiScaleBoardMixerCNN over the simple_18 board tensor. The trunk
  appends 4 deterministic coordinate planes (rank, file, center-distance,
  side-to-move-relative forward direction) via BoardCoordinatePlanes, then runs
  num_blocks MultiScaleDilatedMixerBlock blocks with parallel 3x3 dilation 1/2/3
  + 1x1 branches concatenated and projected back to width with a residual + BN. A
  GlobalContextGate emits a sigmoid channel scale from mean+max global pooling and
  modulates the trunk before the mean+max pooled MultiScaleHead returns a single
  puzzle logit. Section-6 falsifiers single_dilation_matched, no_dilation_3,
  no_coordinate_planes, no_global_context_gate, small_width_control and
  residual_cnn_matched_params are exposed via the model.ablation config flag.
  Engine, source, verification, and CRTK metadata are never used as input.'
