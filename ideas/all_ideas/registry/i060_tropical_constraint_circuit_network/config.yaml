idea_id: i060
run:
  name: i060_tropical_constraint_circuit_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: tropical_constraint_circuit_network
  input_channels: 18
  num_classes: 1
  literal_channels: 32
  clause_count: 24
  monomials_per_clause: 12
  clause_rank: 8
  softmin_temperature: 0.25
  head_hidden: 128
  high_temperature_factor: 8.0
  ablation: none
  dropout: 0.1
  mechanism_family: logic
  packet_profile: tropical_constraint_circuit_network
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Promoted from a research packet as a board-only bespoke implementation of
  the min-plus tropical constraint-circuit thesis. CRTK metadata is reporting-only.
