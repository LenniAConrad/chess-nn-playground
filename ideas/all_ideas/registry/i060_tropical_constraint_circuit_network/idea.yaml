notes: 'Bespoke TropicalConstraintCircuitNet over the simple_18 board tensor with a
  Simple18LiteralCostEncoder (1x1 conv plus four fixed coordinate planes and a
  softplus to keep literal costs nonnegative), a TropicalClauseLayer with low-rank
  nonnegative weights a = softplus(U V) and softplus biases, a TropicalMarginPool
  emitting clause soft-min cost, best-second margin, softmin entropy, and mean
  monomial cost per clause, and a TropicalConstraintHead. The sum_product_clause,
  mean_literal_pool, literal_square_shuffle, high_temperature_softmin, and
  material_only_literals falsifiers from section 9 are exposed via the
  model.ablation config flag. Engine, source, verification, and CRTK metadata are
  never used as input.'
