output_heads: One puzzle logit plus tropical-circuit diagnostics
  (clause_softmin_cost, clause_value, clause_margin, clause_entropy,
  clause_mean_cost, effective_monomials_per_clause, mechanism_energy).
compute_notes: Low-rank nonnegative clause weights cost O(K * M * R + R * L) per
  forward, with K=24, M=12, R=8, L=2048 by default; literal costs are flattened
