idea_id: i233
name: Tracy-Widom Level-Spacing Network
slug: tracy_widom_level_spacing_network
status: implemented
created_at: '2026-05-05T15:50:00+00:00'
author: Claude
short_thesis: 'Computes eigenvalues of a learned chess Hermitian operator and classifies
  puzzle-likeness from nearest-neighbor level-spacing statistics: Wigner-Dyson (chaotic,
  GOE/GUE) versus Poisson (integrable). Mean spacing ratio <r> and spectral form factor
  are the central invariants.'
novelty_claim: Bespoke level-spacing readout over a learned Hermitian board operator;
  uses bulk-spectrum correlations (mean spacing ratio, RBF histogram, spectral form
  factor, Poisson/GOE/GUE log-likelihoods) rather than eigenvalue positions.
expected_advantage: Test the packet's proposed level-statistics mechanism under the
  same puzzle_binary benchmark contract as the other linear-algebra ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus bulk-spectrum diagnostics (mean spacing ratio,
  spacing histogram, spectral form factor, regime softmax, per-regime
  log-likelihoods).
compute_notes: Compact convolutional trunk feeding a learned Hermitian 64x64 board
  operator; eigvalsh, 5-point unfolding, RBF histogram, spectral form factor at
  num_form_factor_taps, Poisson/GOE/GUE log-likelihoods, MLP head.
