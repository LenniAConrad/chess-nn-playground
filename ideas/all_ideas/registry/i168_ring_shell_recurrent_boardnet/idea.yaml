name: Ring-Shell Recurrent BoardNet
slug: ring_shell_recurrent_boardnet
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Important chess context often radiates from anchors: kings, center
  squares, edges, and promotion zones. Summarize the board in fixed rings/shells around
  these anchors and process the shells with a small recurrent model.'
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-24_2216_friday_shanghai_architecture_batch_11.md`;
  implements Chebyshev-shell pooling around king/center/edge/promotion anchors followed
  by a shared GRU over the radial sequence, instead of generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-anchor / per-ring radial trail (ring features,
  energies, GRU hidden state progression, anchor positions) saved to prediction artifacts.
compute_notes: Compact convolutional trunk plus Chebyshev-shell pooling around seven
  anchors, processed by a shared GRU over the radial sequence before a small MLP head.
