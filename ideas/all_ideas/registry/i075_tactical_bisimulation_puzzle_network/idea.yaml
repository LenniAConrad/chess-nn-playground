short_thesis: Tactical Bisimulation Puzzle Network tests whether a generic board mechanism
  improves puzzle-binary classification.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-25_0113_saturday_shanghai_tactical_bisimulation.md`;
  learns a board-only latent space whose distance is shaped by a Bellman-style
  bisimulation residual against a learnable prototype bank rather than by raw
  board-texture pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus bisimulation diagnostics (prototype distances,
  successor signature stats, Bellman-style bisim residual, move proposer entropy)
  saved to prediction artifacts.
compute_notes: Compact convolutional trunk, learnable move proposer over 32 board-only
  candidate moves, learned latent transition, prototype bank of behavioural cells,
  and a Bellman-style bisimulation residual head.
