idea_id: i015
run:
  name: idea_i015_material_locked_tactical_dro_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: material_locked_tactical_dro
  input_channels: 18
  num_classes: 1
  channels: 96
  depth: 3
  hidden_dim: 128
  rho: 0.08
  dropout: 0.1
  use_batchnorm: true
training:
  epochs: 20
  batch_size: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: material_locked_dro
  material_locked_dro:
    gamma_near: 2.0
    lambda_robust: 0.5
    lambda_budget: 0.02
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: "Board-only material-locked tactical mask DRO approximation."
