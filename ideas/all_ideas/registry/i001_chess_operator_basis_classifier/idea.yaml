idea_id: i001
name: Chess Operator Basis Classifier
slug: chess_operator_basis_classifier
status: implemented
created_at: '2026-04-25T00:43:00+08:00'
author: Codex
short_thesis: A chess position classifier should mix a small learned basis of rule-shaped
  square operators, rather than rely only on generic convolution or dense attention.
novelty_claim: Unlike a plain CNN, BT4 tower, bitboard-shift polynomial, or Schur-ray
  line solver, this idea uses a task-agnostic low-rank mixture of multiple fixed chess
  relation operators as the main classification block.
expected_advantage: Better general chess position classification, especially when
  labels depend on nonlocal line, jump, pawn, king-zone, and material-context interactions.
target_task: General chess position classification; first benchmark is puzzle_binary
  with source classes 0/1 mapped to target 0 and source class 2 mapped to target 1.
input_representation: 'Current-board tensor only: simple_18 or lc0_bt4_112 plus deterministic
  coordinate and relation masks. No engine metadata.'
output_heads: Configurable classification head; first benchmark uses one puzzle logit.
compute_notes: Sparse 64x64 relation operators plus low-rank channel mixing. Expected
  cost is close to a small residual CNN and below dense 64-token attention.
