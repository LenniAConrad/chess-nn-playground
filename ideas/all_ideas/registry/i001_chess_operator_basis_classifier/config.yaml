idea_id: i001
run:
  name: idea_i001_chess_operator_basis_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: chess_operator_basis_classifier
  input_channels: 18
  num_classes: 1
  hidden_dim: 96
  blocks: 4
  relation_operators:
  - identity
  - rank_ray
  - file_ray
  - diagonal_ray
  - antidiagonal_ray
  - knight
  - king
  - white_pawn_attack
  - black_pawn_attack
  - king_zone
  dropout: 0.1
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: "Implemented GPU-required benchmark config for the chess operator basis architecture."
