idea_id: i096
name: Oriented Matroid Covector Bottleneck
slug: oriented_matroid_covector_bottleneck
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Puzzle-like positions may be characterized by sign-pattern arrangements
  of occupied pieces in learned tactical coordinate systems. A covector bottleneck
  records which side of learned hyperplanes each occupied piece lies on, then pools
  sign-pattern histograms.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-24_2048_friday_shanghai_architecture_batch_2.md`;
  bespoke piece-token tokenizer plus learned hyperplane arrangement and a sign-pattern
  / role-conditioned covector pooling head with explicit pairwise sign-agreement
  diagnostics, distinct from the shared research-packet probe.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus oriented-matroid covector diagnostics (sign-pattern
  histograms, pairwise sign agreement, per-role per-hyperplane sign entropy, role
  histogram, sign / score moments, mode code) saved to prediction artifacts.
compute_notes: Occupied-piece tokenizer over the simple_18 planes feeds a small
  MLP token encoder; a learned unit-normalised hyperplane arrangement produces signed
  projections; a `tanh`-smoothed oriented-matroid covector is pooled into sign-pattern,
  pairwise sign-agreement, and role-conditioned summaries; a small MLP head returns
  one logit. Runs on CPU/GPU; no extra dependencies.
