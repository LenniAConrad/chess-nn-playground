short_thesis: Relational Query Algebra Network tests learned joins over current-board
  chess fact tables for puzzle-binary classification.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-24_2139_friday_shanghai_relational_query_algebra.md`;
  uses a generic mechanism profile over board-only features rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus relational-query diagnostics over learned join
  strength, relation usage, query support entropy, material, and CNN energy.
compute_notes: Builds piece and square fact tables, applies learned piece-square,
  piece-piece, and line-between semijoin queries over fixed chess-square relations,
  then fuses those query summaries with a compact CNN board summary.
