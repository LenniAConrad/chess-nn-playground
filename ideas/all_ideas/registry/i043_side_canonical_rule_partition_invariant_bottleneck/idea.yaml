short_thesis: '- Idea name: Side-Canonical Rule-Partition Invariant Bottleneck, abbreviated
  `SCRIB`. - One-sentence thesis: Puzzle-likeness should be predicted from side-relative
  tac...'
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-21_0732_tuesday_pdt_rule_partition_bottleneck.md`;
  the central operator is a deterministic side-to-move canonicalizer feeding a
  variational information bottleneck whose latent is forced toward invariance to
  the rule partitions (phase, side-relative material advantage, absolute color)
  through gradient-reversed adversary heads. Materially distinct from the shared
  mechanism-profile probe.
expected_advantage: Test the packet's proposed side-canonical rule-partition signal
  under the same puzzle_binary benchmark contract as the other ideas, with a
  materially distinct VIB + GRL adversary architecture rather than a shared
  mechanism profile.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus SCRIB diagnostics (z, mu, logvar, kl,
  phase_logits, adv_logits, color_logits, phase_labels, adv_labels, color_labels,
  group_ids, total_material, side_relative_advantage) saved to prediction
  artifacts.
compute_notes: Compact two-stage convolutional trunk at default widths (64, 96)
  on the canonical 17-channel tensor, with a 128-d Gaussian VIB and three small
  gradient-reversed adversary heads; no candidate set or move generation.
