idea_id: i158
name: Neural Decision Forest BoardNet
slug: neural_decision_forest_boardnet
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Chess puzzle-likeness may be piecewise: different board regimes require
  different cues. A differentiable decision forest on top of a CNN feature vector
  can model soft oblique splits and leaf predictors without a sparse expert router.'
novelty_claim: Bespoke differentiable neural decision forest for the puzzle_binary
  contract. A compact CNN trunk produces a pooled board feature vector, and a
  forest of soft binary trees with oblique splits and learned leaf logits returns
  the puzzle logit; the routing is fully soft so every leaf receives gradient on
  every sample, without a sparse expert router.
expected_advantage: Test the packet's "piecewise board regimes need different cues"
  thesis under the same puzzle_binary benchmark contract as the other ideas. Per-tree
  leaf usage entropy, dominant-leaf indices, and per-tree disagreement quantify
  whether the forest actually specialises trees and leaves to different regimes.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-tree leaf-usage entropy, per-tree
  disagreement, dominant-leaf index/probability, mean split probability,
  trunk/feature energies, and split/leaf parameter norms saved to prediction
  artifacts.
compute_notes: Compact convolutional trunk plus a fully soft differentiable decision
  forest (`num_trees` balanced trees at depth `tree_depth`) over the pooled board
  feature vector.
