idea_id: i151
name: Auxiliary Reconstruction BoardNet
slug: auxiliary_reconstruction_boardnet
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: A classifier trunk may discard board detail too early. Add a lightweight
  decoder that reconstructs safe current-board planes from the latent feature map,
  using reconstruction only as an auxiliary training loss. The classifier still sees
  no future or engine...
novelty_claim: Bespoke CNN encoder with a pooled puzzle classifier and a lightweight
  auxiliary decoder that reconstructs configurable current-board input planes. Reconstruction
  is exposed as an auxiliary BCE objective with `lambda_recon` so the trunk is regularised
  without leaking future or engine information.
expected_advantage: Test the packet's proposed reconstruction regulariser under the
  same puzzle_binary benchmark contract as the other ideas, with `reconstruction_error`
  and per-plane BCE diagnostics exposing whether the encoder actually preserves board
  detail.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-square reconstruction logits for the selected
  input planes, the reconstructed probabilities, the reconstruction-error diagnostic,
  and per-plane BCE diagnostics.
compute_notes: CNN encoder of `encoder_depth` residual blocks at `encoder_width`
  channels, an `AdaptiveAvgPool` classifier head of width `hidden_dim`, and a small
  decoder of `decoder_width` channels emitting per-square logits over the selected
  input planes.
