idea_id: i182
name: Motif Tensor Factorization Network
slug: motif_tensor_factorization_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Puzzle signal is often a multiplicative relation among typed roles
  (attacker x target x defender x line-relation x tempo); a low-rank CP factorization
  of a 4-way motif tensor models that conjunction directly so the puzzle logit
  collapses if any leg is missing.'
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-25_0037_saturday_shanghai_puzzle_architecture_batch_2.md`
  (Idea 6, "Motif Tensor Factorization Network"); replaces a generic CNN puzzle
  head with a CP factorization on attacker/target/defender role embeddings and a
  learned line-relation factor, with motif-pooled statistics
  (top motifs, motif entropy, side-to-move motif contrast, near-disproof leg
  strength) feeding the final logit.
expected_advantage: Test the packet's multiplicative-motif signal under the same
  puzzle_binary benchmark contract as the other ideas. The conjunction should
  push down the near-puzzle false-positive row by refusing to score a position
  highly unless every CP leg (attacker, target, defender, line relation) is
  simultaneously strong.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus the full motif score tensor,
  the top-K motif scores and indices, motif entropy, the own/opponent/contrast
  scalars from the side-to-move flipped intervention, the near-disproof leg
  strength, the per-role top-K square indices, the trunk feature map, and the
  running-ablation flags.
compute_notes: Compact convolutional trunk over `simple_18`, three 1x1 selector
  heads picking the top-`top_candidates` (default 8) squares per role, three
  role-specific token MLPs producing rank-`R` (default 24) CP factors, a small
  relation MLP over a 15x15 (delta_rank, delta_file) embedding, and a final head
  reading the pooled motif statistics.
