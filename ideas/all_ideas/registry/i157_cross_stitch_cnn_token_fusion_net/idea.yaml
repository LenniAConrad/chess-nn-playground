idea_id: i157
name: Cross-Stitch CNN-Token Fusion Net
slug: cross_stitch_cnn_token_fusion_net
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Late fusion between a CNN branch and a piece-token branch may be too
  weak. A cross-stitch network can let the branches exchange information at multiple
  depths through learned linear mixing, while still keeping the model practical.
novelty_claim: Bespoke cross-stitch fusion architecture for the puzzle_binary contract.
  A convolutional board branch and an occupied-piece token branch share the same
  channel width and exchange information at every stage through per-group ``2x2``
  cross-stitch matrices initialised to the identity; the mixed summaries are
  injected back into each branch through learned adapters.
expected_advantage: Test the packet's "cross-depth fusion is stronger than late
  concat" thesis under the same puzzle_binary benchmark contract as the other
  ideas. Off-diagonal cross-stitch energies quantify how much board <-> token
  transfer the model learns at each depth.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-stage cross-stitch matrices, off-diagonal
  energies, board <-> token transfer magnitudes, and pre/post stitching branch
  norms saved to prediction artifacts.
compute_notes: Compact convolutional board branch plus a token-mixer branch over
  occupied pieces, coupled at every stage through small per-group ``2x2``
  cross-stitch matrices and per-stage adapters.
