idea_id: i186
name: Legal-Reaction Bottleneck Network
slug: legal_reaction_bottleneck_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: A real puzzle is not merely a position with a threat. It is a position
  where normal-looking defensive reactions fail or are too few. Near-puzzles often
  contain pressure, but the opponent still has many valid ways to defuse it.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke board-only legal-reaction bottleneck network that softmaxes a per-square
  defender-reaction logit over opponent-piece squares, reads the effective reaction
  count `K_eff = exp(H(p))` and feeds threat-side pressure plus the bottleneck pool
  through a small head with explicit `defense_gap` and `reply_pressure` scalars.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus reaction-bottleneck diagnostics (`reaction_logits`,
  `reaction_distribution`, `effective_reaction_count`, `reaction_entropy`,
  `reaction_max_strength`, `defender_count`, `own_piece_pressure`, `defense_gap`,
  `reply_pressure`, `bottleneck_kl`, `trunk_energy`).
compute_notes: Compact convolutional trunk plus a defender-reply softmax over
  opponent-piece squares, a threat-side sigmoid pool over own-piece squares and a
  small MLP head over the bottleneck pool, threat pool and bottleneck scalars.
