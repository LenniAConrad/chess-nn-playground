author: Codex
short_thesis: Puzzle-like positions may be those that lie near the boundary of several
  learned safe convex feasibility regions in board-feature space. An unrolled projection
  layer can test whether distance-to-feasibility is useful...
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-24_2048_friday_shanghai_architecture_batch_2.md`;
  bespoke unrolled projected-gradient feasibility module over learned half-space and
  ball constraints with an explicit feasibility-residual head, distinct from the
  shared research-packet probe.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus convex feasibility diagnostics (per-constraint
  violations, projected latent, feasibility residual, projection path stats, mode code)
  saved to prediction artifacts.
compute_notes: Compact convolutional encoder plus an unrolled projected-gradient
  feasibility step over a bank of learned half-spaces and balls, followed by a small
  MLP residual-feature head. Runs on CPU/GPU; no extra dependencies.
