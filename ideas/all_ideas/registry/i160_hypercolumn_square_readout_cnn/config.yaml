idea_id: i160
run:
  name: i160_hypercolumn_square_readout_cnn_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: hypercolumn_square_readout_cnn
  input_channels: 18
  num_classes: 1
  trunk_width: 64
  trunk_depth: 4
  hyper_width: 32
  evidence_width: 32
  hidden_dim: 128
  topk_squares: 4
  dropout: 0.1
  use_batchnorm: true
  ablation: none
  packet_profile: hypercolumn_square_readout_cnn
  mechanism_family: spatial_cnn
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Promoted from a research packet as a board-only hypercolumn square readout
  implementation. CRTK metadata is reporting-only.
