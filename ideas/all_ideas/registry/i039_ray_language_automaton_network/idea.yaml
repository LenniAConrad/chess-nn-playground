short_thesis: '- Idea name: Ray-Language Automaton Network, abbreviated `RLAN`. -
  One-sentence thesis: Many chess puzzle-like positions contain short, ordered, gapped
  piece strings a...'
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-21_0719_tuesday_local_ray_language_automaton.md`;
  central operator is a family of differentiable log-semiring weighted finite automata
  over side-relative chess-ray piece-token strings, not a CNN, sheaf, or transport
  scaffold.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas, with a materially distinct
  ray-language operator rather than a shared mechanism profile.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus ray-language diagnostics (ray scores, axis
  maxima, per-batch automaton diversity) saved to prediction artifacts.
compute_notes: 32 weighted finite automata with 8 log-semiring states each over up
  to 84 oriented rays of length 8; recurrence cost O(B*S*T*R*Q^2) matching the
  research packet's compute estimate.
