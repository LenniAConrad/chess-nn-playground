short_thesis: '- Idea name: Determinantal Tactical Volume Bottleneck - One-sentence
  thesis: Puzzle-like positions may differ by learned occupied-piece role-volume
  collapse or diversity measured through log-determinants of role-gated PSD token
  kernels.'
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-24_2044_friday_shanghai_determinantal_volume.md`;
  central operator is a role-gated PSD log-determinant over occupied piece tokens,
  not a CNN, attention, sheaf, transport, or move-delta bottleneck.
expected_advantage: Test the packet's proposed log-volume signal under the same
  puzzle_binary benchmark contract as the other ideas, with a diagonal-only ablation
  exposed via `model.ablation` for the central falsifier.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus determinantal-volume diagnostics (log_volume,
  trace, gate_mass, top_eig_ratio, active_count, mechanism_energy).
compute_notes: Sylvester/Weinstein log-det at O(B * R * q^3) with q = role_rank,
  so total cost is dominated by O(B * R * N * q) gram contractions over up to 32
  occupied tokens.
