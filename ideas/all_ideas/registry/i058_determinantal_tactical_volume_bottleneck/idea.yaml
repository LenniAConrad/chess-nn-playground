notes: 'Bespoke Determinantal Tactical Volume Bottleneck with a
  Simple18OccupiedTokenExtractor, a PieceSquareTokenEncoder, a RoleGatedPSDVolume
  module that materialises K_r = D_r Phi A_r A_r^T Phi^T D_r + eps I and computes
  log det via the Sylvester identity in (q x q) space, and a DeterminantalVolumeHead
  that fuses role statistics with a deterministic global broadcast vector. The
  diagonal-trace falsifier is exposed via the model.ablation=diagonal_trace_only
  config flag. Engine, source, verification, and CRTK metadata are never used as
  input.'
