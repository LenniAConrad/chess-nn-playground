idea_id: i183
name: Tempo-Alignment Gate Network
slug: tempo_alignment_gate_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Many near-puzzles are tactical-looking for the wrong side or require
  a tempo that the side to move does not have. The model should explicitly gate static
  tactical danger by side-to-move tempo.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-25_0037_saturday_shanghai_puzzle_architecture_batch_2.md`
  (Idea 7, "Tempo-Alignment Gate Network"); replaces a generic CNN puzzle head with
  a multiplicative conjunction of (i) an undirected static tactical danger field,
  (ii) a per-square sigmoid alignment between the local attacker side and the side-to-move
  signal, and (iii) a global tempo gate over pooled trunk features and material totals,
  with a side-to-move-flipped counterfactual contrast feeding the final logit.
expected_advantage: Test the packet's tempo-alignment signal under the same puzzle_binary
  benchmark contract as the other ideas. The conjunction should push down the near-puzzle
  false-positive row by refusing to score a position highly when the static tactical
  danger is for the wrong side or when the side-to-move tempo gate is small.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus the danger field, the signed
  side-of-attacker field, the per-square alignment field, the own/opp/gap/gated pressure
  scalars, the tempo gate, mean/max danger scalars, the side-to-move-flipped counterfactual
  pressure / tempo gate / flip contrast scalars, the trunk feature map, and the running-ablation
  flags.
compute_notes: Compact convolutional trunk over `simple_18`, a 1x1 danger head, a
  1x1 side-of-attacker head over the trunk concatenated with white/black occupancy
  summaries, learnable scalar (gamma, beta) for the per-square sigmoid alignment,
  a small MLP tempo gate over pooled trunk features plus white/black material totals
  plus stm, a multiplicative conjunction of tempo gate * alignment * relu(danger),
  and a side-to-move-flipped counterfactual stream re-running the trunk so the contrast
  is a faithful intervention.
