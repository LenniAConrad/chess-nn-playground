idea_id: i196
name: Source-Invariant Puzzle Bottleneck
slug: source_invariant_puzzle_bottleneck
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: The dataset has three source groups. A model may accidentally learn
  source artifacts instead of puzzle structure. This architecture tries to preserve
  puzzle signal while removing source identity from the main representation.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke board-only symmetry-orbit invariant bottleneck that uses the symmetry
  orbit (identity, file flip, rank flip, 180-rotation) as a proxy for source
  variation, projects each per-view code through a shared MLP bottleneck, and
  routes only the orbit-mean code (with a learned residual-axis subtraction) to
  the puzzle head, exposing the per-view residual energy as a separate auxiliary
  logit and diagnostic.
expected_advantage: Forces the main puzzle representation into the symmetry-orbit
  invariant subspace and removes the dominant residual axis, so any signal that
  lives purely outside the invariant subspace (a proxy for source-specific
  encoding artifacts) is excluded from the puzzle prediction path.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus invariant-bottleneck diagnostics
  (`invariant_code_norm`, `main_code_norm`, `residual_energy`,
  `residual_direction_strength`, `orthogonalize_gate`, `aux_residual_logit`,
  `view_consistency`, `num_views`, `mechanism_energy`, `symmetry_residual`,
  `proposal_profile_strength`, `proposal_keyword_count`).
compute_notes: Compact convolutional trunk shared across a fixed symmetry orbit
  (identity, file flip, rank flip, 180-rotation), per-view mean+max pooling, a
  shared bottleneck MLP into a `code_dim`-vector code, an orbit-mean code with a
  learned smooth Gram-Schmidt-style residual-direction subtraction, and a small
  puzzle head plus an auxiliary residual head.
