idea_id: i011
run:
  name: idea_i011_vetoselect_lc0bt4
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: lc0_bt4_112
  cache_features: false
model:
  name: vetoselect_positive_claim_abstention
  input_channels: 112
  num_classes: 1
  channels: 64
  num_blocks: 4
  value_channels: 16
  value_hidden: 128
  se_channels: 16
  dropout: 0.1
  use_batchnorm: true
training:
  epochs: 20
  batch_size: 384
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  class_weighting: balanced
  loss: veto_select
  veto_select:
    warmup_epochs: 1
    tau_e: 1.5
    d_max: 0.85
    gamma_decoy: 1.0
    lambda_anchor: 0.15
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 11
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: 'VetoSelect A2: LC0 BT4-style board-only positive-claim abstention with self-mined
  decoy negatives after warmup. Paper-grade default: convergence budget with validation
  plateau, minimum active epochs, LR reduction, and full artifact validation.'
