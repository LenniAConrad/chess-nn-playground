  uses a learned tensor-ring contraction over square tokens with role-gated cyclic
  traces of low-rank cores rather than generic CNN-only pooling or randomized polynomial
  sketching.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-order tensor-ring contractions, role-gate
  activity / entropy, pattern softmax weights, and core Frobenius norms saved to prediction
  artifacts.
compute_notes: Square-token encoder with coordinate embeddings, learned per-square
  role gates, low-rank tensor-ring cores cyclically contracted across patterns, and
  a small CNN-stem summary branch.
