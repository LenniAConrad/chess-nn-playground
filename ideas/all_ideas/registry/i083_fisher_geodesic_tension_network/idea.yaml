idea_id: i083
name: Fisher-Geodesic Tension Network
slug: fisher_geodesic_tension_network
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: Fisher-Geodesic Tension Network maps each board into several learned
  source/hinge/sink categorical distributions on the 64-square simplex and classifies
  puzzle-likeness from Fisher-Rao geodesic excess of those three-point paths.
novelty_claim: Bespoke board-only model whose decisive non-linearity is the Fisher-Rao
  geodesic excess `d_FR(p, h) + d_FR(h, q) - d_FR(p, q)` of learned source/hinge/sink
  categorical distributions over the 64 squares, with a learned route gate over multiple
  Fisher routes -- not a generic CNN, KL/Bregman two-point divergence, uncertainty
  head, or shared proposal probe.
expected_advantage: Information-geometric geodesic excess captures three-point hinge
  bends that pairwise CNN features and two-point divergences miss, so the puzzle_binary
  contract should reward FGTN beyond capacity-matched CNN baselines while keeping
  near-puzzle false positives auditable through the route excess diagnostics.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus Fisher-geometry diagnostics (`geometry_only_logits`,
  `route_probs`, `route_excess`, `direct_distance`, `route_ratio`, `route_gate`, `weighted_excess`,
  `max_excess`, `weighted_ratio`, `max_ratio`, `hinge_turn`, `weighted_turn`, `max_turn`,
  `geometry_features`, `fisher_geodesic_tension`, `information_surprisal`, `mechanism_energy`,
  `proposal_profile_strength`, `proposal_keyword_count`) saved to prediction artifacts.
compute_notes: Compact `Conv2d` board stem, `depth` `ResidualBlock` layers, a `Conv2d(width
  -> routes * 3, kernel=1)` route head producing `(B, routes, 3, 64)` softmax-floored
  square distributions, Fisher-Rao geodesic excess and directness ratio computed in
  float32, pooled-board route-gate softmax, optional spherical hinge angle, and a
  `LayerNorm`/`MLP` head over `[pooled_board, geom_feat]` plus a geometry-only ablation
  head over `geom_feat`.
