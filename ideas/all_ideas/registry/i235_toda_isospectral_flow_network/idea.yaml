idea_id: i235
name: Toda Isospectral Flow Network
slug: toda_isospectral_flow_network
status: implemented
created_at: '2026-05-05T15:50:00+00:00'
author: Claude
short_thesis: Builds a tridiagonal symmetric chess operator L and evolves it via the
  Toda Lax flow dot L = [L, B(L)]; isospectral evolution preserves spectrum but sorts
  diagonal exponentially. Sorting rate, Manakov integrals, and slowest-decaying off-diagonal
  residues classify puzzle-likeness.
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-05-05_1620_tuesday_local_toda_isospectral_flow.md`;
  bespoke linear-algebra architecture that integrates the Toda Lax flow on a learned
  tridiagonal chess operator.
expected_advantage: Exposes spectral sorting dynamics, Manakov conservation residuals,
  and adjacent-gap decay rates of a learned chess operator under the puzzle_binary
  benchmark contract.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus Toda flow diagnostics (diagonal sortedness,
  Manakov drift, off-diagonal decay, spectral gap estimate) saved to prediction
  artifacts.
compute_notes: BoardConvStem trunk plus a learned tridiagonal operator and a small
  number of explicit-Euler Toda lattice steps; matmuls dominate the operator-block
  cost. Defaults stay well below the paper-grade compute budget.
