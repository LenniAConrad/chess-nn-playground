short_thesis: 'Chess rules are often written as bitboard Boolean algebra: masks, shifts,
  intersections, unions, and complements. A neural model can learn soft bitboard predicates
  and combine them with differentiable Boolean operations, producing an efficient
  symbolic-neur...'
novelty_claim: Promoted from `ideas/all_ideas/research/packets/classic/chess_nn_research_2026-04-24_2136_friday_shanghai_architecture_batch_7.md`;
  bespoke architecture that learns soft bitboard predicates, expands them with chess-shape
  shifts and Boolean complement, and composes them through a soft-AND clause layer
  followed by a soft-OR disjunct layer (differentiable disjunctive-normal-form readout).
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus soft-bitboard / clause / disjunct activation diagnostics
  saved to prediction artifacts.
compute_notes: Compact convolutional predicate trunk plus a literal bank built from
  chess-shape shifts and Boolean complement, fed through a soft-AND clause layer and
  a soft-OR disjunct layer (DNF readout).
