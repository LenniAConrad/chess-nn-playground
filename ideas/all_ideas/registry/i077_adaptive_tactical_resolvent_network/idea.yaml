notes: Bespoke implementation of the Adaptive Tactical Resolvent thesis. The operator
  combines five fixed chess-geometry masks with a learned low-rank board-conditioned
  update and is spectrally normalised before the multi-alpha resolvent solves; CRTK
  metadata is reporting-only.
