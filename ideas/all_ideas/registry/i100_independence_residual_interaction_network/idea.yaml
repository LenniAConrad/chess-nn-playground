  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus signed residual magnitudes, positive/negative
  residual mass, expected-map entropy, rank/file coupling, channel interaction energy,
  and board-summary diagnostics saved to prediction artifacts.
compute_notes: Product-of-marginals expected occupancy baseline over piece/channel,
  square, and side-relative rank/file marginals; compact residual CNN over signed
  residual maps and expected maps.
