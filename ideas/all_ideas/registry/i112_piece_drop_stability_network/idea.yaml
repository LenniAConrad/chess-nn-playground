idea_id: i112
name: Piece-Drop Stability Network
slug: piece_drop_stability_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Puzzle-like positions may be less stable under deterministic removal
  of specific safe current-board evidence groups. Instead of forcing a classifier
  to use sparse witnesses, measure how a small encoder's latent changes when piece
  groups are dropped.
novelty_claim: Bespoke shared-encoder stability classifier whose head reads only
  the original latent and a deterministic per-group L2 stability vector, materially
  distinct from the shared ResearchPacketProbe scaffold and from sparse-witness or
  attention-perturbation neighbours.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-group stability diagnostics (original_latent,
  masked_latents, delta_vectors, stability, stability_ratio, original_norm).
compute_notes: Compact convolutional shared encoder run once on the original board
  and once per deterministic piece-drop mask (six masks by default).
