idea_id: i045
run:
  name: i045_credal_near_puzzle_evidence_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: credal_near_puzzle_evidence_network
  input_channels: 18
  num_classes: 1
  encoding: simple_18
  hidden_channels: 64
  hidden_dim: 128
  num_res_blocks: 4
  evidence_floor: 1.0
  near_tau: 0.55
  near_s_max: 6.0
  lambda_near_evidence_cap: 0.05
  lambda_dirichlet_kl: 0.001
  kl_anneal_epochs: 2
  dropout: 0.1
  use_batchnorm: true
  allow_unknown_channels: false
  mechanism_family: information
  packet_profile: credal_near_puzzle_evidence_network
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Bespoke implementation of the credal/Dirichlet evidential head over a
  compact residual board encoder. CRTK metadata is reporting-only.
