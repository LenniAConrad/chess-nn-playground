name: Morphological Threat Field Network
slug: morphological_threat_field_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'CNNs learn filters, but chess tactics often have shape operations:
  expand a king danger zone, close gaps in a pawn shield, erode escape squares, and
  detect thin corridors. Differentiable mathematical morphology gives an architecture
  that explicitly processe...'
novelty_claim: Bespoke differentiable mathematical-morphology model that processes
  per-square chess threat fields with learned structuring elements (soft dilation,
  erosion, opening, closing, morphological gradient, top-hat, bottom-hat) rather
  than relying on generic CNN filters or a shared probe scaffold.
expected_advantage: Test the packet's proposed board-shape signal under the puzzle_binary
  benchmark contract using explicit morphological operations.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus morphological diagnostics (expansion mass, erosion
  mass, morphological gradient, thin-corridor intensity, opening/closing residuals,
  morphology branch logit).
compute_notes: Compact convolutional trunk plus a stack of differentiable morphological
  layers operating on a small bank of softplus threat fields.
