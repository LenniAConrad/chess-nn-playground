short_thesis: 'Select **Bounded Board Hinge Logic**: a differentiable logic classifier
  that compiles a fixed library of typed, shallow PSL-style formulas into tensor operations
  over...'
novelty_claim: Bespoke differentiable PSL classifier with 32 deterministic closed-world
  unary facts, 18 typed binary relations, a 24-concept / 16-role softmax-mixed predicate
  bank, a fixed 168-formula shallow Lukasiewicz library (24 unary, 96 binary, 48
  king-zone), and a probabilistic-soft-logic energy-gap hinge head with per-rule
  positive and negative weights.
expected_advantage: Test the packet's proposed bounded-hinge logic signal under the
  same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus formula truths, top-formula indices, predicate-bank
  diagnostics, and PSL energy-gap diagnostics saved to prediction artifacts.
compute_notes: Deterministic closed-world fact extractor (no convolutional trunk),
  softmax-mixed predicate bank, chunked Lukasiewicz formula evaluator, and a PSL
  hinge energy-gap head. Geometry masks are precomputed once at module construction.
