idea_id: i185
name: Critical-Square Budget Network
slug: critical_square_budget_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Puzzles often hinge on a small number of critical squares: king escape
  squares, line intersections, pinned-piece squares, promotion squares, or overloaded
  defender squares.'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-25_0037_saturday_shanghai_puzzle_architecture_batch_2.md`;
  bespoke board-only critical-square budget network that produces a soft mask over
  the 64 squares with a fixed total mass `K` and routes the puzzle logit through that
  mask, with deterministic king-zone / promotion / line-intersection priors fed to
  the saliency head.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus critical-square diagnostics (`saliency_mask`,
  `saliency_logits`, `budget_used`, `saliency_entropy`, `top_k_mass`,
  `own_king_zone_mass`, `opp_king_zone_mass`, `promotion_mass`,
  `line_intersection_mass`, `empty_square_mass`, `trunk_energy`).
compute_notes: Compact convolutional trunk plus a budget-`K` soft mask over the 64
  squares and a small MLP head over the masked pool and prior-region masses.
