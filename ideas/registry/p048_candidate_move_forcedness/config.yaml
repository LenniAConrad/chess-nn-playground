idea_id: p048
run:
  name: p048_candidate_move_forcedness_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: candidate_move_forcedness
  input_channels: 18
  num_classes: 1
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  trunk_ablation: none
  token_dim: 24
  score_hidden_dim: 32
  head_hidden_dim: 64
  head_dropout: 0.1
  topk: 4
  softmax_temperature: 1.0
  gate_init: -2.0
  ablation: none
  mechanism_family: move_graph
  packet_profile: candidate_move_forcedness
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  p048 Candidate Move Forcedness (CMF) -- additive gated head over the
  i193 trunk that scores each legal candidate move with a small per-
  edge MLP over the deterministic forcedness descriptors (mover /
  victim value, capture / check / promotion seeds, mobility, move-class
  flags, SEE-lite gain), then top-k pools the per-move logits into a
  board-level feature vector. The pool feeds a gated logit delta. CRTK
  metadata, source labels, verification flags, engine evaluations, and
  principal variations are reporting-only and never used as model
  inputs.
