short_thesis: 'A plain shared CNN trunk can feed several small specialist heads: king-zone
  head, center-control head, material/phase head, and global board head. A learned
  fusion layer combines their logits/features. This tests specialization without a
  full mixture-of-exp...'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2208_friday_shanghai_plain_architecture_batch.md`;
  implements the packet's shared CNN trunk with global, center, edge, king-zone,
  and material specialist heads plus learned feature/logit fusion.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus specialist head logits, learned and uniform
  fusion diagnostics, active head count, logit shares, feature energies, king-zone
  decode status, king-zone masses, material balance, material phase, and piece count.
compute_notes: Shared residual CNN trunk, fixed global/center/edge region pools,
  fail-closed own/opponent king-zone pools, material-count MLP, and learned specialist
  fusion MLP.
