name: Riccati Optimal-Defense Network
slug: riccati_optimal_defense_network
status: implemented
created_at: '2026-05-05T15:50:00+00:00'
author: Claude
short_thesis: Treats each board as an LQR control problem; solves the algebraic Riccati
  equation A^T P + P A - P B R^{-1} B^T P + Q = 0 via Schur of the Hamiltonian H =
  [[A, -BR^{-1}B^T],[-Q,-A^T]]; optimal-defense cost J* = trace(P) and closed-loop
  spectral margin separate puzzles from non-puzzles.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-05-05_1600_tuesday_local_riccati_optimal_defense.md`;
  uses a linear_algebra mechanism profile over board-only features.
expected_advantage: Test the packet's proposed coupling/spectral/manifold mechanism
  under the same puzzle_binary benchmark contract as the other linear-algebra ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus packet-profile diagnostics saved to prediction
  artifacts.
compute_notes: Compact convolutional trunk plus a per-board low-rank LQR triple (A,
  B, Q, R) whose continuous algebraic Riccati solution P, optimal feedback gain K,
  and closed-loop spectrum drive the head.
