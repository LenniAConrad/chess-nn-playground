short_thesis: Krylov Tactical Subspace Network tests whether a linear_algebra board
  mechanism improves puzzle-binary classification.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_2000_saturday_shanghai_krylov_tactical_subspace.md`;
  builds role-conditioned Krylov subspaces from a learned chess-structured 64x64
  operator and reads Ritz spectra, Arnoldi residuals, growth curves, and
  attacker/defender principal angles rather than generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus Krylov diagnostics (Ritz singular values, Arnoldi
  residuals, growth curves, basis king/target energy, cross-role principal angles)
  saved to prediction artifacts.
compute_notes: Compact convolutional trunk, 64x64 operator built from five fixed
  chess-geometry masks plus a learned low-rank update, and a modified Gram-Schmidt
  Arnoldi block run for six steps over six role seed vectors.
