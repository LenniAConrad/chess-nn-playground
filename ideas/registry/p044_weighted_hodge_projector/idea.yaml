idea_id: p044
name: Weighted Hodge Projector
slug: weighted_hodge_projector
status: implemented
created_at: '2026-05-13T00:00:00+00:00'
author: Claude (gpt-polynomial-hodge-rook primitive batch)
short_thesis: |
  Weighted Hodge Projector (WHP). Decompose a learned edge flow ``F``
  on the 8x8 board's grid complex into gradient + curl + harmonic
  components via two weighted least-squares solves:

      G = D_0^T (D_0 W D_0^T)^{-1} D_0 W F
      R = F - G
      Cr = D_1 (D_1^T W D_1)^{-1} D_1^T W R
      H = R - Cr

  with ``D_0`` (64 x 112) vertex-edge incidence, ``D_1`` (112 x 49)
  edge-face incidence, ``W`` an input-dependent positive metric. The
  per-component energy summaries feed a gated logit delta on top of
  the i193 trunk.
novelty_claim: |
  The operator is a metric-conditioned orthogonal projection onto
  exact, coexact, and harmonic flow subspaces -- not graph convolution,
  attention, or unrolled diffusion. The two SPD solves are
  differentiable through the standard implicit function theorem.
  Hodge decomposition is established mathematics; the novelty claim is
  scoped to a reusable scout-scale chess primitive with a cacheable
  fixed-graph complex and input-dependent edge metric.
expected_advantage: |
  The source primitive predicts >= 5% relative class-1 near-puzzle FP
  reduction at matched recall with <= 15% inference slowdown. Expected
  target slice: positions where local pressure looks strong but is
  topologically trapped (cyclic curl) or globally inconsistent
  (harmonic residual), e.g. fortress positions and pressure-without-
  follow-up.
target_task: |
  puzzle_binary classification on the chess-nn-playground splits.
input_representation: |
  Current-board simple_18 tensor. The flow ``F`` is built from per-edge
  endpoint features pooled from the i193 spatial feature map. The
  edge metric ``W`` is a per-edge softplus of a linear head on the
  same endpoint feature. CRTK metadata, source labels, verification
  flags, engine evaluations, and principal variations are *not*
  consumed.
output_heads: |
  One puzzle logit. Diagnostics include ``base_logit``,
  ``primitive_delta``, ``primitive_gate``, ``primitive_contribution``,
  ``whp_gradient_energy``, ``whp_curl_energy``, ``whp_harmonic_energy``,
  ``whp_flow_energy``, ``whp_weight_mean``. The trunk's i193 diagnostics
  are forwarded under the ``trunk_<name>`` prefix.
compute_notes: |
  Trunk: i193 ExchangeThenKingDualStreamNetwork (unchanged). The WHP
  head adds the edge endpoint feature projector, a per-edge flow head,
  a per-edge metric head, a Hodge decomposition with two batched SPD
  solves (V x V = 64 x 64 and F x F = 49 x 49), a per-component
  energy summary, and the delta / gate MLPs. The cost is dominated by
  the two batched ``torch.linalg.solve`` calls: O(B * 64^3) and
  O(B * 49^3). At B = 64 this is ~16M + 8M FLOPs — modest.
