author: Codex
short_thesis: '- Idea name: Tempo-Odd Bottleneck Network, abbreviated `TempoOddBottleneckNet`.
  - One-sentence thesis: Puzzle-likeness is often a side-to-move interaction property,
  so isolate the latent component that changes under a rule-only side-to-move intervention
  via a two-point Walsh odd/even bottleneck instead of relying on side-blind static
  board shortcuts.'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-21_0755_tuesday_los_angeles_tempo_odd_bottleneck.md`;
  central operator is a deterministic side-to-move involution `tau` followed by a
  two-point Walsh odd/even projection of a shared encoder, with the odd projection
  carrying the high-capacity classifier path and the even projection routed through
  a stop-gradient context bottleneck rather than a generic CNN trunk.
expected_advantage: Test the packet's proposed tempo-odd interaction signal under
  the same puzzle_binary benchmark contract as the other ideas, with a materially
  distinct Walsh odd/even bottleneck rather than a shared mechanism profile.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus tempo-intervention diagnostics (tempo_odd_norm,
  tempo_even_norm, odd_energy, even_energy, odd_to_even_energy_ratio, side_intervention_gap,
  odd_variance_loss, en_passant_removed) saved to prediction artifacts.
compute_notes: Two shared encoder passes per position via a concatenated batch of
  shape `(2B, 18, 8, 8)` over the original board and its `tau` side-to-move twin;
  no generated candidate set; en-passant plane sanitized prior to `tau` for safe
  rule-only intervention.
