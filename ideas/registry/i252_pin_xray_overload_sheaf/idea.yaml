notes: >-
  Implemented as the registered `pin_xray_overload_sheaf` model in
  `src/chess_nn_playground/models/trunk/pin_xray_overload_sheaf.py`. The
  module ships `TacticalIncidenceBuilderV2` (extends i018's incidence
  builder), `FastSheafDiffusionBlockV2` (i249 block parameterised by signs
  and relation count), and `PinXrayOverloadSheafNet`. Falsifier flags
  `scramble_relations`, `scramble_new_only`, and `family_collapse` are
  wired in the config so the relation-family ablations from the packet can
  be run without code edits. Side-specific absolute pins are verified
  against the packet's pin-bank derivation on synthetic boards.
