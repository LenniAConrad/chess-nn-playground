idea_id: i114
name: Piece-Conditioned Hypernetwork CNN
slug: piece_conditioned_hypernetwork_cnn
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: The best local filters may depend on material and piece inventory. A
  lightweight hypernetwork can condition CNN channel gates on safe current-board
  summaries, adapting the feature extractor without using engine metadata.
novelty_claim: Bespoke hypernetwork CNN whose per-block depthwise 3x3 kernels and
  per-channel sigmoid gates are produced per sample by a small MLP conditioned on
  a deterministic piece-inventory summary, materially distinct from the shared
  ResearchPacketProbe scaffold and from the static piece-plane gated CNN.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-block gate / kernel / block-energy diagnostics
  and an inventory-summary vector saved to prediction artifacts.
compute_notes: 1x1 piece-plane embedding, a shared inventory-summary encoder, per-block
  hypernetwork heads that emit per-sample depthwise kernels and channel gates, and
  a small MLP classifier over mean-pooled features.
