idea_id: i105
name: Slot Attention Role Binding Network
slug: slot_attention_role_binding_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Puzzle-like positions may be characterized by how occupied pieces bind
  to a small number of latent tactical roles. Slot attention can softly assign pieces
  to roles and expose role competition without selecting a hard witness subset.
novelty_claim: Bespoke slot-attention role binding network where up to 32 occupied
  piece tokens are softly assigned to S=8 learned role slots over T=3 iterative
  GRU updates and the puzzle logit is decided from the final slot bank plus
  assignment-entropy, slot-mass, and per-iteration update-residual diagnostics.
expected_advantage: Test the packet's proposed role-binding signal under the same
  puzzle_binary benchmark contract as the other ideas, with the soft slot assignment
  acting as a non-hard witness alternative to sparse witness-piece bottlenecks.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus slot-attention diagnostics (per-iteration
  assignments, slot updates and update-residual norms, slot vectors, slot mass,
  slot share, slot self-entropy, per-token assignment entropy, slot-norms,
  slot-dispersion, token mask, and occupancy mask).
compute_notes: Deterministic rank-major selection of up to 32 occupied piece tokens,
  S=8 learned slot prototypes, T=3 slot-attention iterations with masked
  key/value projections, GRUCell-based slot updates, and a small classifier over
  the flattened slot bank concatenated with assignment diagnostics.
