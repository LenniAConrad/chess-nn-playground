idea_id: i103
name: Attention Disagreement Residual Network
slug: attention_disagreement_residual_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Near-puzzle and puzzle-like positions may contain competing interpretations.
  Independent attention query families should disagree more on ambiguous or tactically
  dense boards. The classifier uses the residual disagreement among attention maps
  as evidence.
novelty_claim: Bespoke multi-family attention bottleneck where puzzle-likeness is
  decided from JS-divergence, cosine distance, and entropy variance among independent
  query families over a shared board encoder, rather than from any single attention
  pattern.
expected_advantage: Test the packet's proposed disagreement-as-evidence signal under
  the same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-family attention diagnostics (JS divergence,
  cosine distance, entropy variance, attended residual statistics).
compute_notes: F independent query banks (default F=4, Q=8) over shared key/value
  projections of 64 square tokens; classifier reads disagreement summaries and the
  cross-family mean attended value.
