idea_id: i247
run:
  name: i247_complex_amplitude_chess_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: complex_amplitude_chess_network
  input_channels: 18
  num_classes: 1
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  trunk_ablation: none
  amplitude_dim: 8
  feature_channels: 32
  feature_depth: 2
  encoder_dropout: 0.05
  caio_hidden_dim: 64
  caio_dropout: 0.05
  gate_hidden_dim: 32
  gate_init: -2.0
  ablation: none
  mechanism_family: counterfactual
  packet_profile: complex_amplitude_chess_network
training:
  epochs: 20
  batch_size: 192
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  CAIO additive primitive head on top of the i193 dual-stream trunk. Batch
  size is reduced from i193's 256 to 192 because the CAIO side path runs
  the encoder twice (original + colour-flipped for conjugacy error) and
  computes a (B, amplitude_dim, 64, 64) complex outer product per
  relation. `torch.compile` is intentionally not enabled for the first
  scout run — see implementation_notes.md. CRTK, tactic, source,
  Stockfish, and PV metadata are reporting-only and never used as model
  input.
