short_thesis: Pawn structure is a slow, chess-specific skeleton that shapes king safety,
  open lines, promotion lanes, and tactical vulnerability. A model can compute deterministic
  pawn barrier and distance fields from the current board, then learn how these fields
  condit...
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2133_friday_shanghai_architecture_batch_6.md`;
  implements a bespoke side-relative pawn skeleton extractor that conditions a compact
  board CNN through pawn-aware gating and barrier/shelter pooling rather than generic
  CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus pawn-skeleton diagnostics for open-file pressure,
  isolated/doubled/passed-pawn shares, king shelter distance, pawn-frontier density,
  and pawn-gate energy.
compute_notes: Compact convolutional trunk plus a deterministic side-canonical pawn
  skeleton field (front spans, attack fronts, isolated/doubled/passed masks, shelter
  zones, distance-to-pawn / open-file fields) that gates the board trunk before pooled
  classification.
