idea_id: i255
name: i018 BT4 Distillation Student
slug: i018_bt4_distillation_student
status: implemented
created_at: '2026-05-18T00:00:00+00:00'
author: Claude (latest-research promotion)
short_thesis: |
  Plain BT4-style residual conv tower that stays dense-convolutional
  at inference time but is trained with richer-than-logits supervision
  from i018: calibrated teacher logits, six scalar tactical
  diagnostics, the typed 12-d relation-density vector, and eight
  compact 8x8 relation-summary planes. Mover-oriented canonicalization
  is bolted in front of the BT4 stem to inherit i018's cheap symmetry.
  The student preserves BT4's CPU-friendly deployment shape and tests
  whether explanation-style supervision can recover most of i018's
  decision quality at roughly BT4 latency.
novelty_claim: |
  Bespoke i255 conv student that is NOT a fast i018 rewrite. Trunk is
  a plain BT4 residual conv tower (3x3 conv stem + N residual 3x3 conv
  blocks + Squeeze-Excite + global value head). Two cheap training-time
  auxiliary heads (scalar diagnostic head over the pooled summary
  vector, 8-channel 1x1 plane head over the final 8x8 feature map) and
  one optional readout projector turn the BT4 backbone into a target
  for i018 distillation. The student does NOT compute typed chess
  relations at inference time; the diagnostic and plane heads predict
  the teacher's chess geometry without reproducing it. CRTK metadata
  is reporting-only and never enters the student's input.
expected_advantage: |
  Recover most of i018's puzzle-binary decision quality at BT4-class
  CPU latency. The research markdown's promotion gate is:

    * `base` student: PR-AUC >= 0.875, near-puzzle FP @ recall 0.80
      <= 0.16, puzzle recall >= 0.80, batch-1 CPU latency <= 1.2 ms.
    * `scale_up` student: PR-AUC >= 0.880, near-puzzle FP @ recall
      0.80 <= 0.155, puzzle recall >= 0.80, batch-1 CPU latency
      <= 1.6 ms.

  Decision discipline: ship only if the student narrows the i018
  teacher gap without collapsing on the equal / hard / very_hard /
  mate_in_1 / promotion / underpromotion slices that the repo already
  flags as i018 stress points.
target_task: |
  puzzle_binary classification (fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle). Same input contract as i018 and BT4.
input_representation: |
  Board-only tensor. Default simple_18 (18, 8, 8). lc0_bt4_112
  (112, 8, 8) is supported as a compatibility variant via
  data.encoding=lc0_bt4_112, model.input_channels=112. CRTK metadata,
  source labels, verification flags, engine evaluations, Stockfish
  scores, and principal variations are not consumed by the student at
  any point.
output_heads: |
  Always present:
    * `logits` (puzzle binary logit; this is the only head needed at
      inference time).
    * `pooled_features` (the BT4 value-neck pre-head feature vector;
      exposed so the distillation loss can match teacher features
      without bolting a separate hook into the model).

  Always present unless explicitly disabled in config:
    * `diagnostic_logits` (18-d: six scalar i018 diagnostics +
      12-d typed relation density).
    * `summary_plane_logits` ((B, 8, 8, 8) compressed projection of
      teacher relation masks).

  Optional:
    * `readout_features` (compact pooled feature vector matched to the
      teacher readout via a hint loss when readout_dim > 0).
compute_notes: |
  Backbone: i018's BoardStateAdapter canonicalization wrapped as a
  fixed `MoverCanonicalize` preprocessing layer (no learned params for
  the simple_18 / lc0_static_112 paths; pass-through for lc0_bt4_112).
  Stem: one 3x3 conv input_channels -> channels. Trunk: num_blocks
  residual 3x3 conv + SE blocks. Value neck: 1x1 conv to
  value_channels, flatten, Linear to value_hidden. Heads: one Linear
  to logits, one MLP to 18-d diagnostics, one 1x1 conv to 8 summary
  planes, optional Linear to readout_dim. Default base scale
  (channels=64, num_blocks=4, simple_18, value_channels=16,
  value_hidden=128) lands at 453,159 parameters; scale_up
  (channels=96, num_blocks=6) lands at ~1.18M.
