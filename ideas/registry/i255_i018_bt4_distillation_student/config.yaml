idea_id: i255
run:
  name: i255_i018_bt4_distillation_student_base_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: i018_bt4_distillation_student
  input_channels: 18
  encoding: simple_18
  num_classes: 1
  channels: 64
  num_blocks: 4
  value_channels: 16
  value_hidden: 128
  se_channels: 16
  dropout: 0.1
  use_batchnorm: true
  canonicalize: true
  diagnostic_dim: 18
  summary_plane_dim: 8
  readout_dim: 0
  mechanism_family: distillation
  packet_profile: i018_bt4_distillation_student
training:
  epochs: 20
  min_epochs: 10
  min_active_epochs: 10
  batch_size: 192
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0008
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  monitor: pr_auc
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  Default `base` student row from the research markdown:
  simple_18 input, channels=64, num_blocks=4, value_channels=16,
  value_hidden=128. Total params ~453k. Mover canonicalization is on
  by default (cheap symmetry inherited from i018's BoardStateAdapter).
  The model emits `diagnostic_logits` (18-d: six scalar i018
  diagnostics + 12-d typed relation density) and `summary_plane_logits`
  ((B, 8, 8, 8) compressed relation summary planes) in addition to
  `logits`; readout_dim defaults to 0 so the optional readout projector
  is off.

  Other rows of the research-markdown matrix are single-line edits:

    * scale_up student:        model.channels=96, model.num_blocks=6
    * lc0_bt4_112 student:     data.encoding=lc0_bt4_112,
                               model.input_channels=112,
                               model.encoding=lc0_bt4_112
    * canonicalization off:    model.canonicalize=false
    * readout matching on:     model.readout_dim=64 (or 128)
    * diagnostic-only ablate:  model.summary_plane_dim=0
    * plane-only ablate:       model.diagnostic_dim=0

  The trainer runs supervised BCE on `logits` today. The distillation
  loss and teacher target cache are scaffold-only in this packet (see
  trainer_notes.md and implementation_notes.md); the auxiliary heads
  are emitted by the model so that when the distillation loss is wired
  up (`I018BT4DistillationLoss`), no model changes are needed.

  CRTK metadata is reporting-only and never used as model input.
