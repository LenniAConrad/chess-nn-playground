idea_id: i018
run:
  name: i018_oriented_tactical_sheaf_laplacian_FALSIFIER_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: oriented_tactical_sheaf_laplacian
  input_channels: 18
  num_classes: 1
  channels: 64
  hidden_dim: 96
  depth: 2
  dropout: 0.1
  use_batchnorm: true
  mechanism_family: sheaf
  packet_profile: oriented_tactical_sheaf_laplacian
  # Falsifier mode: scramble the 12 typed relation masks with a degree-preserving
  # random column permutation before they reach the sheaf diffusion blocks.
  # If PR-AUC is unchanged vs the baseline (scramble_relations=false), the
  # typed-relation thesis from math_thesis.md is REJECTED.
  scramble_relations: true
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  Falsifier ablation of i018 oriented_tactical_sheaf_laplacian. Identical config
  to the baseline except scramble_relations=true, which replaces the 12 typed
  tactical relation masks with degree-preserving random rewirings before they
  enter the sheaf diffusion blocks. Per the math_thesis.md falsifier rule:
  "replacing real relation masks with degree-preserving random masks; if
  performance is unchanged the typed-relation thesis is rejected".
