idea_id: i144
name: Board FPN CNN
slug: board_fpn_cnn
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Chess positions often need both exact square detail and coarse whole-board
  phase. A plain feature-pyramid network can process the board at `8 x 8`, `4 x 4`,
  and `2 x 2` resolutions, then fuse the maps back into a single classifier.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2208_friday_shanghai_plain_architecture_batch.md`;
  bespoke three-level board feature-pyramid CNN with top-down upsampling fusion and
  multi-scale concatenated mean+max pooling, distinct from the shared CNN baseline.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus FPN diagnostics (per-level energies, top-down energies,
  piece density, coordinate energy, mechanism energy) saved to prediction artifacts.
compute_notes: Bottom-up convolutional stacks at `8x8`, `4x4`, and `2x2` resolutions,
  top-down 1x1 projections and nearest-neighbor upsampling, concatenated mean+max pooling
  per level, and a LayerNorm + GELU MLP head.
