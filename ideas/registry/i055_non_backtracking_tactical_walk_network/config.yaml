idea_id: i055
run:
  name: i055_non_backtracking_tactical_walk_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: non_backtracking_tactical_walk_network
  input_channels: 18
  num_classes: 1
  encoding: simple_18
  side_to_move_channel: 12
  edge_dim: 64
  edge_layers: 4
  edge_max: 192
  transition_max: 1024
  r_basis: 4
  use_king_zone_virtual_nodes: true
  board_adapter_channels: 32
  classifier_hidden_dim: 128
  dropout: 0.05
  use_batchnorm: true
  ablation_mode: none
  packet_profile: non_backtracking_tactical_walk_network
  mechanism_family: grammar
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Bespoke non-backtracking tactical walk implementation. CRTK metadata is reporting-only.
