idea_id: i244
run:
  name: i244_tempo_defender_cross_derivative_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: tempo_defender_cross_derivative_network
  input_channels: 18
  num_classes: 1
  topk: 3
  saliency_hidden: 32
  tdcd_channels: 48
  tdcd_depth: 2
  tdcd_dropout: 0.05
  head_hidden: 64
  gate_init: -2.0
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  ablation: none
  mechanism_family: tempo
  packet_profile: tempo_defender_cross_derivative_network
training:
  epochs: 20
  batch_size: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: TDCD additive primitive head on top of the i193 dual-stream trunk. Batch
  size is halved relative to i193 because the cross-derivative grid evaluates
  2*(topk+1) board variants per sample through the compact TDCD encoder. CRTK,
  tactic, source, Stockfish, and PV metadata are reporting-only.
