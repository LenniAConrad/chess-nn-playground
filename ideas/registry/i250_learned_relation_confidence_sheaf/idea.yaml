notes: >-
  Implemented as the registered `learned_relation_confidence_sheaf` model in
  `src/chess_nn_playground/models/trunk/learned_relation_confidence_sheaf.py`,
  which subclasses i018's `OrientedTacticalSheafNet` and only adds the new
  confidence head plus a confidence-weighted forward path. The
  `flat_confidence: true` ablation exactly reproduces i018 logits with shared
  weights; the default normalized head reproduces i018 within FP32 reduction
  noise at zero-init.
implementation_kind: bespoke_model
