name: Barrier-Cut Puzzle Network
slug: barrier_cut_puzzle_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'A true puzzle often exists because the defender cannot maintain a barrier
  between attacking force and a valuable target: king, queen, promotion square, pinned
  defender, or mating square. A near-puzzle may contain pressure, but there is still
  a strong defens...'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0109_saturday_shanghai_high_upside_puzzle_batch_4.md`;
  bespoke architecture predicts three non-negative per-square fields (attacker mass,
  defender barrier capacity, target value) and runs an explicit iterative barrier-cut
  diffusion to read the reachable-target value and defense-gap field as the puzzle
  decision signal.
expected_advantage: A barrier-cut head should separate puzzles (attack flux reaches
  a valuable target through a failing defender barrier) from non-puzzles (defender
  barrier absorbs attack mass before it reaches any target) on the puzzle_binary benchmark.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus barrier-cut diagnostics (attacker / defender /
  target fields, final attack potential, reachable target value, per-step absorbed
  mass, defense-gap field and summary scalars).
compute_notes: Compact convolutional trunk, three softplus per-square field heads,
  iterative attack diffusion damped by the defender field, small classifier head over
  pooled barrier-cut diagnostics.
