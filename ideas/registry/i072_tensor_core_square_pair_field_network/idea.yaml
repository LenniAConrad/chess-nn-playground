short_thesis: Tensor-Core Square-Pair Field Network tests whether dense 64x64
  square-pair fields expose puzzle-binary signals missed by local board encoders.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2148_friday_shanghai_tensorcore_pairfield.md`;
  uses a linear_algebra mechanism profile over board-only features rather than generic
  CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus dense pair-field diagnostics such as same-rank,
  same-file, diagonal, knight-offset, occupied-pair, and king-zone pair energies.
compute_notes: Fixed 18-plane square-pair relation bank, dense multi-head QK pair
  fields, bilinear pair-rank terms, tanh-normalized pair-to-square messages, and
  per-layer pair-energy readout.
