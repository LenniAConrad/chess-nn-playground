idea_id: i098
name: Baseline Logit Residual Adapter
slug: baseline_logit_residual_adapter
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'The existing simple CNN likely has systematic errors. A small residual
  adapter can test what information remains after the baseline logit and latent representation
  are known:'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2054_friday_shanghai_residual_inspired_batch.md`;
  bespoke decomposition of the puzzle logit into an explicit simple-CNN-shaped baseline
  logit plus a FiLM-conditioned, gated residual adapter that is forced (via a detached
  conditioning vector of the baseline latent, baseline logit, and a deterministic
  board summary) to encode only signal residual to the baseline.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (s = s_b + alpha * g * s_r) plus baseline-vs-residual
  diagnostics (baseline_logit, residual_logit, adapter_correction, residual_gate,
  baseline_probability, residual_to_baseline_ratio, baseline_latent_norm, adapter_feature_norm,
  adapter_field_energy, and pass-through summary scalars) saved to prediction artifacts.
compute_notes: Compact simple-CNN baseline branch, deterministic 26-D board summary,
  and a depthwise-separable FiLM-conditioned residual adapter with a sigmoid gate;
  baseline conditioning is detached so the residual head carries only baseline-orthogonal
  signal. Runs on CPU/GPU; no extra dependencies.
