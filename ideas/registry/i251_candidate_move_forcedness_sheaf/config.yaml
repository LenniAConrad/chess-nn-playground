idea_id: i251
run:
  name: i251_candidate_move_forcedness_sheaf_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: candidate_move_forcedness_sheaf
  input_channels: 18
  num_classes: 1
  channels: 64
  hidden_dim: 96
  depth: 2
  stalk_dim: 8
  dropout: 0.1
  use_batchnorm: true
  mechanism_family: sheaf
  packet_profile: oriented_tactical_sheaf_laplacian
  use_triads: true
  # Candidate-move branch knobs:
  max_candidates: 96
  top_k: 8
  move_embed_dim: 48
  move_hidden_dim: 64
  delta_hidden_dim: 48
  gate_hidden_dim: 24
  softmax_temperature: 1.0
  flat_move_pool: false
  disable_move_branch: false
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  monitor: pr_auc
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: >-
  Candidate-move forcedness extension of i018. Same simple_18 contract, same
  split, same trainer hyperparameters. The gated additive delta head is
  zero-initialized so the model starts as i018 and only deviates once the
  move branch finds real signal. CRTK metadata is reporting-only.
