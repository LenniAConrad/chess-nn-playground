  `src/chess_nn_playground/models/trunk/candidate_move_forcedness_sheaf.py`,
  which subclasses i018's `OrientedTacticalSheafNet` and adds a deterministic
  candidate-move bottleneck plus a gated additive delta head. Zero-init
  delta+gate exactly reproduces i018 logits on shared weights
  (max abs diff `0.0` on a 4-sample CPU batch); training is needed before
  the move branch deviates from the i018 baseline.
