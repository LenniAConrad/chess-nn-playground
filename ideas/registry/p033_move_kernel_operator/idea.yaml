notes: |
  Promoted from ideas/research/primitives/external_28_sparse_differential_accumulator_move_kernel.md.
  The file lists SDA (Sparse Differential Accumulator) first; SDA
  overlaps heavily with the existing i248 TSDP / DSA-LHN family
  (rule-derived terminal features + additive gated head) and with the
  ``one_ply_counterfactual_move_landscape_network`` /
  ``counterfactual_move_delta_spectrum_network`` /
  ``rule_only_counterfactual_move_delta_bottleneck`` registered ideas.
  MKO is selected as the strongest *distinct* proposal in the file --
  it has no direct counterpart in the existing registry, matches the
  batch focus on "transition" variants, and is structurally novel
  (move-type indexed weight sharing). Deferred internal proposals from
  the same source file: SDA (overlaps with i248 family), IPN
  (involutional parity normalisation -- symmetry primitive), SRA
  (selective ray attention -- overlaps with p035 / ray_state_space_scan),
  MPC (metamorphic piece convolution -- hyper-network kernel).
