idea_id: p007
name: Attack-Ray Sparse Attention
slug: attack_ray_sparse_attention
status: implemented
created_at: '2026-05-13T00:00:00+00:00'
author: Claude (ARSA promotion, ray-legal batch)
short_thesis: |
  Attack-Ray Sparse Attention (ARSA) is sparse attention whose key set
  per query is generated by ray-casting through the input occupancy
  bitmap. For each square the primitive picks the first-blocker target
  on each of the 8 sliding-piece ray directions, plus a self-edge, giving
  a fixed K=9 key set per query. The attention matrix is never
  materialised as an n^2 mask; only the K-sparse key index tensor is.
novelty_claim: |
  None of the registered i### entries route attention along an input-
  determined line-of-sight graph. Existing chess-decomposed attention
  variants (i242 and family) use fixed masks; learned sparse attentions
  (Routing Transformer, NSA) select keys by learned score top-k. ARSA's
  key set is a deterministic discrete function of the simple_18 board
  occupancy, treated as a stop-gradient index tensor; it is structurally
  different from masked dot-product attention because the dense
  64x64 logit matrix is never instantiated.
expected_advantage: |
  Targeted lift on sliding-piece tactical slices (pins, skewers, x-rays,
  discovered attacks), all of which depend on ray topology that conv
  stacks must rediscover from scratch every training run. Pass criterion
  mirrors the ARSA spec: CRTK class-1 matched-recall FP rate strictly
  lower than i193 at <=1.3x wall-clock; matched-density `random_keys`
  ablation must lose most of the lift, otherwise the geometry was not
  load-bearing.
target_task: |
  puzzle_binary classification (fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle).
input_representation: |
  Current-board simple_18 tensor as the model input. The ray-cast key
  index tensor is computed analytically from the simple_18 piece planes
  (occupancy) plus the precomputed ray-step geometry table; no python-
  chess call is required inside the forward pass. CRTK metadata, source
  labels, verification flags, and engine evaluations are not used as
  model inputs at any point.
output_heads: |
  One puzzle logit. Diagnostics: base_logit (i193 trunk output),
  primitive_delta, primitive_delta_raw, primitive_gate,
  primitive_gate_logit, arsa_blocker_count (per-sample number of valid
  blocker neighbours across squares), arsa_attention_entropy, arsa_self_weight
  (mean self-edge weight), plus the i193 trunk diagnostics.
compute_notes: |
  Trunk: bespoke i193 ExchangeThenKingDualStreamNetwork. Primitive head:
  per-square token tower (Conv1x1) + Q/K/V projections + 9-slot sparse
  softmax attention (8 ray neighbours + self) + delta MLP + gate MLP.
  FLOPs are O(B * 64 * K * attn_dim) per forward, K = 9; the 9-way
  gather avoids the dense O(64^2 * d) attention path. Per-direction
  bias parameters keep direction information out of the value tokens.
