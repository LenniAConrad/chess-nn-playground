idea_id: i193
name: Exchange-Then-King Dual Stream
slug: exchange_then_king_dual_stream
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Puzzle data likely mixes at least two broad families:'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke board-only dual-stream architecture that splits the trunk into an exchange
  stream (piece/value/attacker/defender features) and a king stream
  (king-zone/escape/check/line features), recombined through a learned phase router
  (`gate * king_logit + (1 - gate) * exchange_logit + residual_logit`).
expected_advantage: Test the packet's proposed dual-stream factorisation under the
  same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus dual-stream diagnostics (`exchange_logit`,
  `king_logit`, `gate`, `gate_logit`, `residual_logit`, `gate_entropy`,
  `stream_disagreement`, `exchange_pool_norm`, `king_pool_norm`,
  `mechanism_energy`, `proposal_profile_strength`, `proposal_keyword_count`).
compute_notes: Two compact convolutional stream encoders (one per branch), a
  closed-form deterministic feature builder that produces the per-stream input
  bias planes from precomputed geometric attack and between-square tables, two
  small per-stream MLP heads, a phase-router MLP producing the sigmoid gate,
  and a residual-head MLP fused into the additive
  `gate * king_logit + (1 - gate) * exchange_logit + residual_logit` puzzle logit.
