idea_id: i159
name: Vector-Quantized Motif Codebook Net
slug: vector_quantized_motif_codebook_net
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Force local board features to pass through a learned discrete codebook.
  The classifier reads code usage, spatial code maps, and quantized features. This
  tests whether a compact inventory of board motifs is useful for puzzle-likeness.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2213_friday_shanghai_architecture_batch_10.md`;
  routes a board encoder's per-square features through a learned EMA-updated
  codebook with straight-through gradients and a head that reads the per-batch
  code-usage histogram, the quantized feature pools, and a learned spatial
  code-map embedding.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus codebook diagnostics (usage entropy, perplexity,
  active code count, mean quantization distance, commitment / codebook losses,
  dominant code probability, spatial code homogeneity, encoder/quantized feature
  energies, and the per-square code map) saved to prediction artifacts.
compute_notes: Compact convolutional encoder, vector-quantization layer with
  straight-through estimator and EMA codebook updates, and a small MLP head over
  pooled quantized features, the code-usage histogram, and a learned code-map
  embedding.
