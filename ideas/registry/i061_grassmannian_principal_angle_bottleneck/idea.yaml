notes: 'Bespoke GrassmannianPrincipalAngleNet over the simple_18 board tensor with
  a Simple18OccupiedTokenExtractor (32 occupied tokens, 22 features each), a
  PieceSquareTokenEncoder MLP, a RoleGatedCovarianceSubspaces layer that builds
  weighted role covariances and their top-K eigenbases via torch.linalg.eigh, a
  PrincipalAngleSpectrum layer that computes per-pair singular values of Q_a^T Q_b
  via torch.linalg.svdvals, and a GrassmannianAngleHead MLP. The no_cross_angles,
  batch_shuffled_angles, eigenvalues_only, pooled_token_head, and
  no_orthonormalization falsifiers from section 9 are exposed via the
  model.ablation config flag. Engine, source, verification, and CRTK metadata are
  never used as input.'
mechanism_family: linear_algebra
