notes: 'Bespoke Harmonic Board Potential Network with a Simple18ChargeEncoder, a
  FixedBoardPoissonSolver that materialises Green matrices G_l = (L + lambda_l I)^{-1}
  on the 8x8 grid Laplacian (Neumann or Dirichlet boundary) as non-trainable
  buffers, a PotentialStatsPool emitting per-(charge, lambda) charge-potential
  energy / Dirichlet energy / boundary flux / king-ring potential / charge magnitude
  features, and a HarmonicPotentialHead that fuses these stats with a deterministic
  global broadcast vector. The random_orthogonal_solver, local_gaussian_solver, and
  charge_only_stats falsifiers from section 9 are exposed via the model.ablation
  config flag. Engine, source, verification, and CRTK metadata are never used as
  input.'
