idea_id: i175
name: Prototype-Margin Puzzle Network
slug: prototype_margin_puzzle_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'The model should not merely say "puzzle-like." It should compare the
  board to separate learned prototypes for random non-puzzle positions, near-puzzle
  hard negatives, and real puzzles, and read the puzzle logit out of the margin
  between the puzzle similarity and the largest non-puzzle similarity.'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0031_saturday_shanghai_puzzle_binary_challengers.md`
  (Idea 6, "Prototype-Margin Puzzle Network"); replaces a single puzzle head with
  three learned prototype banks (`P_random`, `P_near`, `P_puzzle`) and a
  `sim_puzzle - logsumexp([sim_random, sim_near])` margin head, so near-puzzle
  hard negatives get their own attractors instead of being absorbed into a generic
  negative logit.
expected_advantage: Test the packet's prototype-competition signal under the same
  puzzle_binary benchmark contract as BT4 — by giving near-puzzles their own
  prototype bank, the model gains a way to reduce near-puzzle false positives
  without sacrificing puzzle recall.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus per-class log-sum-exp
  similarities (`sim_random`, `sim_near`, `sim_puzzle`), the negative log-sum-exp
  margin term, per-prototype cosine score tensors for collapse diagnostics, and
  the encoded board latent `z`.
compute_notes: Compact convolutional trunk over `simple_18`, mean+max pooled
  descriptor, two-layer MLP encoder producing a `proto_dim`-wide latent, three
  banks of `num_prototypes` learned prototypes (random, near, puzzle) with
  cosine similarity and log-sum-exp aggregation at temperature `temperature`,
  and a margin head `sim_puzzle - logsumexp([sim_random, sim_near])`.
