author: Codex
short_thesis: 'Use a plain MLP-Mixer-style model over `2 x 2` chess patches. This
  is a simple non-attention alternative to square-token models: mix information across
  board patches with MLPs, then mix channels with MLPs.'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2208_friday_shanghai_plain_architecture_batch.md`;
  implements a plain MLP-Mixer-style board model over non-overlapping chess patches.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus token energy, token spread, token/channel mixing,
  patch occupancy, active patch fraction, patch count, and patch size diagnostics.
compute_notes: '`torch.nn.Unfold` patch extraction, learned patch embedding, stacked
  token/channel Mixer blocks, and a mean/max pooled MLP head.'
