idea_id: i084
name: Typed Hypergraph Motif Grammar
slug: typed_hypergraph_motif_grammar
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: Typed Hypergraph Motif Grammar parses each board into typed piece/relation
  hypergraphs and derives a chart-parsed motif grammar whose puzzle logit is read
  out from logsumexp aggregations of typed productions for pressure, loose targets,
  king-zone pressure, pins, lines, forks, batteries, compromised defenders, overloads,
  tactical convergence, and puzzle-like motifs.
novelty_claim: Bespoke board-only model whose decisive non-linearity is logsumexp-style
  chart parsing over typed piece/relation hypergraphs --- pressure, loose target, king-zone
  pressure, pin, line, fork, battery, compromised defender, overload, tactical convergence,
  and puzzle-like motif productions are scored on masked relation hypergraphs and
  fused with a compact convolutional board summary; not a generic CNN, attention probe,
  or shared proposal-conditioned scaffold.
expected_advantage: A typed hypergraph motif grammar with chart-parsed productions
  captures multi-piece tactical configurations (pin + loose target, overload around
  king zone, fork on high-value targets) that a flat per-square CNN baseline cannot
  read directly, so the puzzle_binary contract should reward THMG beyond capacity-matched
  CNN baselines while keeping motif evidence auditable through the chart strength
  diagnostics.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus typed-grammar diagnostics (`grammar_only_logits`,
  `motif_summary`, `pressure_motif_strength`, `loose_target_strength`, `king_zone_pressure_strength`,
  `pin_shape_strength`, `line_pressure_strength`, `fork_shape_strength`, `battery_shape_strength`,
  `compromised_defender_strength`, `overload_shape_strength`, `tactical_convergence_strength`,
  `puzzle_like_motif_strength`, `grammar_chart_energy`, `motif_entropy`, `relation_fact_count`,
  `piece_count`, `mechanism_energy`, `proposal_profile_strength`, `proposal_keyword_count`,
  `grammar_composition_depth`) saved to prediction artifacts.
compute_notes: Compact `Conv2d` board stem with `GrammarConvBlock` residual blocks,
  a deterministic typed-relation extractor (piece attributes, attacks/defends, king
  zones, pins, blockers, sliders, loose/under-defended targets), a piece-attribute
  encoder, a pair scorer with `(left, right, left*right, |left-right|, geom)` features,
  chart-parsed motif productions composed via masked logsumexp/logaddexp, and a
  `LayerNorm`/`MLP` head over `[pooled_board, motif_summary]` plus a grammar-only ablation
  head over `motif_summary`.
