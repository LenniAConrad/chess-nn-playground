idea_id: i113
name: Row-File Factor Mixer
slug: row_file_factor_mixer
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Chess boards have two privileged axes: ranks and files. A model can
  exploit this without a full Transformer by factorizing board processing into rank
  mixers, file mixers, and piece-channel mixers, then recombining them with bilinear
  interactions.'
novelty_claim: Bespoke factorized rank/file/channel mixer with an explicit bilinear
  rank-file recombination, materially distinct from the shared ResearchPacketProbe
  scaffold and from the existing convolutional and attention-based ideas.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus rank/file/bilinear energy diagnostics and a rank-file
  imbalance score saved to prediction artifacts.
compute_notes: 1x1 piece-plane embedding plus a stack of factorized rank/file/channel
  mixer blocks with a bilinear rank-file interaction term.
