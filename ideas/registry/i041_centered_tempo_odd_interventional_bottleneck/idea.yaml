short_thesis: '- Idea name: **Centered Tempo-Odd Interventional Bottleneck**. - One-sentence
  thesis: Puzzle-likeness should be predicted from the board-dependent part of the
  position...'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-21_0729_tuesday_pacific_tempo_odd_bottleneck.md`;
  central operator is a deterministic C2 side-to-move involution combined with a
  null-board centering of the encoder's pure-turn response, not a generic CNN trunk
  over board-only mechanism profiles.
expected_advantage: Test the packet's proposed board-turn interaction signal under
  the same puzzle_binary benchmark contract as the other ideas, with a materially
  distinct centered-odd interventional bottleneck rather than a shared mechanism
  profile.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus tempo-intervention diagnostics (tempo_odd_norm,
  tempo_even_norm, null_odd_norm, centered_odd_norm, side_intervention_gap, centered_odd_energy)
  saved to prediction artifacts.
compute_notes: Four shared encoder passes per position via a concatenated batch of
  shape `(4B, 18, 8, 8)`; no generated candidate set; optional `encoder_chunk_size`
  preserves the `[x, tau(x), nu(x), tau(nu(x))]` pairing order under low-memory
  chunking.
