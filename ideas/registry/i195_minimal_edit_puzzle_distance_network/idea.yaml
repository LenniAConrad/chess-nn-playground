idea_id: i195
name: Minimal-Edit Puzzle Distance Network
slug: minimal_edit_puzzle_distance_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: A near-puzzle is one small edit away from being a true puzzle; the
  classifier reads the minimal soft edit distance from the input board to a learnable
  bank of puzzle prototypes.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke architecture computes a per-square soft Hamming-style edit cost between
  the encoder's per-square symbol distribution and a learnable puzzle prototype bank,
  then reads the soft minimum edit distance directly as the puzzle decision signal.
expected_advantage: Direct minimal-edit head should separate near-puzzles (small minimum
  edit distance to a puzzle prototype) from non-puzzles (large minimum edit distance)
  on the puzzle_binary benchmark.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus minimal-edit diagnostics (per-prototype edit distances,
  soft prototype assignment, assignment entropy, per-square min-cost map and summary
  scalars).
compute_notes: Compact convolutional symbol encoder, learnable bank of K soft puzzle
  prototypes, per-square soft edit cost, soft-min over prototypes, small classifier
  head.
