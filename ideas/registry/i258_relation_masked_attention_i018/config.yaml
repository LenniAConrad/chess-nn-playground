idea_id: i258
run:
  name: i258_relation_masked_attention_i018_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: relation_masked_attention_i018
  input_channels: 18
  num_classes: 1
  channels: 64
  hidden_dim: 76
  depth: 2
  stalk_dim: 8
  dropout: 0.1
  use_triads: true
  scramble_relations: false
  mechanism_family: sheaf
  packet_profile: relation_masked_attention_i018
  relation_attention:
    enabled: true
    neighborhood: relation
    num_heads: 2
    attn_dim: 24
    top_k: 8
    relation_rank: 4
    king_boost: 0.5
    zero_init_out: true
    gate_init_bias: -2.0
    dropout: 0.0
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  monitor: pr_auc
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  i258 Relation-Masked Attention Graft over i018 -- a single small
  sparse attention residual block inserted after the last sheaf
  diffusion block and before the readout. Neighborhood selection is the
  top-K union of i018's 12 typed relation masks with a king-zone boost;
  the relation-conditioned bias is low-rank (relation_rank=4). The
  output projection is zero-initialised and the gate bias is negative
  so the model recovers the i018 baseline closely on first construction.
  Switch `relation_attention.neighborhood` to `global`, `king_zone`,
  or `candidate` to run the research-packet ablation grid; setting
  `scramble_relations: true` reuses i018's degree-preserving random
  rewiring path so the random-mask falsifier needs no extra wiring.
  CRTK metadata, source labels, PVs, and engine evaluations remain
  reporting-only and never feed the forward pass.
