idea_id: a019
run:
  name: a019_bt4_delta_pair_accumulator_mixer_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: bt4_delta_pair_accumulator_mixer
  mixer: delta_pair_accumulator
  input_channels: 18
  num_classes: 1
  channels: 64
  num_blocks: 4
  value_channels: 16
  value_hidden: 128
  se_channels: 16
  dropout: 0.1
  use_batchnorm: true
  mechanism_family: bt4_mixer
  packet_profile: bt4_delta_pair_accumulator_mixer
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: BT4-style tower with the delta_pair_accumulator primitive as the per-block spatial mixer.
  CRTK metadata is reporting-only.
