idea_id: a019
name: BT4 Primitive Mixer (delta_pair_accumulator)
slug: bt4_delta_pair_accumulator_mixer
status: implemented
created_at: '2026-05-14T10:00:00+00:00'
author: Claude
short_thesis: >-
  BT4-style residual tower whose per-block spatial-mixing operator is the
  delta_pair_accumulator primitive instead of the original conv pair. Tests whether this
  chess-aware primitive is a better spatial mixer than conv or attention
  inside a fixed BT4 tower shell.
novelty_claim: >-
  Not a new primitive. A controlled architecture study: the bt4_primitive_mixer
  tower (stem, N residual+SE blocks, value head) is held fixed and only the
  per-block spatial mixer is swapped to the delta_pair_accumulator primitive, adapted to the
  (B, C, 8, 8) -> (B, C, 8, 8) mixer contract.
expected_advantage: >-
  Isolates the delta_pair_accumulator primitive's value as a token mixer against the conv and
  attention baselines under one identical tower, optimizer, and data contract.
target_task: >-
  puzzle_binary classification. Fine labels 0 and 1 map to non-puzzle, fine
  label 2 maps to puzzle.
input_representation: >-
  Current-board simple_18 tensor only. CRTK and source metadata are
  reporting-only and never used as model input.
output_heads: One puzzle logit for the puzzle_binary BCE-with-logits trainer.
compute_notes: >-
  Shared bt4_primitive_mixer net (registered alias bt4_delta_pair_accumulator_mixer). The
  mixer module lives at
  src/chess_nn_playground/models/architecture/bt4_mixers/delta_pair_accumulator.py and obeys
  the shape-preserving spatial-mixer contract; the BT4 block wraps it with
  SqueezeExcite plus residual.
