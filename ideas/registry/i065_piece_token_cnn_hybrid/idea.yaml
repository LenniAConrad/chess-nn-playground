notes: 'Bespoke PieceTokenCNNHybrid over the simple_18 board tensor. The CNN trunk
  is a stack of 3x3 conv blocks with optional BatchNorm and Dropout2d producing a
  mean+max pooled vector. The token stream selects up to 32 occupied squares,
  builds a 22-dim piece-square feature per token (piece type, own/opponent flags,
  white/black flags, normalized rank/file plus side-relative rank/file, castling
  rights, ep flags, side-to-move, occupancy weight), and runs a small MLP encoder
  followed by mask-aware mean+max+sum set-mixer layers. The fusion head projects
  both pools to fusion_hidden and multiplies them to form an explicit interaction
  term, then concatenates the raw pools, the material summary and the interaction
  before a 3-layer MLP returns the puzzle logit. Falsifiers cnn_only_matched,
  token_only, no_interaction_fusion, material_token_only, shuffle_token_coordinates
  and single_token_layer are exposed via the model.ablation config flag. Engine,
  source, verification and CRTK metadata are never used as input.'
