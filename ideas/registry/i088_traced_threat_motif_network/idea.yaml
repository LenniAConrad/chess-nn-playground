author: Codex
short_thesis: Select **Traced Threat Motif Network**.
novelty_claim: Bespoke traced-motif algebra over ten typed `(64 x 64)` board
  group operators (`u_ctrl`, `u_hit`, `u_quiet`, `u_ray`, `u_jump`, and the
  enemy duals), a per-channel geometry-masked relation gate, a fixed
  24-word traced-threat motif vocabulary scored by trace, mass, king-mass,
  and material-value contractions, and a contest pullback combining
  inbound friendly and enemy control.
expected_advantage: Test the packet's proposed traced-motif signal under
  the same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus motif scores, top-motif indices,
  trace/king/value motif scalars, monoidal-closure features, contest
  heatmap, contest scalars, and the standard packet diagnostic scalars
  saved to prediction artifacts.
compute_notes: Residual board trunk plus a per-channel relation gate
  (`K = 36`), ten board-typed group operators
  (`u_ctrl`, `u_hit`, `u_quiet`, `u_ray`, `u_jump`, plus the enemy duals),
  a fixed 24-word motif vocabulary composed via `torch.bmm`, four
  monoidal-closure trace features, and a contest pullback. The motif
  vocabulary is fixed; only the relation gate, group-mixing softmax,
  material value vector, and head are trainable.
