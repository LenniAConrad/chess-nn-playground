idea_id: p023
run:
  name: p023_occlusion_semiring_delta_bilinear_hyperedge_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: occlusion_semiring_delta_bilinear_hyperedge
  input_channels: 18
  num_classes: 1
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  trunk_ablation: none
  token_dim: 24
  hidden_dim: 32
  bilinear_dim: 16
  head_hidden_dim: 64
  head_dropout: 0.1
  ablation: none
  mechanism_family: king_path
  packet_profile: occlusion_semiring_delta_bilinear_hyperedge
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  p023 Occlusion Semiring Delta-Bilinear Hyperedge -- additive gated
  backward semiring recurrence with opposing-direction bilinear
  hyperedges over the i193 trunk. CRTK metadata is reporting-only.
