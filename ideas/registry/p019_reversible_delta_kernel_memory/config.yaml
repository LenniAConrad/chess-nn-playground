idea_id: p019
run:
  name: p019_reversible_delta_kernel_memory_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: reversible_delta_kernel_memory
  input_channels: 18
  num_classes: 1
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  trunk_ablation: none
  token_dim: 32
  memory_heads: 16
  memory_value_dim: 16
  num_queries: 4
  head_hidden_dim: 64
  head_dropout: 0.1
  ablation: none
  mechanism_family: response_constraint
  packet_profile: reversible_delta_kernel_memory
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  p019 Reversible Delta Kernel Memory -- additive gated kernel-memory
  head over the i193 trunk. CRTK metadata is reporting-only and never
  used as model input. The active-piece set is derived rule-exactly
  from the simple_18 piece planes; phi(.) = elu(.) + 1 is the standard
  linear-attention positive feature map.
