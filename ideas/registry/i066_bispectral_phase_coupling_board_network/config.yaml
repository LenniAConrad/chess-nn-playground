idea_id: i066
run:
  name: i066_bispectral_phase_coupling_board_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: bispectral_phase_coupling_board_network
  input_channels: 18
  num_classes: 1
  mixed_channels: 16
  bispectrum_terms: 48
  head_hidden: 96
  dropout: 0.1
  use_coordinate_planes: true
  include_power_spectrum: true
  include_cross_channel_phase: true
  include_material_summary: true
  power_terms: 16
  cross_channel_pairs: 8
  cross_frequency_terms: 12
  ablation: none
  mechanism_family: linear_algebra
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Bespoke FFT bispectral phase-coupling network. CRTK metadata is reporting-only.
