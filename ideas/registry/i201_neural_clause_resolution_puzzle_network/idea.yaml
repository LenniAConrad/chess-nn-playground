name: Neural Clause-Resolution Puzzle Network
slug: neural_clause_resolution_puzzle_network
status: implemented
created_at: '2026-04-30T15:50:02+00:00'
author: Codex
short_thesis: 'A puzzle often follows from a small proof made of typed facts:'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0109_saturday_shanghai_high_upside_puzzle_batch_4.md`;
  bespoke architecture builds a typed-predicate / soft-Horn-clause / variable-binding
  pipeline (predicate embeddings, head/body clause queries, row-stochastic spatial
  relation kernels) and runs `resolution_rounds` differentiable resolution steps over
  the fact base before feeding the puzzle classifier.
expected_advantage: Test the packet's proposed proof-style inductive bias on the puzzle_binary
  benchmark; near-puzzles should fail the conjunction or unification step while real
  puzzles should derive a coherent clause witness.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus clause-resolution diagnostics (initial/final unary
  and global fact bases, full unary/global fact trajectories, per-round clause-activation
  tape, soft head/body predicate selectors, soft body-relation selectors, predicate
  embeddings, row-stochastic relation kernels, trunk energy).
compute_notes: Compact convolutional trunk plus a typed-predicate / clause-resolution
  layer. Predicate selectors are softmaxes of clause queries against a learned predicate
  embedding table; spatial unification is realised by `relation_count` row-stochastic
  square-pair kernels mixed per body slot. Resolution rounds run `K` soft Horn updates
  over the unary fact base and the global fact bank.
