idea_id: i242
name: Chess-Decomposed Attention Network
slug: chess_decomposed_attention
status: implemented
created_at: '2026-05-11T16:30:00+00:00'
author: Claude (post-scout synthesis)
short_thesis: |
  Three independent strong chess-evaluation systems each encode a different
  chess-aware structural prior: Stockfish NNUE uses king-centric input
  features (HalfKA), the i193 scout winner uses an exchange/king-safety
  dual stream, and LC0 BT4 uses global self-attention over square tokens.
  Each does one thing the others don't. This idea composes all three into
  a single trunk so the network gets king-conditioned inputs, parallel
  task-specialised sub-trunks, AND long-range attention --- in one
  architecture.
novelty_claim: |
  Direct synthesis of three independently-validated chess priors:
  (1) NNUE-style king-conditioned feature planes (own/enemy king zone, check
      rays, escape squares, attacker/defender pressure) --- precomputed
      deterministically from the simple_18 input.
  (2) i193's exchange/king dual-stream decomposition --- each stream gets a
      chess-aware input bias derived from (1).
  (3) BT4's global multi-head self-attention --- a third parallel sub-trunk
      over the 64 square tokens with no chess-aware bias, capturing
      long-range piece relationships.
  Fused with a learned softmax phase router over the three stream pools.
  As far as we are aware no published chess architecture composes all three.
expected_advantage: |
  At limited training scale (this scout: 12 epochs, 173k samples), each of
  the three priors should compound: king-centric inputs give per-square
  embeddings that already encode king context (sample efficiency); the
  dual-stream split forces specialisation; and the global attention catches
  long-range relationships that conv-only architectures need many layers
  to model. Specifically expected to beat i193 (no attention) and BT4-shaped
  classifiers (no decomposition) at matched scout-scale parameter budget.
target_task: |
  puzzle_binary classification (fine labels 0 and 1 -> non-puzzle,
  fine label 2 -> puzzle).
input_representation: |
  Current-board simple_18 tensor only; the king-centric feature planes
  are computed deterministically from the input by reusing i193's
  DualStreamFeatureBuilder (no learnable parameters). No engine metadata.
output_heads: |
  Primary puzzle logit. Diagnostic outputs: per-stream logits
  (exchange_logit, king_logit, global_logit), softmax mixture weights
  (alpha_exchange, alpha_king, alpha_global), residual_logit, route_entropy,
  stream_disagreement, per-stream pool norms, mechanism_energy.
compute_notes: |
  Three parallel transformer towers over the 64 squares (square-as-token):
  - Exchange tower: input planes = simple_18 + 8 attacker/defender-derived
    chess-aware planes; attention is biased by precomputed attacker/defender
    geometric relations.
  - King tower: input planes = simple_18 + 8 king-conditioned planes
    (king zone, check rays, escape squares, line-to-zone pressure);
    attention is biased toward king-zone square pairs.
  - Global tower: input planes = raw simple_18; attention is vanilla
    multi-head self-attention with no chess prior.
  Each tower is 2 pre-LN transformer blocks at embed_dim=64, 4 heads.
  Phase-router MLP produces a 3-way softmax mixture; per-stream logit
  heads and a residual head over the joint pool combine to form the final
  puzzle logit.
