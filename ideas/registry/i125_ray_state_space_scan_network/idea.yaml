short_thesis: Chess line motifs often require long-range context, but all-square attention
  and dynamic attack graphs are not the only way to get it. A state-space scan can
  process every rank, file, diagonal, and anti-diagonal as a short sequence with shared
  continuous re...
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2133_friday_shanghai_architecture_batch_6.md`;
  applies a bidirectional linear state-space recurrence with line-type-conditioned
  matrices to every rank, file, diagonal, and anti-diagonal of the board, rather than
  generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-line scan diagnostics (line_state_energy,
  endpoint_state_norm, rank/file/diagonal/anti_diagonal_scan_energy and _response,
  topk_line_response, king_line_response) saved to prediction artifacts.
compute_notes: Compact convolutional square encoder feeding a shared bidirectional
  linear state-space scan over the 38 chess rays (8 ranks, 8 files, 15 diagonals,
  15 anti-diagonals) with line-type-conditioned (A, B, C, D) matrices.
