idea_id: i249
name: Oriented Tactical Sheaf Laplacian (Fast)
slug: oriented_tactical_sheaf_fast
status: implemented
created_at: '2026-05-14T08:00:00+00:00'
author: Claude
short_thesis: >-
  Speed-optimized i018. Same cellular sheaf Laplacian math, same parameters,
  same logits up to floating-point reduction noise, but a GPU-friendlier
  execution pattern (algebraic dense-edge-free relation diffusion plus optional
  torch.compile) to close i018's wall-clock
  gap without touching accuracy.
novelty_claim: >-
  Not a new model family. A drop-in execution-optimized variant of i018
  oriented_tactical_sheaf_laplacian. The original runs a 12-iteration Python
  loop over typed relations (about 72 small kernel launches per block) and
  rematerializes large (B, 64, 64, stalk) intermediates; this variant
  expands the sheaf sums into W@dst, W.T@src, degree, and quadratic-energy
  terms so the edge residual tensor is never materialized, then optionally
  wraps the static-shape forward in torch.compile.
expected_advantage: >-
  Same test PR-AUC as i018 because the forward and gradient are numerically
  equivalent up to reduction order (logits match around 1e-7 and checked
  gradients around 4.5e-8), at lower GPU wall-clock. Targets i018's known
  weakness, namely FLOP-light but memory-traffic-heavy execution.
target_task: >-
  puzzle_binary classification. Fine labels 0 and 1 map to non-puzzle, fine
  label 2 maps to puzzle. Identical contract to i018.
input_representation: >-
  Current-board simple_18 tensor only. CRTK and source metadata are
  reporting-only and never used as model input. Identical to i018.
output_heads: >-
  One puzzle logit plus the same sheaf-tension, per-relation energy, transport,
  triad-defect, pin, king-ring, and board diagnostics as i018.
compute_notes: >-
  FastSheafDiffusionBlock replaces the residual-materializing per-relation
  loop with an algebraic dense-edge-free update based on batched W@dst and
  W.T@src products. Optional torch.compile with mode reduce-overhead exploits
  i018's fully static shapes for kernel fusion and CUDA graphs. Optional
  no-grad CUDA FP16 autocast is available for the fastest serving/eval path.
  All other modules are inherited from the i018 source module so the variant
  cannot drift.
