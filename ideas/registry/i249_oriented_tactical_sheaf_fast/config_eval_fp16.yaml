idea_id: i249
run:
  name: i249_oriented_tactical_sheaf_fast_eval_fp16_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: oriented_tactical_sheaf_fast
  input_channels: 18
  num_classes: 1
  channels: 64
  hidden_dim: 96
  depth: 2
  stalk_dim: 8
  dropout: 0.1
  use_batchnorm: true
  mechanism_family: sheaf
  packet_profile: oriented_tactical_sheaf_laplacian
  # Lower-precision eval/serving variant of i249. Training and gradient-enabled
  # calls remain on the surrounding precision path; no-grad CUDA inference uses
  # FP16 autocast.
  compile_model: true
  compile_mode: reduce-overhead
  return_diagnostics: true
  inference_autocast_dtype: float16
  inference_autocast_min_batch: 1
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Lower-precision eval/serving variant of i249. Same algebraic fast sheaf
  model as config.yaml, but no-grad CUDA inference uses FP16 autocast for maximum
  throughput. Use config.yaml for exact-logit i018-equivalence audits.
