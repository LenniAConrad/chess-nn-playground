idea_id: i257
run:
  name: i257_promotion_mate_slice_specialist_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: promotion_mate_slice_specialist
  input_channels: 18
  num_classes: 1
  channels: 32
  hidden_dim: 64
  depth: 2
  head_hidden_dim: 48
  type_embed_dim: 16
  dropout: 0.1
  use_batchnorm: true
  ablation: none
  delta_bound: 1.5
  joint_delta_bound: 0.75
  max_promotion_candidates: 4
  mechanism_family: promotion_mate
  packet_profile: promotion_mate_slice_specialist
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  i257 Promotion Mate Slice Specialist — board-only specialist over the
  promotion / underpromotion / mate-in-1 slices. The final logit is
  base_logit + sum_k gate_k * delta_k for the four branches; each branch
  delta is bounded by tanh and each gate is multiplied by a structural mask
  that zeros the branch when its prerequisites do not hold. CRTK metadata,
  source labels, PVs, and engine evaluations are reporting-only and never
  used as model input. The packet's slice-weighted curriculum and
  L_slice / gate_sparsity auxiliary losses are deferred to a future trainer
  extension; the current run uses the shared BCE-with-logits objective on
  the puzzle logit so the implementation plugs into the standard trainer
  without breaking unrelated runs.
