notes: |
  Derived from a post-scout analysis (2026-05-10). The i193 scout result
  (0.8755 test PR AUC at 157k params, simple_18 encoding) was the largest
  within-encoding architectural margin in the 174-model scout pool. The
  exchange+king prior empirically does real work even at tiny scale. This
  idea generalizes the prior to attention-based streams and a third
  positional stream. Implementation is the compact CPU-testable
  puzzle_binary sanity-check variant; engine value+policy heads remain
  scaled-variant design notes only.
