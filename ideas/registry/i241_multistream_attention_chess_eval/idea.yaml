idea_id: i241
name: Multi-Stream Chess-Decomposed Transformer Evaluator
slug: multistream_attention_chess_eval
status: implemented
created_at: '2026-05-10T23:30:00+00:00'
author: Claude (post-scout analysis)
short_thesis: |
  The strongest scout discovery is i193's exchange+king dual-stream
  decomposition (test PR AUC 0.8755, +0.014 above #2 at the same parameter
  budget). The dual-stream prior is composable with attention. Replacing each
  stream's conv encoder with a small transformer, adding a third
  positional/structural stream, and replacing the puzzle binary head with
  value+policy heads yields a candidate trunk for an engine-strength network
  that is structurally distinct from LC0 BT4.
novelty_claim: |
  BT4 is a single-stream piece/square transformer that must learn the
  exchange/king-safety/positional decomposition implicitly. This architecture
  hands the decomposition to the network as a hard structural prior: three
  parallel transformer towers specialized to (a) tactical exchanges,
  (b) king-zone threats, (c) positional/structural features with learned
  relative rank/file attention bias, fused at the head. The dual-stream form
  is demonstrated working at small scale by i193; this proposal generalizes
  it to attention-based streams and adds the structural third stream.
expected_advantage: |
  At matched training scale, the structural prior should give:
  - Faster convergence (the model does not need to discover the
    chess-natural decomposition from data --- it has it from initialization)
  - Better long-range modeling per stream (each stream is an attention
    transformer over its task's relevant tokens/squares)
  - Improved interpretability (per-stream logits expose what each chess
    concept is contributing to the final eval)
  - Composability with auxiliary supervision: each stream can be supervised
    by stream-specific aux losses (exchange outcome prediction, king-safety
    classification, positional eval) that BT4 has no clean place to put.
target_task: |
  puzzle_binary classification (fine labels 0 and 1 -> non-puzzle, fine
  label 2 -> puzzle) for the registered trainer. The markdown architecture
  also documents engine value+policy heads for the scaled variant; those
  heads are not built by the puzzle_binary trainer and live as scaled-engine
  design notes only.
input_representation: |
  Current-board simple_18 tensor only. CRTK / verification / source / engine
  metadata is reporting-only and not consumed.
output_heads: |
  - Primary puzzle logit (BCE-with-logits).
  - Per-stream auxiliary diagnostic logits (exchange_aux_logit, king_aux_logit,
    positional_aux_logit) carrying small-weight aux supervision in the scaled
    variant.
  - Per-stream main logits (exchange_logit, king_logit, positional_logit)
    plus phase-router mixture weights (alpha_exchange, alpha_king,
    alpha_positional) for interpretability.
compute_notes: |
  Three parallel pre-LN transformer towers at embed_dim=64 with 4 heads and
  2 blocks per stream. Each tower runs over the 64 squares as tokens:
  - Exchange tower: input planes = simple_18 + 8 attacker/defender-derived
    chess-aware planes; attention is biased by precomputed attacker/defender
    geometric relations.
  - King tower: input planes = simple_18 + 8 king-conditioned planes
    (king zone, check rays, escape squares, line-to-zone pressure);
    attention is biased toward king-zone square pairs.
  - Positional tower: input planes = raw simple_18; attention carries a
    learnable relative rank/file positional bias (no piece-specific tactical
    prior). This distinguishes it from i242's vanilla "global" stream.
  Phase-router MLP produces a 3-way softmax mixture; per-stream main and
  auxiliary logit heads plus a residual head over the joint pool combine
  to form the final puzzle logit.
