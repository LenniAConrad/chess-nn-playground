idea_id: i241
run:
  name: i241_multistream_attention_chess_eval_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: multistream_attention_chess_eval
  input_channels: 18
  num_classes: 1
  embed_dim: 64
  num_heads: 4
  exchange_blocks: 2
  king_blocks: 2
  positional_blocks: 2
  mlp_ratio: 2.0
  dropout: 0.1
  aux_loss_weight: 0.05
  ablation: none
  mechanism_family: king_path
training:
  epochs: 12
  batch_size: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0008
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 3
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: scout
  min_epochs: 6
  min_active_epochs: 6
  gradient_clip_norm: 1.0
  monitor: pr_auc
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: 'i241 compact multi-stream attention puzzle_binary sanity-check trunk. Three
  parallel transformer towers (exchange, king, positional) with chess-aware attention
  bias, learned softmax phase router, per-stream auxiliary heads, and a residual head.
  Engine value/policy heads are out of scope for the puzzle_binary trainer and live
  only in the markdown architecture for the scaled engine variant.'
