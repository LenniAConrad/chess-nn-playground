notes: |
  Derived from post-scout, post-i242 architectural analysis (2026-05-11).
  Compared to i241 (multi-stream attention) this proposal trades the
  global-attention stream for HalfKA learnable king-conditioning. The
  compact CPU-testable implementation uses `embed_dim=16` and a 32-dim
  policy head; the engine-grade scaled variant would use `embed_dim=256`
  and the LC0 1858-move space and lives as design notes only.
