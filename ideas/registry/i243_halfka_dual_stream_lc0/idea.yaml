idea_id: i243
name: HalfKA Dual-Stream LC0 Evaluator
slug: halfka_dual_stream_lc0
status: implemented
created_at: '2026-05-11T17:50:00+00:00'
author: Claude (post-scout / post-i242 synthesis)
short_thesis: |
  The strongest practical chess-evaluation architecture available today is
  a three-way composition: Stockfish NNUE's HalfKA input features for rich
  learnable king-conditioning and O(1) incremental update at engine
  inference time, the scout winner i193's exchange/king dual-stream
  decomposition as the conv backbone (replacing NNUE's plain MLP), and
  LC0's value + policy heads for MCTS-compatible output.
novelty_claim: |
  Each component is independently validated by a strong production system:
  HalfKA by Stockfish NNUE (highest CPU-engine ELO in the world), i193's
  dual-stream by the scout (largest within-encoding architectural margin
  in a 234-architecture sweep), LC0's heads by Leela Chess Zero (strongest
  GPU MCTS engine). The composition has not been deployed --- HalfKA is
  always paired with an MLP backbone, LC0 trunks use either pure conv
  (legacy nets) or pure transformer (BT4), and i193 has only been trained
  on hand-engineered deterministic features. The proposal is the simplest
  meaningful three-way composition.
expected_advantage: |
  Three independent advantages stack:
    (a) HalfKA's accumulator gives a learnable rich king-conditional
        embedding that the hand-engineered king features in i193 cannot
        capture (e.g. specific castled-king pawn-shield variants).
    (b) i193's dual-stream conv decomposition extracts tactical
        specialisation on top of the HalfKA accumulator, where Stockfish's
        plain MLP cannot. This adds the *exchange* vs *king-safety*
        decomposition that drives i193's scout-win margin.
    (c) LC0's value + policy heads make the network usable in an MCTS
        search loop, unlike pure puzzle-classifier outputs.
  Quantitatively at engine-grade training scale ($\gtrsim 10^{7}$ positions
  with engine eval labels) the expected ELO over a plain Stockfish-NNUE-shaped
  or plain-i193-conv baseline is +30--80. At the puzzle_binary scout scale
  documented here the model is trained as a sanity-check; engine-grade
  training is out of scope for this implementation.
target_task: |
  Primary trainer task: puzzle_binary classification (fine labels 0 and 1
  -> non-puzzle, fine label 2 -> puzzle). The model also exposes WDL value
  and compact 32-dim policy heads as diagnostic outputs for downstream
  engine-grade training scripts that are not part of this implementation.
input_representation: |
  Current-board simple_18 tensor only. HalfKA features are derived
  deterministically from the simple_18 tensor by extracting argmax king
  squares and piece-square occupancy. No engine metadata is consumed.
output_heads: |
  - Primary puzzle logit (BCE-with-logits).
  - WDL value logits (3-way softmax) exposed as `value_wdl_logits`.
  - Compact 32-dim policy logits exposed as `policy_logits`.
  - Per-stream main logits (`exchange_logit`, `king_logit`) and phase-router
    gate (`alpha_king`) for interpretability.
  - Accumulator norms (`white_accumulator_norm`, `black_accumulator_norm`)
    for engine-side incremental-update monitoring.
compute_notes: |
  Two stages:
    (1) HalfKA front-end --- learnable embedding tables
        `(64, 64, 6, embed_dim)` per side indexed by
        `(king_square, piece_square, piece_type)`. The per-side
        accumulator is the sum of embeddings of active features; both
        accumulators are split per-square to form a `(B, 2*embed_dim, 8, 8)`
        token grid.
    (2) i193 dual-stream backbone --- the per-square token grid is
        concatenated with i193's deterministic exchange and king feature
        planes and run through two parallel conv stream encoders. A phase
        router emits a sigmoid gate over the streams; per-stream heads and
        a residual head produce the puzzle logit. LC0-style WDL and policy
        heads sit on the fused pool.
