idea_id: i243
run:
  name: i243_halfka_dual_stream_lc0_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: halfka_dual_stream_lc0
  input_channels: 18
  num_classes: 1
  embed_dim: 16
  backbone_channels: 48
  backbone_depth: 2
  head_hidden: 96
  dropout: 0.1
  policy_dim: 32
  use_batchnorm: true
  ablation: none
  mechanism_family: king_path
training:
  epochs: 12
  batch_size: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0008
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 3
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: scout
  min_epochs: 6
  min_active_epochs: 6
  gradient_clip_norm: 1.0
  monitor: pr_auc
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: 'i243 compact HalfKA dual-stream LC0-style puzzle_binary sanity-check trunk.
  Learnable HalfKA accumulator front-end (king_sq x piece_sq x color x piece_type
  embedding) feeds i193 dual-stream conv backbone; phase-router fusion plus per-stream
  heads and a residual head produce the puzzle logit. LC0-style WDL value head and
  a compact 32-dim policy head are exposed as diagnostics; the puzzle_binary trainer
  only consumes the puzzle logit.'
