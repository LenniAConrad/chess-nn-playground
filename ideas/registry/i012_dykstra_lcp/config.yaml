idea_id: i012
run:
  name: idea_i012_dykstra_lcp_lc0bt4_v2_projector
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: lc0_bt4_112
  cache_features: false
model:
  name: dykstra_lcp
  architecture_version: 2
  input_channels: 112
  num_classes: 1
  channels: 48
  num_blocks: 3
  value_channels: 16
  value_hidden: 128
  se_channels: 12
  role_count: 8
  relation_channels: 4
  motif_count: 8
  slack_count: 6
  solver_cycles: 4
  dropout: 0.1
  use_batchnorm: true
  slack_max: 1.0
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  class_weighting: balanced
  loss: dykstra_lcp
  dykstra_lcp:
    hard_negative_fraction: 0.2
    hard_negative_weight: 1.5
    lambda_pos_residual: 0.03
    lambda_neg_margin: 0.02
    lambda_decay: 0.01
    negative_projection_margin: 0.2
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: 'Soft-Dykstra LCP v2 projector: compact LC0 BT4 trunk with 4-cycle latent
  constraint projection, exact motif simplex normalization, motif-conditioned budget
  constraints, closure slack, and binary-only hard-negative emphasis. Paper-grade
  default: convergence budget with validation plateau, minimum active epochs, LR
  reduction, and full artifact validation.'
