idea_id: i106
name: Attention Perturbation Sensitivity Network
slug: attention_perturbation_sensitivity_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Attention maps are often decorative unless perturbing attended regions
  changes evidence. This model uses deterministic attention-guided perturbation sensitivity
  as the bottleneck: how much the latent moves when high-attention versus low-attention
  board regions are safely masked is the central feature.'
novelty_claim: Bespoke attention-perturbation-sensitivity bottleneck where a small
  attention reader produces per-query maps over the 64 board squares, four deterministic
  mask families (top-attention, low-attention occupied, permutation-random occupied,
  and the 3x3 neighbourhood of the top-attention square) zero the 12 piece planes
  at the selected squares, and the puzzle classifier reads the base latent plus
  the resulting sensitivity contrasts.
expected_advantage: Test the packet's proposed sensitivity-contrast signal against
  the same puzzle_binary contract as the other ideas; the contrast bottleneck
  should beat random masks and attention-without-perturbation baselines whenever
  attended regions are causally useful rather than decorative.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-query attention, per-square attention,
  variant latents and keep masks (top, low, random, neighbourhood), four
  sensitivity scalars, four contrasts (top-low, top-random, neighbourhood-top,
  top/low ratio), and seven attention diagnostics (mean query entropy, max
  attention, top-K mass, occupied/empty mass, query-axis disagreement, per-square
  range).
compute_notes: Shared attention reader is re-run four times per sample (one base
  pass plus four masked variants), so the model is roughly five encoder forwards
  per board. Mask construction is deterministic with gradient-detached index
  selection, a fixed 64x64 3x3 neighbourhood buffer, and a seeded permutation for
  the random-mask central ablation.
