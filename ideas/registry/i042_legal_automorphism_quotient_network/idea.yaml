short_thesis: '- Idea name: Legal Automorphism Quotient Network - One-sentence thesis:
  A chess puzzle-likeness classifier should quotient out the exact current-board automorphisms
  of...'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-21_0731_tuesday_los_angeles_orbit_quotient.md`;
  the central operator is the deterministic Reynolds quotient over the four-element
  legal chess-rule automorphism group `G = <m, q> ~ C2 x C2`, with C2 x C2 character
  diagnostics and an optional character-energy regularizer. Materially distinct from
  the shared mechanism-profile probe.
expected_advantage: Test the packet's proposed orientation-quotient signal under the
  same puzzle_binary benchmark contract as the other ideas, with a materially distinct
  group-quotient bottleneck rather than a shared mechanism profile.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus orbit-quotient diagnostics (z_invariant, invariant_norm,
  character_energy, character_norms, file_mirror_character_norm, color_flip_character_norm,
  joint_character_norm, orbit_variance, character_penalty) saved to prediction artifacts.
compute_notes: Four shared encoder passes per position via a concatenated batch of
  shape `(4B, 18, 8, 8)`; no generated candidate set; optional `orbit_chunk_size`
  preserves the `[e, m, q, mq]` orbit pairing under low-memory chunking.
