idea_id: i046
name: Rule-Exact Orbit Bottleneck Network
slug: rule_exact_orbit_bottleneck_network
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: 'A chess position should remain equally puzzle-like under the exact
  color-flip automorphism of chess rules, so a classifier that averages predictions
  over this rule-exact orbit should suppress color-perspective/source artifacts while
  preserving tactical geometry.'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-21_0750_tuesday_los_angeles_orbit_bottleneck.md`;
  bespoke Reynolds projection over the deterministic chess color-flip orbit
  `G = {e, kappa}` on top of a shared compact convolutional encoder, with the
  packet's central `rank_flip_no_color` falsifier wired into the same model class
  for parameter-matched ablations. Materially distinct from the shared
  ResearchPacketProbe mechanism profile.
expected_advantage: Test the packet's proposed rule-exact orbit invariance under
  the same puzzle_binary benchmark contract as the other ideas, with a built-in
  semantics-destroying falsifier (`rank_flip_no_color`) that keeps compute and
  parameter count matched.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; the deterministic color-flip
  adapter fails closed on unknown channel schemas. CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (orbit-averaged Reynolds projection) plus orbit
  diagnostics (identity_view_logit, transformed_view_logit, view_logit_gap,
  identity_probability, transformed_probability, mean_view_probability,
  orbit_probability_gap, symmetry_residual, latent_orbit_variance, mechanism_energy,
  orbit_size) saved to prediction artifacts.
compute_notes: Compact convolutional encoder shared across orbit views (default
  stem_width=64, latent_dim=96, num_blocks=2). The orbit only doubles the
  per-batch forward pass; it adds no trainable parameters.
