idea_id: i187
name: Exchange-Soundness Graph Network
slug: exchange_soundness_graph_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Many false puzzle signals come from attacks that look strong but lose
  material or fail tactically after exchanges. A puzzle detector should know whether
  an apparent tactic is exchange-sound.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke board-only exchange-soundness graph network that learns per-square attacker
  and defender intensities plus piece-type-aware cheapest-attacker / cheapest-defender
  value fields, runs a bounded-depth differentiable static exchange evaluation on
  the resulting attack/defense graph, and feeds the SEE-weighted target pool plus
  explicit `max_see_target`, `frac_unsound_targets`, `defense_gap` and
  `reply_pressure` scalars through a small head.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus exchange-soundness graph diagnostics
  (`attacker_intensity`, `defender_intensity`, `attacker_value_field`,
  `defender_value_field`, `target_value_field`, `exchange_score_field`,
  `exchange_soundness_field`, `target_mask`, `max_see_target`,
  `mean_see_target`, `frac_unsound_targets`, `graph_pressure`, `reply_pressure`,
  `defense_gap`, `transport_imbalance`, `sheaf_tension`, `target_count`,
  `trunk_energy`).
compute_notes: Compact convolutional trunk plus four 3x3->1x1 graph heads (attacker
  intensity, defender intensity, attacker piece-type distribution, defender piece-type
  distribution), a depth-4 differentiable static exchange evaluation, and three
  pooled feature streams (exchange / attacker / defender) consumed by a small MLP
  head.
