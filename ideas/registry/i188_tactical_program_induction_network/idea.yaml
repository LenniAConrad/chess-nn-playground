idea_id: i188
name: Tactical Program Induction Network
slug: tactical_program_induction_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'A puzzle can be viewed as a tiny latent program:'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke board-only program-induction network that runs an ordered, latent program
  of typed tactical operations (`threaten`, `pin`, `deflect`, `overload`, `fork`,
  `clear_line`, `trap_king`, `win_target`) over learned source/target square
  distributions, grounded against a closed-form typed-relation tensor on the
  `simple_18` board, with per-step precondition / postcondition / relation
  evidence combined into a program-coherence summary feeding the puzzle head.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus tactical-program-induction diagnostics
  (`program_coherence`, `program_log_coherence`, `precondition_score`,
  `postcondition_score`, `relation_coherence`, `operation_entropy`,
  `step_coherence`, `step_precondition_scores`, `step_postcondition_scores`,
  `step_relation_scores`, `operation_probs`, `primary_piece_probs`,
  `target_square_probs`, `mechanism_energy`, `proposal_profile_strength`,
  `proposal_keyword_count`, `relation_fact_count`, `material_balance`,
  `board_activation_energy`, plus per-op `op_<name>_strength` /
  `op_<name>_mass` for each typed operation).
compute_notes: Compact convolutional board encoder, a closed-form typed-fact
  extractor over the simple_18 planes (8 typed operations on (source, target)
  square pairs), an ordered K=4 latent program loop with op / source / target
  selectors, a small latent executor that updates the per-square tokens, and a
  GRU-based program-state update fold-in.
