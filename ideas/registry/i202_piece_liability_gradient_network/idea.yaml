idea_id: i202
name: Piece Liability Gradient Network
slug: piece_liability_gradient_network
status: implemented
created_at: '2026-04-30T15:50:02+00:00'
author: Codex
short_thesis: In many puzzles, one piece is not merely attacked; it is liable. It
  cannot move, defend, capture, or stay without losing something. Near-puzzles may
  attack pieces, but the liability does not propagate.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0109_saturday_shanghai_high_upside_puzzle_batch_4.md`;
  bespoke architecture decomposes each square into per-affordance action values
  (`move`, `defend`, `capture`, `stay`), collapses them via a soft minimum into a
  per-square liability field, and runs `propagation_rounds` row-stochastic spatial
  propagation steps so that one piece's liability can lift its defenders and
  retreat squares before the puzzle classifier reads the liability gradient.
expected_advantage: Test the packet's proposed structure-aware liability signal
  on the puzzle_binary benchmark; near-puzzles should produce only local
  attack-flavoured liability while real puzzles should show measurable
  liability propagation through the learned relation kernels.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus liability diagnostics (action affordances,
  initial/final liability fields, full liability trajectory, liability gradient,
  row-stochastic relation kernels, per-round propagation gates, max/mean/top-k
  liability summaries, trunk energy).
compute_notes: Compact convolutional trunk plus a per-square action-affordance head
  and a liability-propagation layer with `relation_count` row-stochastic spatial
  kernels and per-round propagation gates. Liability is masked to occupied squares
  via the simple_18 piece bitboards.
