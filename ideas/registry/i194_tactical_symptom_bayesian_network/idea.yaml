idea_id: i194
name: Tactical Symptom Bayesian Network
slug: tactical_symptom_bayesian_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'Many tactical concepts behave like noisy logical symptoms:'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0040_saturday_shanghai_puzzle_architecture_batch_3.md`;
  bespoke board-only differentiable noisy-AND/noisy-OR symptom Bayesian network with
  K learned per-square sigmoid symptom heads pooled to image-level by noisy-OR,
  J latent noisy-OR causes, a learned noisy-AND/noisy-OR mixture aggregator, and
  the source-packet output rule `logit(clamp(puzzle_prob)) + residual_weight * residual_logit`.
expected_advantage: Forces puzzle classification through a consistent symptom
  cluster (noisy-AND/noisy-OR of compatible symptoms) instead of free dense pooling,
  so near-puzzles that activate only some symptoms cannot reach a strongly positive
  puzzle logit.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus symptom-network diagnostics (`puzzle_prob`,
  `evidence_logit`, `residual_logit`, `residual_weight`, `symptom_linear_logit`,
  `symptom_max`, `symptom_mean`, `symptom_entropy`, `cause_max`, `cause_mean`,
  `cause_entropy`, `noisy_or_prob`, `noisy_and_prob`, `and_or_alpha`,
  `mechanism_energy`, `proposal_profile_strength`, `proposal_keyword_count`).
compute_notes: Compact convolutional trunk, 1x1 per-square symptom readout pooled
  by noisy-OR, K-by-J noisy-OR cause layer with a per-cause leak, J-cause
  noisy-AND/noisy-OR mixture aggregator, plus a small residual MLP head fused into
  `logit(puzzle_prob) + residual_weight * residual_logit`.
