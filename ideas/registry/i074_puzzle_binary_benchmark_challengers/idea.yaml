idea_id: i074
name: Puzzle-Binary Benchmark Challengers
slug: puzzle_binary_benchmark_challengers
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: Negative-Class Disentangled Puzzle Head — three explicit evidence
  channels (random, near-puzzle, puzzle) collapsed at inference via
  puzzle_logit = e_puzzle - logsumexp([e_random, e_near]) so the model can
  separate near-puzzle hard negatives from puzzles.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0031_saturday_shanghai_puzzle_binary_challengers.md`
  (Idea 1, "Negative-Class Disentangled Puzzle Head"); replaces the generic
  CNN+single-logit baseline with three disentangled evidence heads and a
  logsumexp negative competition that directly targets the benchmark's
  near-puzzle false-positive failure mode.
expected_advantage: Reduce near-puzzle -> puzzle false-positive rate below the
  current `0.248` BT4 baseline while keeping puzzle recall above `0.78`,
  meeting the packet's promotion criteria of test F1 > 0.755 and PR-AUC > 0.820.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus three scalar evidence
  channels (`evidence_random`, `evidence_near`, `evidence_puzzle`), the raw
  3-way logits stack `aux_3way_logits` for an optional 3-way CE auxiliary
  term, and disentanglement diagnostics (`negative_margin`,
  `random_vs_near_gap`, `trunk_energy`).
compute_notes: Compact convolutional trunk over `simple_18`, mean+max pooled
  descriptor, shared `LayerNorm + Linear + GELU` projection, and three small
  two-layer MLP evidence heads. Final puzzle logit is
  `e_puzzle - logsumexp([e_random, e_near])`.
