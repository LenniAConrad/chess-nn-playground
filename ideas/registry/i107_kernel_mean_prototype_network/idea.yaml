idea_id: i107
name: Kernel Mean Prototype Network
slug: kernel_mean_prototype_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Puzzle-like positions may be separable by the distribution of occupied
  piece tokens in a learned kernel feature space. Instead of attending to pieces or
  computing pairwise transport, embed the occupied-piece set as a kernel mean and
  compare it to learned prototype embeddings.
novelty_claim: Bespoke kernel-mean / prototype bottleneck where each occupied piece
  token is lifted through a learnable random-Fourier-style map, the position is
  summarised as a single empirical kernel mean ``mu(x) = mean_i phi(x_i)``, and the
  classifier only reads ``mu(x)`` plus squared MMD-like distances to a bank of
  learnable prototype embeddings (with per-prototype RBF similarities) and a small
  set of set-cardinality diagnostics.
expected_advantage: Test the packet's proposed kernel-mean signal against the same
  puzzle_binary contract as the other ideas; the prototype bottleneck should beat
  attention and transport baselines whenever the puzzle vs non-puzzle distinction
  is carried by the empirical distribution of occupied piece tokens rather than by
  pairwise piece interactions.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus kernel mean ``mu(x)``, per-square kernel
  features, occupancy mask, occupied-piece count and its log, side-canonical
  per-piece-type counts, us-vs-them imbalance, kernel self-similarity, prototype
  distances, prototype similarities, per-prototype log-gamma, and the concatenated
  diagnostic feature vector.
compute_notes: Shared piece tokenizer and a learnable random-Fourier kernel lift
  produce per-square kernel features once per board; the kernel mean is a single
  masked sum, and prototype distances/similarities are O(num_prototypes * phi_dim)
  per sample. There is no attention over squares and no pairwise transport plan.
