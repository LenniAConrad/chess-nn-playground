idea_id: i179
name: Causal Piece-Derivative Network
slug: causal_piece_derivative_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: In true puzzles, the puzzle signal often depends sharply on a few critical
  pieces or squares. In near-puzzles, the score may come from broad tactical texture
  without a decisive dependency.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0037_saturday_shanghai_puzzle_architecture_batch_2.md`
  (Idea 3, "Causal Piece-Derivative Network"); replaces a single global puzzle head
  with a trunk + gating-head + lightweight shared delta encoder that estimates
  per-candidate intervention sensitivities and reads `puzzle_logit = base_logit +
  criticality_mlp(max, top2_gap, entropy, signed_sum, own_vs_enemy_split)`.
expected_advantage: Test the packet's causal piece-derivative signal under the same
  puzzle_binary benchmark contract as the other ideas — peaked criticality should
  separate true puzzles (a few pieces dominate the sensitivity field) from near-puzzles
  whose sensitivity profile stays flat.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus the trunk-only `base_logit`,
  the criticality residual, candidate indices and gating scores, candidate own/opp/occupancy
  indicators, per-(candidate, intervention) delta logits and sensitivities,
  per-candidate mean sensitivity, the five criticality summary statistics
  (max, top2 gap, entropy, signed sum, own-vs-enemy split), the gating distribution
  entropy, and the trunk feature map.
compute_notes: Compact convolutional trunk over `simple_18`, plus a per-square gating
  head and a shared lightweight delta encoder. The trunk is computed once per batch;
  the delta encoder is run once over the broadcast `(B, K, T)` candidate × intervention
  grid so the cost stays close to the trunk's.
