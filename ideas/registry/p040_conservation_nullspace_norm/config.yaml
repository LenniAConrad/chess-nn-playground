idea_id: p040
run:
  name: p040_conservation_nullspace_norm_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: conservation_nullspace_norm
  input_channels: 18
  num_classes: 1
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  trunk_ablation: none
  latent_dim: 16
  epsilon: 0.001
  weight_bias: 1.0
  head_hidden_dim: 64
  head_dropout: 0.1
  ablation: none
  mechanism_family: response_constraint
  packet_profile: conservation_nullspace_norm
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  p040 Conservation-Nullspace Normalization. Additive gated head that
  projects a per-square latent onto a fixed conserved-charge subspace
  (constant, file, rank, parity, king-zone, edge / corner indicators),
  removes that component, and normalises the weighted residual. CRTK
  metadata, source labels, verification flags, and engine evaluations
  are not consumed.
