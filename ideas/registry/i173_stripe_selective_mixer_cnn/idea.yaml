idea_id: i173
name: Stripe-Selective Mixer CNN
slug: stripe_selective_mixer_cnn
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: 'A practical line-aware CNN may be enough to beat the current BT4 while
  staying simpler than Schur-Ray. Instead of ordinary `3x3` convolutions only, every
  block mixes along the four chess stripe directions — ranks, files, diagonals, and
  anti-diagonals — and a per-channel sigmoid global-context gate selects which stripe
  directions matter for a given board.'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-25_0031_saturday_shanghai_puzzle_binary_challengers.md`
  (Idea 4, "Stripe-Selective Mixer CNN"); replaces ordinary 3x3 convolutional pooling
  with explicit rank, file, diagonal, and anti-diagonal stripe scans plus a global-context
  sigmoid gate over the four stripe branches.
expected_advantage: Test the packet's line-aware signal under the same puzzle_binary
  benchmark contract as BT4 — keep the strengths of a CNN while exposing exact long-range
  line paths so near-puzzle hard negatives that differ from puzzles by one blocker
  or one diagonal can be separated.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (BCE-with-logits) plus per-block per-channel gate history,
  per-stripe branch energies (`local_branch_energy`, `rank_branch_energy`, `file_branch_energy`,
  `diag_branch_energy`, `antidiag_branch_energy`), per-line-type contrasts, and trunk-level
  diagnostics.
compute_notes: Compact convolutional trunk with depth stripe-selective mixer blocks.
  Each block has one local `Conv3x3` plus four directional stripe `Conv2d` kernels
  (rank, file, diagonal, anti-diagonal) constrained by fixed binary masks, a per-channel
  sigmoid gate driven by the global pool of the block input, and a `Conv1x1` fuse
  with a residual connection.
