short_thesis: Bitboard Shift-Algebra Network tests whether a generic board mechanism
  improves puzzle-binary classification.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2131_friday_shanghai_bitboard_shift_algebra.md`;
  uses fixed rule-shaped square-shift operators and learned low-degree operator polynomials
  with board-conditioned coefficients rather than generic CNN-only pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus shift-algebra coefficient, residual, energy, and
  material diagnostics saved to prediction artifacts.
compute_notes: Coordinate-augmented convolutional stem, fixed sparse chess shift bank,
  board-conditioned low-degree operator polynomials over a small path basis, gated
  fusion with the stem, and per-head shift diagnostics fused with CNN and material
  summaries.
