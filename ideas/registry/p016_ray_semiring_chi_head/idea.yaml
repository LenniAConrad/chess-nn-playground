idea_id: p016
name: Ray-Semiring χ-Head
slug: ray_semiring_chi_head
status: implemented
created_at: '2026-05-13T00:00:00+00:00'
author: Claude (delta-accumulator batch)
short_thesis: |
  χ-head splits the accumulator into white-piece (h+) and black-piece (h-) channels and uses only the even × odd cross-bilinear ``Σ M^{+-}_{ij} h^+_i h^-_j`` as the value head, structurally guaranteeing ``f(τ x) = − f(x)`` for the colour-swap involution τ — the exact symmetry of chess evaluation.
novelty_claim: |
  Standard nn.Bilinear has no constraint on its weight tensor and must learn the colour antisymmetry from data; the χ-head bakes it into the operator's compute graph by parameter-tying the sign-graded subspace. This is the strongest novelty claim in external_10.
expected_advantage: |
  Machine-precision colour-flip antisymmetry without data augmentation; non-regressed matched-recall FP rate at ≥3× fewer effective bilinear parameters. Ablations no_chi_grading and no_ray_exchange must each lose part of the lift, or the χ-grading is not load-bearing.
target_task: |
  puzzle_binary classification (fine labels 0 and 1 map to non-puzzle, fine label 2 maps to puzzle).
input_representation: |
  Current-board simple_18 tensor as the only model input. The active piece-square feature set used by the delta-accumulator is computed deterministically from the 12 piece planes; the side-to-move plane is also rule-derived. CRTK metadata, source labels, verification flags, principal variations, and engine evaluations are reporting-only and never used as model inputs.
output_heads: |
  One puzzle logit. Diagnostics: base_logit (i193 trunk output), primitive_delta, primitive_delta_raw, primitive_gate, primitive_gate_logit, primitive_active_count, primitive_state_norm, plus the i193 trunk diagnostics and the primitive-specific per-sample diagnostics emitted by compute_state.
compute_notes: |
  Trunk: bespoke i193 ExchangeThenKingDualStreamNetwork.
  Head: per-colour active-feature splits, separate Linear (rank=chi_rank) projections for h+ and h-, nn.Bilinear cross-term + light ray-pooled occupancy diagnostic (rank+file 8-bin summaries).
