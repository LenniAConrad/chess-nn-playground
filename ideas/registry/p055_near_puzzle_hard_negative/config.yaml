idea_id: p055
run:
  name: p055_near_puzzle_hard_negative_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: near_puzzle_hard_negative
  input_channels: 18
  num_classes: 1
  trunk_channels: 64
  trunk_hidden_dim: 96
  trunk_depth: 2
  trunk_dropout: 0.1
  trunk_use_batchnorm: true
  trunk_ablation: none
  num_candidates: 24
  num_replies: 24
  token_dim: 32
  head_hidden_dim: 64
  head_dropout: 0.1
  reply_temperature: 1.0
  candidate_temperature: 1.0
  safe_threshold: 0.5
  king_zone_radius: 2
  gate_init: -2.0
  ablation: none
  mechanism_family: rejection_veto
  packet_profile: near_puzzle_hard_negative
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  p055 Near-Puzzle Hard-Negative Veto -- additive gated head over the
  i193 trunk. The veto head consumes the 11-d diagnostic vector
  ``z(x) = [FG*, FG(m*), Disc(m*), Conc, Gap12, Avail, RCI,
            dBal, KEP, DOA, Counter]`` computed from learned candidate
  and reply token pools plus board-only king-pressure reductions.
  CRTK metadata, source labels, verification flags, and engine
  evaluations are reporting-only and never used as model inputs.
