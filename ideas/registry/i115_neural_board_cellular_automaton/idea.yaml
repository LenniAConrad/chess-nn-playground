idea_id: i115
name: Neural Board Cellular Automaton
slug: neural_board_cellular_automaton
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Some board patterns may be recognized by repeated local relaxation.
  A neural cellular automaton applies the same local update rule for several steps
  and classifies from the evolving board state and update energy.
novelty_claim: Bespoke recurrent local-update architecture with one 3x3 cellular-automaton
  rule whose weights are tied across all steps; the puzzle classifier reads both
  the relaxed cell state and the per-step update-energy trajectory. Materially distinct
  from the shared ResearchPacketProbe scaffold and from stacked-residual CNN baselines
  whose blocks have independent weights.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-step update-energy and state-energy trajectories,
  the pooled and final cell states, and the realized step size as diagnostics.
compute_notes: 1x1 cell-state lift, one shared 3x3 local update rule applied for `steps`
  iterations with tied weights and a learnable sigmoid-bounded step size, then a
  small MLP classifier over pooled state plus update-energy summary.
