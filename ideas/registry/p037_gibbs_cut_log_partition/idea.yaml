idea_id: p037
name: Gibbs Cut Log-Partition Operator
slug: gibbs_cut_log_partition
status: implemented
created_at: '2026-05-13T00:00:00+00:00'
author: Claude (gpt-orbit-boolean-algebra primitive batch)
short_thesis: |
  A differentiable Gibbs cut log-partition over a latent ``H x W`` grid.
  For each batch element we compute ``y = -tau * log Z`` where ``Z`` is
  the sum over all node subsets ``S`` of ``exp(-(cut(S) + s/t penalty)/tau)``.
  The summation is reduced from ``2^(H*W)`` to ``O(H * 2^(2W))`` by a row
  transfer-matrix dynamic program in log space. The cut grid is small
  (``4 x 4`` default) so the transition matrix is ``16 x 16`` per row.
  The per-channel log-partition is pooled and projected to a gated
  additive logit delta over the i193 trunk.
novelty_claim: |
  Distinct from classical min-cut (one solution) and from CRF/Ising
  inference (returns marginals over node labels). The primitive returns
  *cut* log-partition values plus the implicit Gibbs cut-edge marginals
  via autograd. No existing ``p###`` primitive computes a row transfer
  log-partition over board cuts; the closest neighbour
  ``low_rank_signed_cut_query_network`` uses low-rank cut queries, not a
  cut log-partition.
expected_advantage: |
  Targeted lift on slices where chess king-safety / fortress reasoning
  is gated by a single bottleneck square -- the cut log-partition
  exposes those chokepoints directly. We measure aggregate PR AUC and
  per-channel cut-energy correlation with king-safety scoring on the
  declared slice.
target_task: |
  puzzle_binary classification on the simple_18 board tensor (same
  contract i193 and i248 follow).
input_representation: |
  Current-board simple_18 tensor as the model input. Cut-grid latents
  (edge costs, source/sink penalties) are projected from the i193 joint
  feature. CRTK metadata, source labels, verification flags, engine
  evaluations, Stockfish scores, principal variations, and any
  report-only metadata are not consumed.
output_heads: |
  One puzzle logit. Per-sample diagnostics include base_logit,
  primitive_delta, primitive_delta_raw, primitive_gate,
  primitive_gate_logit, primitive_gate_entropy,
  gibbs_log_partition_mean, gibbs_log_partition_max,
  gibbs_cut_edge_energy, plus the i193 trunk diagnostics (trunk_*).
compute_notes: |
  Trunk: bespoke i193 ExchangeThenKingDualStreamNetwork. Head: project
  joint feature to horizontal edges ``(H, W-1, d_cut)``, vertical edges
  ``(H-1, W, d_cut)``, source / sink penalties ``(H, W, d_cut)``, all
  passed through softplus to enforce non-negativity. Row transfer DP in
  log space yields ``log Z in R^{B, d_cut}``. Pool log-partition +
  per-channel cut-edge energy, project to gated delta.
