idea_id: i140
name: Low-Displacement-Rank Board Operator
slug: low_displacement_rank_board_operator
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Global square mixing can be parameterized by structured matrices instead
  of dense attention or convolutions. A low-displacement-rank operator over the flattened
  board can express long-range interactions with Toeplitz/Hankel-like structure and
  few parameters.
novelty_claim: Bespoke 64x64 board operator built as an explicit sum of structured
  generators (rank/file Toeplitz plus main / anti-diagonal Hankel-like mixers and
  a small low-rank residual) so that the Sylvester displacement A - Z A Z^T is low
  rank by construction; per-component response energies and the displacement-residual
  norm are exposed as diagnostics.
expected_advantage: Test the packet's proposed low-displacement-rank board operator
  under the same puzzle_binary benchmark contract as the other linear-algebra ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus low-displacement-rank diagnostics (per-component
  T_rank / T_file / H_diag / H_anti / U V^T response energies, the operator response
  residual, and the displacement residual norm).
compute_notes: 1x1 input projection; num_layers structured-operator blocks where each
  block builds a 64x64 operator A = T_rank + T_file + H_diag + H_anti + U V^T from
  small parameter vectors, applies it to the flattened board, adds a 1x1 pointwise
  channel mix, and uses BN + GELU. Operators are explicit so per-component
  diagnostics are exact.
