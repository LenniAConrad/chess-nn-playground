idea_id: i045
name: Credal Near-Puzzle Evidence Network
slug: credal_near_puzzle_evidence_network
status: implemented
created_at: '2026-04-30T15:43:31+00:00'
author: Codex
short_thesis: 'Train a binary puzzle-likeness classifier whose output is a Dirichlet
  evidence distribution: hard singleton targets for fine labels 0 and 2, and a credal
  positive interval [tau, 1] with an evidence cap for the verified near-puzzle fine
  label 1.'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-21_0750_tuesday_los_angeles_credal_evidence.md`;
  bespoke binary Dirichlet evidential head over a compact residual board encoder, with
  a fail-closed channel adapter and credal/evidence-cap loss-shaping constants exposed
  to a dedicated CredalEvidenceLoss. Materially distinct from the shared
  ResearchPacketProbe mechanism profile.
expected_advantage: Improve fine-label-1 recall at matched fine-label-0 false-positive
  rate and improve calibration without changing the official puzzle_binary output
  contract.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input. LC0 schemas fail closed unless
  explicitly opted in.
output_heads: One puzzle logit (sigmoid equals the Dirichlet predictive mean) plus
  Dirichlet diagnostics (alpha, alpha_pos, alpha_neg, evidence, evidence_pos,
  evidence_neg, evidence_mass, mu_pos, uncertainty) saved to prediction artifacts.
compute_notes: ~0.3M trainable parameters at default widths (hidden_channels=64,
  num_res_blocks=4, hidden_dim=128); about 21M MACs per board for the convolutional
  trunk.
