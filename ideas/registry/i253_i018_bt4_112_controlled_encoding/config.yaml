idea_id: i253
run:
  name: i253_i018_bt4_112_controlled_encoding_simple18_exact
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: i018_bt4_112_controlled_encoding
  input_channels: 18
  num_classes: 1
  channels: 64
  hidden_dim: 96
  depth: 2
  stalk_dim: 8
  dropout: 0.1
  use_batchnorm: true
  use_triads: true
  relation_mode: exact
  relation_hidden: 16
  relation_rank: 8
  augmentation_lambda: 0.25
  scramble_exact_relations: false
  augmentation_only: false
  mechanism_family: sheaf
  packet_profile: i018_bt4_112_controlled_encoding
training:
  epochs: 30
  min_epochs: 15
  min_active_epochs: 15
  batch_size: 192
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 8
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  monitor: pr_auc
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  i253 default cell: exact-relations-only, simple18 padded to 112 raw
  channels. This is the matched control row of the 36-run base matrix in
  the research markdown. To walk the rest of the matrix:

    * BT4 exact:               data.encoding=lc0_bt4_112, model.input_channels=112
    * simple18 confidence:     model.relation_mode=confidence
    * BT4 confidence:          data.encoding=lc0_bt4_112, model.input_channels=112, model.relation_mode=confidence
    * simple18 hybrid:         model.relation_mode=hybrid
    * BT4 hybrid:              data.encoding=lc0_bt4_112, model.input_channels=112, model.relation_mode=hybrid

  Falsifiers (per row):
    * model.scramble_exact_relations=true   # degree-preserving relation scramble
    * model.augmentation_only=true          # hybrid mode only: drop exact masks

  CRTK metadata is reporting-only.
