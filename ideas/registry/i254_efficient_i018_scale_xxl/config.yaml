idea_id: i254
run:
  name: i254_efficient_i018_scale_xxl_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: efficient_i018_scale_xxl
  input_channels: 18
  num_classes: 1
  channels: 160
  hidden_dim: 320
  depth: 4
  stalk_dim: 8
  dropout: 0.1
  use_batchnorm: true
  use_triads: true
  restriction_mode: full
  restriction_rank: 4
  compile_model: false
  fuse_incidence: false
  mechanism_family: sheaf
  packet_profile: efficient_i018_scale_xxl
training:
  epochs: 20
  min_epochs: 10
  min_active_epochs: 10
  batch_size: 128
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  monitor: pr_auc
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  Default first-XXL recommended cell from the research markdown:
  width=160, hidden_dim=320, depth=4, stalk_dim=8, restriction_mode=full,
  compile_model=false, fuse_incidence=false. Static parameter count
  matches the markdown's claim (785,217 params, ~1.66x i018 scale_xl).

  Other rows of the i254 ablation matrix are single-line edits:

    * Depth-only diagnostic:   model.depth=6
    * Stalk-only diagnostic:   model.stalk_dim=12, model.depth=4
    * Grouped low-rank stalk:  model.stalk_dim=12, model.restriction_mode=grouped_lowrank
    * Capacity falsifier:      model.channels=128, model.hidden_dim=192, model.depth=4 (i018 scale_xl)

  Compile-only and fused-incidence are separate execution-branch flags
  and must pass the train-mode mixed-precision parity ladder before
  being benchmarked for speed (see math_thesis.md and
  trainer_notes.md). CRTK metadata is reporting-only.
