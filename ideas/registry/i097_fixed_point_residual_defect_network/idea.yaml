author: Codex
short_thesis: 'Puzzle-like positions may be harder for a learned board-state operator
  to equilibrate. Instead of classifying only the final latent, classify from the
  residual defects of an unrolled update process:'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2054_friday_shanghai_residual_inspired_batch.md`;
  bespoke damped fixed-point iteration over a learned board-conditioned update operator,
  with a residual-defect trajectory bottleneck (per-step norm, cosine, contraction
  ratio, signed delta, learned-axis projection) that classifies puzzles from the
  failure of equilibration rather than from the final latent alone.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus residual-defect trajectory diagnostics (per-step
  residual norm, cosine, contraction ratio, signed delta, learned-axis projection,
  path length, defect decay, terminal defect magnitude, oscillation energy, mode
  code) saved to prediction artifacts.
compute_notes: Compact convolutional board encoder feeds an initial latent and a board-conditioning
  embedding to a damped fixed-point iteration with a shared learned update operator;
  the per-step residual trajectory is pooled into a permutation-equivariant defect
  readout and a small MLP head returns one logit. Runs on CPU/GPU; no extra dependencies.
