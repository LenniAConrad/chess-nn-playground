author: Codex
short_thesis: Appending coordinate planes may be too weak. Instead, generate per-square
  affine modulation parameters from deterministic coordinate features and side-relative
  coordinates, then modulate CNN features at multiple depths.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2216_friday_shanghai_architecture_batch_11.md`;
  per-square coordinate-conditioned FiLM modulation applied at every CNN depth rather
  than a single coordinate-plane append.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-layer FiLM gamma/beta maps, modulation magnitude
  diagnostics, and region-conditioned modulation statistics.
compute_notes: Coordinate-conditioned per-square FiLM CNN with `depth` ConvBlocks
  and a per-layer coordinate MLP that emits bounded gamma/beta maps from a deterministic
  six-channel coordinate tensor.
