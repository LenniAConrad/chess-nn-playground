idea_id: i259
run:
  name: i259_i018_bt4_ensemble_compression_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: i018_bt4_ensemble_compression
  input_channels: 18
  num_classes: 1
  student_channels: 64
  student_num_blocks: 4
  student_value_channels: 16
  student_value_hidden: 128
  student_se_channels: 16
  student_dropout: 0.1
  student_use_batchnorm: true
  teacher_mode: 'off'
  teacher_alpha: 0.5
  teacher_temperature: 1.0
  fusion_mode: tuned_alpha
  i018_channels: 64
  i018_hidden_dim: 96
  i018_depth: 2
  i018_stalk_dim: 8
  i018_dropout: 0.1
  i018_use_triads: true
  i018_encoding: simple_18
  bt4_channels: 64
  bt4_num_blocks: 4
  bt4_value_channels: 16
  bt4_value_hidden: 128
  bt4_se_channels: 16
  bt4_dropout: 0.1
  bt4_use_batchnorm: true
  diagnostic_hint_keys:
    - sheaf_tension
    - triad_defect_energy
    - king_ring_pressure
    - reply_pressure
    - defense_gap
    - pin_pressure
  ablation: none
  mechanism_family: ensemble_compression
  packet_profile: i018_bt4_ensemble_compression
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: |
  i259 i018+BT4 Ensemble Compression — deployment student-only run.
  Default config trains the BT4-shaped conv student under the shared
  puzzle_binary BCE-with-logits trainer with teacher_mode=off so the
  config validates and trains as a single-network puzzle classifier.
  Switch teacher_mode to 'research' (and load teacher checkpoints in
  train.py) to enable the distillation cache generation path described
  in the source research packet and trainer_notes.md. CRTK metadata is
  reporting-only and never used as model input.
