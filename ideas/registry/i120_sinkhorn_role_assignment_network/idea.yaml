short_thesis: 'Puzzle-like positions often contain latent tactical roles: target king,
  forcing piece, blocker, loose defender, escape square, overloaded piece, promotion
  candidate. Instead of asking attention to discover these roles implicitly, assign
  board objects to a f...'
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2124_friday_shanghai_architecture_batch_5.md`;
  uses a masked log-domain Sinkhorn-Knopp transport layer with learned role-prototype
  costs and an explicit dustbin role rather than the proposal-conditioned probe scaffold.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus the Sinkhorn assignment matrix, role vectors,
  role mass / share, dustbin share, per-piece transported mass, mean assignment entropy,
  pair-interaction summary, and CNN summary saved to prediction artifacts.
compute_notes: Piece-token encoder over occupied squares with coordinate and local-occupancy
  features, log-domain masked Sinkhorn-Knopp iterations against learned role prototypes
  with a dustbin slot, pairwise role-slot interaction MLP, and a light convolutional
  board summary branch.
