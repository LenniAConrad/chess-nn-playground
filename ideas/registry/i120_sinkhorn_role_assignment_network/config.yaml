idea_id: i120
run:
  name: i120_sinkhorn_role_assignment_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: sinkhorn_role_assignment_network
  input_channels: 18
  num_classes: 1
  channels: 64
  hidden_dim: 128
  depth: 2
  dropout: 0.1
  num_roles: 10
  max_tokens: 32
  sinkhorn_iters: 8
  sinkhorn_temperature: 0.5
  token_hidden: 96
  pair_hidden: 64
  head_hidden: 128
  cnn_channels: 32
  cnn_depth: 2
  use_dustbin: true
  packet_profile: sinkhorn_role_assignment_network
  mechanism_family: transport
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Promoted from a research packet as a board-only mechanism-profile implementation.
  CRTK metadata is reporting-only.
