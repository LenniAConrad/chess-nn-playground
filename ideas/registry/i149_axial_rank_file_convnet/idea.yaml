idea_id: i149
name: Axial Rank-File ConvNet
slug: axial_rank_file_convnet
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Use ordinary convolutions, but factor long-range board mixing into alternating
  `8`-length rank and file convolutions. This gives every square access to same-rank
  and same-file context cheaply while preserving an ordinary CNN training path.
novelty_claim: Promoted from `ideas/research/packets/classic/chess_nn_research_2026-04-24_2210_friday_shanghai_architecture_batch_9.md`;
  bespoke axial 1D rank and file convolutions (kernel covering the full board axis)
  plus a 3x3 local residual mixer, distinct from generic CNN baselines, multi-resolution
  pyramids, or attention models.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus axial diagnostics (per-axis energy, axial balance,
  rank-file imbalance, mechanism energy) saved to prediction artifacts.
compute_notes: Local 3x3 conv stem, a stack of axial blocks (each running a rank-wise
  `(1, 8)` 1D conv, a file-wise `(8, 1)` 1D conv, and a 3x3 local residual mixer with
  BatchNorm+GELU+Dropout), and a LayerNorm + GELU MLP head reading concatenated rank,
  file, and global mean+max pools.
