short_thesis: '- Idea name: Nuisance-Orthogonal Puzzle Bottleneck, abbreviated `NOPB`.
  - One-sentence thesis: A chess puzzle-like position should remain recognizable after
  the model''...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-21_0508_tuesday_local_nuisance_orthogonal.md`;
  uses a closed-form batchwise ridge orthogonal projection of a CNN latent against
  a fixed deterministic chess nuisance design matrix instead of a generic CNN, an
  attack/sheaf graph, or a one-ply move-delta set.
expected_advantage: Test the packet's proposed nuisance-residualisation signal under
  the same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus projection diagnostics (residual covariance norm,
  post-projection latent variance, nuisance rank estimate, and scalar nuisance summaries)
  saved to prediction artifacts.
compute_notes: Compact convolutional residual trunk plus deterministic 64-dimensional
  nuisance vector and closed-form batchwise ridge residualisation `Z = H - gamma *
  Q (Q^T Q + lambda I)^{-1} Q^T H`.
