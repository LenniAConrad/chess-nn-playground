short_thesis: Even when the input board is legal, a learned latent explanation of
  "why this is puzzle-like" may produce soft piece/square beliefs that violate basic
  legal-board constraints. Projecting those beliefs back onto a soft legal-board constraint
  set and reading...
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2136_friday_shanghai_architecture_batch_7.md`;
  bespoke implementation projects soft per-square piece beliefs onto a soft legal-board
  constraint set (per-square simplex, per-piece-class count caps, king-count normalisation,
  and pawn-rank masking) via a few differentiable alternating projection sweeps and
  classifies from the projection residual.
expected_advantage: Test the packet's proposed projection-residual signal under the
  same puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-constraint residual energies, per-class residual
  norms, belief entropy, and projected-vs-belief king totals saved to prediction artifacts.
compute_notes: Compact convolutional trunk plus a 13-class per-square belief decoder
  and a few alternating soft-legal-board projection sweeps with a small residual-map
  CNN.
