author: Codex
short_thesis: Variational Board Action Network classifies puzzle-likeness from Euler-Lagrange-style
  residuals of learned chess board fields.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2146_friday_shanghai_variational_board_action.md`;
  uses a generic mechanism profile over board-only features rather than generic CNN-only
  pooling.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus action value, potential energy, gradient energy,
  Euler-Lagrange residual norms, mask-weighted residual splits, and residual-map diagnostics.
compute_notes: Learns board fields, positive finite-difference stiffness maps, and a
  force-head approximation to the potential derivative; computes a discrete variational
  residual and fuses scalar action summaries, residual-map CNN features, and board CNN
  features.
