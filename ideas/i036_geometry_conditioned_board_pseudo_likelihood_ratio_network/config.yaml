idea_id: i036
run:
  name: i036_geometry_conditioned_board_pseudo_likelihood_ratio_network_simple18
  output_dir: results
seed: 42
deterministic: true
mode: puzzle_binary
device: nvidia
data:
  train_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_train.parquet
  val_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_val.parquet
  test_path: data/splits/crtk_sample_3class_unique_crtk_tags/split_test.parquet
  encoding: simple_18
  cache_features: false
model:
  name: geometry_conditioned_board_pseudo_likelihood_ratio_network
  input_channels: 18
  num_classes: 1
  adapter: simple18_token
  num_square_tokens: 13
  hidden_dim: 96
  decoder_hidden_dim: 192
  max_neighbors: 40
  target_chunk_size: 8
  empty_square_weight: 0.25
  nonempty_square_weight: 1.0
  score_temperature_init: 1.0
  dropout: 0.05
  relation_dropout: 0.05
  randomize_relations: false
  unary_only: false
  allow_soft_tokenization: false
  fail_closed_unknown_channels: true
  mechanism_family: topology
training:
  epochs: 20
  batch_size: 256
  num_workers: auto
  persistent_workers: true
  prefetch_factor: 2
  learning_rate: 0.0007
  weight_decay: 0.0001
  class_weighting: balanced
  loss: bce_with_logits
  early_stopping_patience: 5
  mixed_precision: true
  allow_tf32: true
  matmul_precision: high
  reliability_tier: paper_grade
  min_epochs: 10
  min_active_epochs: 10
  gradient_clip_norm: 1.0
  lr_scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 2
    min_lr: 1.0e-05
notes: Promoted from a research packet as a board-only mechanism-profile implementation.
  CRTK metadata is reporting-only.
