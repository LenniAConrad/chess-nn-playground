idea_id: i109
name: Maxout Region Signature Network
slug: maxout_region_signature_network
status: implemented
created_at: '2026-04-30T15:50:01+00:00'
author: Codex
short_thesis: Puzzle-like boards may fall into distinctive piecewise-linear activation
  regions. A maxout bank can expose those regions directly by reporting winner identities,
  margins, and region-transition statistics.
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-24_2118_friday_shanghai_architecture_batch_3.md`;
  a board-only puzzle classifier whose head reads only maxout region signatures (winner
  histograms, region/transition counts, margin statistics) rather than raw activations.
expected_advantage: Test the packet's proposed board-region signal under the same
  puzzle_binary benchmark contract as the other ideas.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus per-bank maxout region signatures (winner histograms,
  region counts, transitions, margin and activation statistics) saved to prediction
  artifacts.
compute_notes: Compact convolutional trunk plus a stack of maxout banks whose winners,
  margins and neighbour transitions are summarised into a region signature feeding a
  small MLP head.
