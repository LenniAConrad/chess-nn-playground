short_thesis: "Extracts characteristic polynomial coefficients (c_1, ..., c_r) of a learned r x r chess operator via Faddeev-LeVerrier recursion (no eigendecomposition). c_k = (-1)^k e_k(spec) are signed elementary symmetric polynomials of eigenvalues -- combinatorially distinct from raw eigvals and gradient-stable near degenerate spectra."
novelty_claim: Bespoke `nn.Module` implementation in `src/chess_nn_playground/models/cayley_hamilton_coeffs.py`; routed via the standard
  registry (not the generic ResearchPacketProbe).
expected_advantage: Hand-coded mechanism implements the algebra exactly per the
  source packet -- no profile-routing approximation.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit (squeezed) for binary BCE.
compute_notes: r matmul iterations of Faddeev-LeVerrier at r=12; fully differentiable; auxiliary Cayley-Hamilton residual ||A^r + sum c_k A^{r-k}||_F as sanity feature.
