short_thesis: '- Idea name: Kinematic Commutator Bottleneck Network, abbreviated KCBN.
  - One-sentence thesis: Puzzle-like positions should be enriched for non-commuting
  interactions...'
novelty_claim: Promoted from `ideas/research_packets/chess_nn_research_2026-04-21_0728_tuesday_local_kinematic_commutator.md`;
  central operator is a family of degree-two Lie commutators over rule-only chess
  kinematic motion operators with current-board blocker gating, not a CNN, sheaf,
  or transport scaffold.
expected_advantage: Test the packet's proposed board-structure signal under the same
  puzzle_binary benchmark contract as the other ideas, with a materially distinct
  non-commutative operator bottleneck rather than a shared mechanism profile.
target_task: 'puzzle_binary classification: fine labels 0 and 1 map to non-puzzle,
  fine label 2 maps to puzzle.'
input_representation: Current-board simple_18 tensor only; CRTK/source metadata is
  reporting-only and never used as model input.
output_heads: One puzzle logit plus Lie-bracket diagnostics (commutator field, per-pair
  mean/max bracket magnitude, bracket energy) saved to prediction artifacts.
compute_notes: Twelve sparse rule-only motion operators with chunked pairwise commutators
  (default 28 pairs, chunk size 4); slider operators applied via a 7-step empty-mask
  gated recurrence so the dense `(B, 64, 64)` matrix is never materialised.
